<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lenvir &mdash; Fiscalizador en Entrenamiento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --asphalt:#1E2228;
  --asphalt-2:#2A2F37;
  --asphalt-3:#363C46;
  --paper:#F4EEE2;
  --paper-2:#ECE3CF;
  --paper-line:#D8CBA8;
  --ink:#22201A;
  --ink-soft:#5B5648;
  --signal-green:#2E9E5B;
  --signal-green-dark:#1F7A45;
  --hazard:#E2711D;
  --hazard-dark:#B5570F;
  --stamp-red:#B6412B;
  --stamp-red-dark:#8C2F1F;
  --blueprint:#2C4A6E;
  --gold:#D2A23D;
  --purple:#5B3E8C;
  --radius:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--asphalt);font-family:'IBM Plex Sans',sans-serif;color:var(--ink);min-height:100vh;-webkit-tap-highlight-color:transparent;}
.app-shell{max-width:460px;margin:0 auto;min-height:100vh;background:var(--paper);position:relative;display:flex;flex-direction:column;box-shadow:0 0 60px rgba(0,0,0,.5);overflow-x:hidden;}
h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;font-weight:800;letter-spacing:-0.01em;margin:0;}
.mono{font-family:'IBM Plex Mono',monospace;}
button{font-family:inherit;border:none;cursor:pointer;background:none;}
button:focus-visible,[tabindex]:focus-visible,input:focus-visible{outline:3px solid var(--blueprint);outline-offset:2px;}
input[type=text]{font-family:inherit;}

/* ---------- HUD ---------- */
.hud{position:sticky;top:0;z-index:30;background:var(--asphalt);color:var(--paper);padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:4px solid var(--hazard);}
.brand{display:flex;align-items:center;gap:8px;}
.brand-mark{background:var(--hazard);color:var(--asphalt);font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:13px;padding:4px 8px;border-radius:4px;transform:rotate(-3deg);box-shadow:2px 2px 0 rgba(0,0,0,.35);}
.brand-name{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:17px;letter-spacing:.01em;}
.hud-stats{display:flex;align-items:center;gap:10px;}
.stat{display:flex;align-items:center;gap:4px;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13px;}
.gear-btn,.exit-btn{padding:4px;color:var(--paper);opacity:.85;}
.gear-btn svg,.exit-btn svg{width:20px;height:20px;display:block;}

/* ---------- MAP ---------- */
.map-wrap{position:relative;flex:1;padding:24px 18px 60px;background-image:repeating-linear-gradient(0deg, rgba(34,32,26,0.05) 0 1px, transparent 1px 34px);}
.map-bg-svg{position:absolute;inset:0;width:100%;height:100%;opacity:.5;pointer-events:none;}
.map-intro{position:relative;z-index:2;margin-bottom:14px;}
.map-intro .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;color:var(--blueprint);text-transform:uppercase;font-weight:600;}
.map-intro h2{font-size:21px;color:var(--ink);margin-top:4px;}
.review-banner{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;background:#fff;border:2px solid var(--asphalt);border-radius:12px;padding:11px 14px;margin-bottom:20px;}
.review-banner.empty{opacity:.7;}
.review-title{font-weight:600;font-size:13px;}
.review-sub{font-size:11.5px;color:var(--ink-soft);margin-top:1px;}
.review-empty-label{font-size:12px;color:var(--ink-soft);font-style:italic;}
.path{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:0;}
.node-row{display:flex;width:100%;align-items:center;margin:2px 0;}
.node-row.left{justify-content:flex-start;}
.node-row.center{justify-content:center;}
.node-row.right{justify-content:flex-end;}
.connector{width:4px;height:30px;background:repeating-linear-gradient(to bottom, var(--paper-line) 0 6px, transparent 6px 12px);margin:0 auto;}
.node-btn{width:84px;height:84px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:4px solid var(--asphalt);position:relative;transition:transform .12s ease;}
.node-btn:active{transform:scale(.94);}
.node-btn .node-id{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:18px;}
.node-btn .node-stars{display:flex;gap:1px;margin-top:2px;}
.node-btn .node-stars svg{width:8px;height:8px;}
.node-locked{background:var(--asphalt-3);border-color:var(--asphalt-2);color:var(--paper);opacity:.55;}
.node-locked svg.lock-icon{width:24px;height:24px;}
.node-current{background:var(--hazard);border-color:var(--hazard-dark);color:#fff;box-shadow:0 0 0 6px rgba(226,113,29,0.18);animation:pulse 2.2s infinite;}
.node-done{background:var(--signal-green);border-color:var(--signal-green-dark);color:#fff;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 6px rgba(226,113,29,0.18);}50%{box-shadow:0 0 0 11px rgba(226,113,29,0.06);}}
.node-label{text-align:center;font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:11px;color:var(--ink-soft);margin-top:6px;max-width:96px;line-height:1.25;}
.node-col{display:flex;flex-direction:column;align-items:center;}
@media (prefers-reduced-motion: reduce){.node-current{animation:none;}}

/* ---------- MODAL ---------- */
.overlay{position:fixed;inset:0;background:rgba(20,18,14,.55);z-index:40;display:flex;align-items:flex-end;justify-content:center;}
.sheet{width:100%;max-width:460px;background:var(--paper);border-radius:20px 20px 0 0;padding:22px 20px 28px;max-height:88vh;overflow-y:auto;animation:slideUp .22s ease-out;}
@keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.sheet-close{position:absolute;right:18px;top:14px;color:var(--ink-soft);}
.sheet-close svg{width:22px;height:22px;}
.sheet h2{font-size:19px;}
.sheet .module-tag{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--blueprint);font-weight:600;}
.level-card{margin-top:16px;border:2px solid var(--asphalt);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;background:#fff;}
.level-card.locked{opacity:.55;}
.level-left{display:flex;flex-direction:column;gap:5px;}
.level-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;}
.level-stars{display:flex;gap:2px;}
.level-stars svg{width:15px;height:15px;}
.level-btn{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:12px;padding:9px 14px;border-radius:8px;background:var(--hazard);color:#fff;white-space:nowrap;}
.level-btn.review{background:var(--blueprint);}
.lock-pill{display:flex;align-items:center;gap:6px;color:var(--ink-soft);font-size:12px;}
.lock-pill svg{width:16px;height:16px;}

/* ---------- LESSON ---------- */
.lesson-top{position:sticky;top:0;z-index:30;background:var(--asphalt);padding:12px 16px;display:flex;align-items:center;gap:10px;}
.progress-track{flex:1;height:10px;background:var(--asphalt-3);border-radius:6px;overflow:hidden;}
.progress-fill{height:100%;background:var(--signal-green);transition:width .25s ease;}
.lives{display:flex;gap:4px;}
.life-icon{width:20px;height:20px;}
.lesson-body{padding:22px 18px 140px;}
.case-tag{display:inline-block;background:var(--asphalt);color:var(--paper);font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:12px;padding:5px 10px;border-radius:4px;transform:rotate(-2deg);box-shadow:2px 2px 0 rgba(0,0,0,.25);margin-bottom:14px;}
.case-tag-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.case-tag-row .case-tag{margin-bottom:0;}
.timer-badge{display:flex;align-items:center;gap:5px;background:#fff;border:2px solid var(--asphalt);border-radius:20px;padding:4px 10px 4px 8px;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:12.5px;color:var(--ink);}
.timer-badge svg{width:14px;height:14px;flex-shrink:0;}
.timer-badge.ticking{border-color:var(--hazard-dark);color:var(--hazard-dark);}
.timer-badge.frozen{opacity:.75;}
.case-title{font-size:16px;margin-bottom:10px;color:var(--blueprint);}
.field-note{background:#fff;border:2px dashed var(--paper-line);border-radius:10px;padding:16px;font-size:15.5px;line-height:1.5;color:var(--ink);position:relative;}
.field-note::before{content:"SITUACIÓN DE CAMPO";position:absolute;top:-9px;left:14px;background:var(--paper);font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:600;color:var(--ink-soft);padding:0 6px;letter-spacing:.06em;}
.options{margin-top:18px;display:flex;flex-direction:column;gap:10px;}
.option{display:flex;align-items:center;gap:12px;text-align:left;border:2px solid var(--asphalt);border-radius:12px;padding:13px 14px;background:#fff;font-size:14.5px;line-height:1.4;color:var(--ink);transition:transform .08s ease;}
.option:active{transform:scale(.985);}
.option .badge{flex-shrink:0;width:26px;height:26px;border-radius:50%;border:2px solid var(--asphalt);display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:12px;}
.option.correct{border-color:var(--signal-green-dark);background:#E9F6EE;}
.option.correct .badge{background:var(--signal-green);border-color:var(--signal-green-dark);color:#fff;}
.option.wrong{border-color:var(--stamp-red-dark);background:#FAEAE6;}
.option.wrong .badge{background:var(--stamp-red);border-color:var(--stamp-red-dark);color:#fff;}
.option.dim{opacity:.5;}
.option[disabled]{pointer-events:none;}
.feedback-sheet{position:fixed;left:0;right:0;bottom:0;z-index:35;max-width:460px;margin:0 auto;border-radius:18px 18px 0 0;padding:18px 18px 22px;animation:slideUp .2s ease-out;}
.feedback-sheet.ok{background:#DDF1E4;border-top:4px solid var(--signal-green);}
.feedback-sheet.bad{background:#F8E1DA;border-top:4px solid var(--stamp-red);}
.fb-row{display:flex;align-items:center;gap:12px;}
.stamp{flex-shrink:0;width:64px;height:64px;border-radius:50%;border:3px solid currentColor;display:flex;align-items:center;justify-content:center;text-align:center;font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:10px;line-height:1.1;transform:rotate(-9deg) scale(0);animation:stampIn .32s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes stampIn{to{transform:rotate(-9deg) scale(1);}}
@media (prefers-reduced-motion: reduce){.stamp{animation:none;transform:rotate(-9deg) scale(1);}}
.feedback-sheet.ok .stamp{color:var(--signal-green-dark);}
.feedback-sheet.bad .stamp{color:var(--stamp-red-dark);}
.fb-text{flex:1;}
.fb-title{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:15px;}
.feedback-sheet.ok .fb-title{color:var(--signal-green-dark);}
.feedback-sheet.bad .fb-title{color:var(--stamp-red-dark);}
.fb-body{font-size:13.5px;line-height:1.45;color:var(--ink);margin-top:6px;}
.fb-continue{margin-top:14px;width:100%;padding:13px;border-radius:10px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14.5px;color:#fff;}
.feedback-sheet.ok .fb-continue{background:var(--signal-green-dark);}
.feedback-sheet.bad .fb-continue{background:var(--stamp-red-dark);}

/* ---------- SUMMARY ---------- */
.summary-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;text-align:center;}
.summary-stamp{width:110px;height:110px;border-radius:50%;border:5px solid var(--asphalt);display:flex;align-items:center;justify-content:center;margin-bottom:16px;background:var(--paper-2);transform:rotate(-6deg);}
.summary-stamp.fail{border-color:var(--stamp-red);}
.summary-stars{display:flex;gap:5px;margin:6px 0 14px;}
.summary-stars svg{width:32px;height:32px;}
.summary-title{font-size:21px;margin-bottom:6px;}
.summary-sub{color:var(--ink-soft);font-size:13.5px;margin-bottom:16px;}
.summary-grid{display:flex;gap:12px;margin-bottom:16px;width:100%;max-width:300px;}
.summary-box{flex:1;background:#fff;border:2px solid var(--asphalt);border-radius:10px;padding:10px 6px;}
.summary-box .num{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:18px;}
.summary-box .lbl{font-size:10px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;margin-top:2px;}
.rankup-card,.badges-toast{width:100%;max-width:300px;background:#FCF3DD;border:2px solid var(--gold);border-radius:10px;padding:10px 12px;margin-bottom:14px;font-size:12.5px;text-align:left;}
.rankup-card b,.badges-toast b{display:block;font-family:'Space Grotesk',sans-serif;font-size:13.5px;margin-bottom:2px;}
.btn-primary{width:100%;max-width:300px;padding:15px;border-radius:12px;background:var(--hazard);color:#fff;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;box-shadow:0 4px 0 var(--hazard-dark);}
.btn-primary:active{transform:translateY(2px);box-shadow:0 2px 0 var(--hazard-dark);}
.btn-ghost{width:100%;max-width:300px;padding:13px;margin-top:10px;border-radius:12px;background:transparent;color:var(--blueprint);font-weight:600;font-size:14px;border:2px solid var(--blueprint);}

/* ---------- SETTINGS ---------- */
.settings-sheet{padding:22px 20px 30px;}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--paper-line);}
.settings-row:last-child{border-bottom:none;}
.danger-btn{color:var(--stamp-red);font-weight:600;font-size:13px;border:2px solid var(--stamp-red);padding:8px 12px;border-radius:8px;}

/* ---------- PROFILE ---------- */
.profile-wrap{flex:1;padding:20px 18px 50px;}
.rank-banner{--rank-color:#2C4A6E;background:var(--rank-color);color:#fff;border-radius:16px;padding:20px 18px;margin-bottom:18px;position:relative;overflow:hidden;}
.rank-banner::after{content:"";position:absolute;right:-30px;top:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.08);}
.rank-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;opacity:.85;text-transform:uppercase;}
.rank-banner h2{font-size:24px;margin-top:4px;}
.rank-tagline{font-size:13px;opacity:.9;margin-top:4px;}
.rank-score{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:14px;margin-top:10px;background:rgba(255,255,255,.16);display:inline-block;padding:4px 10px;border-radius:6px;}
.alias-field{display:block;margin-bottom:18px;}
.alias-field span{display:block;font-size:11.5px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;}
.alias-field input{width:100%;padding:11px 12px;border:2px solid var(--asphalt);border-radius:10px;font-size:14px;background:#fff;}
.score-breakdown{background:#fff;border:2px solid var(--asphalt);border-radius:12px;padding:14px 16px;margin-bottom:18px;}
.score-breakdown h3{font-size:13px;margin-bottom:10px;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.bar-row:last-child{margin-bottom:0;}
.bar-label{width:78px;font-size:11.5px;color:var(--ink-soft);flex-shrink:0;}
.bar-track{flex:1;height:9px;background:var(--paper-2);border-radius:5px;overflow:hidden;}
.bar-fill{height:100%;border-radius:5px;}
.bar-val{width:30px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:600;flex-shrink:0;}
.badges-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.badge-card{background:#fff;border:2px solid var(--asphalt);border-radius:12px;padding:12px 10px;text-align:center;}
.badge-card.locked{opacity:.5;}
.badge-icon svg{width:34px;height:34px;}
.badge-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:12px;margin-top:6px;}
.badge-desc{font-size:10.5px;color:var(--ink-soft);margin-top:3px;line-height:1.3;}
.visibility-card{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;background:#fff;border:2px solid var(--asphalt);border-radius:12px;padding:14px 16px;margin-bottom:16px;}
.vis-title{font-weight:700;font-size:14px;}
.vis-sub{font-size:11.5px;color:var(--ink-soft);margin-top:4px;line-height:1.4;}
.switch{position:relative;display:inline-block;width:44px;height:25px;flex-shrink:0;margin-top:2px;}
.switch input{opacity:0;width:0;height:0;position:absolute;}
.slider{position:absolute;cursor:pointer;inset:0;background:#C9BC95;border-radius:26px;transition:.2s;}
.slider:before{position:absolute;content:"";height:19px;width:19px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;}
.switch input:checked + .slider{background:var(--signal-green);}
.switch input:checked + .slider:before{transform:translateX(19px);}

/* ---------- EMPRESA ---------- */
.empresa-wrap{flex:1;padding:20px 18px 50px;}
.empresa-banner{background:#FCF3DD;border:2px solid var(--gold);border-radius:10px;padding:12px 14px;font-size:12px;line-height:1.4;margin-bottom:16px;color:var(--ink-soft);}
.empresa-row{display:flex;align-items:center;justify-content:space-between;background:#fff;border:2px solid var(--asphalt);border-radius:10px;padding:12px 14px;margin-bottom:9px;}
.empresa-alias{font-weight:700;font-size:14px;}
.empresa-rank{font-size:11.5px;color:var(--blueprint);margin-top:1px;}
.empresa-score{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:16px;}
.empty-state{text-align:center;color:var(--ink-soft);font-size:13px;padding:30px 10px;}

/* ---------- STARS ---------- */
.star-filled{fill:var(--gold);stroke:var(--asphalt);stroke-width:8;}
.star-empty{fill:var(--paper-2);stroke:var(--paper-line);stroke-width:8;}

::-webkit-scrollbar{width:0;height:0;}
</style>
</head>
<body>
<div id="app" class="app-shell"></div>

<script>
const CASES = [{"id": "M1-B01", "mod": 1, "nivel": "Basico", "titulo": "Ente Rector del SEIA", "enun": "Antes de iniciar el expediente de un proyecto vial, el practicante debe identificar ante quién se rinde cuentas como autoridad rectora del SEIA.", "options": ["MTC", "MINAM", "SENACE"], "correctIndex": 1, "feedback": "El MINAM es el organo rector del SNGA y del SEIA (Ley 28611 y Ley 27446). SENACE y MTC son autoridades competentes para evaluar/aprobar instrumentos, no el ente rector del sistema."}, {"id": "M1-B02", "mod": 1, "nivel": "Basico", "titulo": "Instrumento sin impactos significativos", "enun": "El proyecto instala un puente peatonal modular sin pilares, fuera de cualquier ANP, sin generar impactos ambientales significativos.", "options": ["EIA-sd", "FITSA", "EIA-d"], "correctIndex": 1, "feedback": "Para proyectos del Sector Transportes sin impactos significativos y no sujetos al SEIA, el instrumento aplicable es la FITSA, no un estudio de impacto ambiental."}, {"id": "M1-B03", "mod": 1, "nivel": "Basico", "titulo": "Autoridad aprobatoria del EIA-d", "enun": "Un proyecto de carretera de alcance nacional con impactos ambientales significativos requiere un EIA-d.", "options": ["DGAAM-MTC", "Gobierno Regional", "SENACE"], "correctIndex": 2, "feedback": "Según la Ley N 29968, Ley de creación del SENACE, este organismo aprueba los EIA-d de proyectos de alcance nacional con impactos significativos."}, {"id": "M1-B04", "mod": 1, "nivel": "Basico", "titulo": "Categoría II - impactos moderados", "enun": "La evaluación preliminar clasifica el proyecto vial en Categoría II, por impactos ambientales moderados.", "options": ["FITSA", "EIA-sd", "DIA"], "correctIndex": 1, "feedback": "La Categoría II del SEIA corresponde al EIA-sd, para impactos moderados, a diferencia de la DIA (Cat. I, leves) y el EIA-d (Cat. III, significativos)."}, {"id": "M1-B05", "mod": 1, "nivel": "Basico", "titulo": "Categoría I - impactos leves", "enun": "El ensanchamiento de una berma genera impactos leves, y el proyecto si está incluido en el Listado de Inclusión del SEIA.", "options": ["EIA-d", "DIA", "FITSA"], "correctIndex": 1, "feedback": "La DIA corresponde a la Categoría I del SEIA, para proyectos con impactos leves que SI están sujetos al sistema. La FITSA solo aplica a proyectos NO sujetos al SEIA."}, {"id": "M1-B06", "mod": 1, "nivel": "Basico", "titulo": "Diferencia ECA vs LMP", "enun": "El supervisor debe explicar al practicante la diferencia entre el parametro que mide la calidad del aire ambiental y el que mide la emisión en la fuente.", "options": ["Ambos miden lo mismo, solo cambia el nombre según el sector", "El LMP mide la calidad del aire ambiental y el ECA la emisión en la fuente", "El ECA mide la calidad ambiental general y el LMP la concentración en la emisión o efluente de la fuente"], "correctIndex": 2, "feedback": "El ECA mide la concentración de un contaminante en el ambiente; el LMP mide la concentración en la emisión, efluente o descarga de una fuente puntual. Invertirlos es un error común."}, {"id": "M1-B07", "mod": 1, "nivel": "Basico", "titulo": "Norma que crea el SEIA", "enun": "En la inducción de un nuevo ingeniero ambiental de obra, se le pregunta qué ley creó el SEIA.", "options": ["Ley N 27446", "Ley N 29325", "Ley N 28611"], "correctIndex": 0, "feedback": "La Ley N 27446 es la Ley del SEIA. La Ley N 28611 es la Ley General del Ambiente; la Ley N 29325 es la Ley del SINEFA."}, {"id": "M1-B08", "mod": 1, "nivel": "Basico", "titulo": "Inicio de ejecución sin certificación", "enun": "El contratista quiere movilizar maquinaria al frente de obra antes de que se emita la resolución que aprueba el instrumento ambiental.", "options": ["Puede iniciar trabajos preliminares de trazo y replanteo", "Puede iniciar si cuenta con la conformidad verbal del supervisor de obra", "No puede iniciar ninguna actividad sin contar previamente con la certificación ambiental"], "correctIndex": 2, "feedback": "El art. 3 de la Ley N 27446 prohibe iniciar la ejecución de proyectos sujetos al SEIA sin certificación ambiental previa contenida en resolución de la autoridad competente."}, {"id": "M1-B09", "mod": 1, "nivel": "Basico", "titulo": "Base para EIA-sd con clasificación anticipada", "enun": "La consultora debe elaborar el EIA-sd de un proyecto con clasificación anticipada en el Anexo 1 del RPAST.", "options": ["Debe replicar el contenido de un EIA-sd aprobado para otro proyecto similar", "Puede definir libremente el contenido, según su propia metodología", "Debe elaborarlo conforme a los Términos de Referencia con características comunes aprobados"], "correctIndex": 2, "feedback": "Los proyectos con clasificación anticipada cuentan con TdR específicos aprobados por Resolución Ministerial, de uso obligatorio; no se improvisa ni se copia otro expediente."}, {"id": "M1-B10", "mod": 1, "nivel": "Basico", "titulo": "Fiscalización vigente en Transportes", "enun": "El fiscalizador debe explicar a un titular quién supervisa y fiscaliza el RPAST en la actualidad.", "options": ["OEFA, desde la creación del SINEFA", "SENACE, por haber certificado el instrumento ambiental", "La DGAAM del MTC (o unidad que haga sus veces), mientras no se transfiera la función a OEFA"], "correctIndex": 2, "feedback": "El RPAST establece que, mientras no se transfiera la función a OEFA, la fiscalización del Sector Transportes corresponde a la DGAAM-MTC. SENACE certifica, no fiscaliza."}, {"id": "M1-I01", "mod": 1, "nivel": "Intermedio", "titulo": "TdR para clasificación anticipada Cat. I", "enun": "Un proyecto fue identificado en el Anexo 1 del RPAST como Categoría I. La consultora pregunta qué TdR usar para la DIA.", "options": ["Los TdR genericos del Anexo III del Reglamento de la Ley del SEIA", "No requiere TdR, pues la DIA se elabora libremente", "Los TdR aprobados para proyectos con características comunes de Categoría I"], "correctIndex": 2, "feedback": "La clasificación anticipada en el Anexo 1 trae TdR específicos para esa tipología y categoría (ej. RM 710-2017-MTC), de uso obligatorio."}, {"id": "M1-I02", "mod": 1, "nivel": "Intermedio", "titulo": "Opinión vinculante de SERNANP", "enun": "El proyecto atraviesa la zona de amortiguamiento de un Área de Conservación Regional. Se requiere opinión previa del SERNANP?", "options": ["Si, se requiere opinión vinculante por superponerse a la zona de amortiguamiento", "No, el SERNANP solo opina dentro del área nucleo, nunca en zona de amortiguamiento", "Solo si lo solicita expresamente el titular"], "correctIndex": 0, "feedback": "El RPAST exige opinión vinculante del SERNANP cuando el proyecto se superpone con un ANP, su zona de amortiguamiento o un ACR, no solo dentro del área nucleo."}, {"id": "M1-I03", "mod": 1, "nivel": "Intermedio", "titulo": "Modificación significativa de EIA-sd", "enun": "El titular requiere ampliar un componente no previsto en su EIA-sd, generando impactos negativos significativos adicionales.", "options": ["Puede ejecutar la ampliación de inmediato y reportarla en el siguiente monitoreo", "Le basta con una comunicación previa de 15 días habiles", "Debe gestionar la modificación significativa siguiendo etapas y plazos del EIA-sd"], "correctIndex": 2, "feedback": "Conforme al art. 55 del RPAST, las modificaciones con impactos negativos significativos no previstos requieren la modificación significativa con las etapas y plazos de la categoría correspondiente."}, {"id": "M1-I04", "mod": 1, "nivel": "Intermedio", "titulo": "Participación ciudadana según categoría", "enun": "El equipo social pregunta si el mecanismo de participación ciudadana es igual para todos los proyectos viales.", "options": ["Si, siempre se exige audiencia pública presencial, sin excepción", "Si, basta publicar el estudio en la web del MTC", "No, los mecanismos varian según la categoría y alcance del proyecto"], "correctIndex": 2, "feedback": "Los mecanismos de participación ciudadana se definen según la categoría y características del proyecto (audiencias, talleres, buzones, etc.), no son uniformes."}, {"id": "M1-I05", "mod": 1, "nivel": "Intermedio", "titulo": "EVAP sin clasificación anticipada", "enun": "El proyecto no figura en el listado de clasificación anticipada del Anexo 1. Cómo se determina su categoría?", "options": ["Debe presentarse una EVAP para que la autoridad determine la categoría", "Puede autoclasificarse como DIA sin evaluación previa", "Debe asumirse la categoría más exigente (EIA-d) por precaución"], "correctIndex": 0, "feedback": "Sin clasificación anticipada, corresponde presentar una EVAP, mediante la cual la autoridad determina la categoría aplicable; el titular no se autoclasifica."}, {"id": "M1-I06", "mod": 1, "nivel": "Intermedio", "titulo": "Reclasificación por cambio de diseño", "enun": "Tras obtenida la certificación ambiental, pero antes de ejecutar, el proyecto sufre cambios de diseño que incrementan significativamente sus impactos previstos.", "options": ["No es necesario informar, pues la certificación ya fue otorgada", "Basta notificar el cambio en el primer informe de monitoreo", "Debe solicitarse la reclasificación del proyecto"], "correctIndex": 2, "feedback": "El art. 46 del Reglamento de la Ley del SEIA (DS 019-2009-MINAM) exige reclasificación cuando, antes de ejecutar, hay cambios de diseño con repercusión significativa en los impactos."}, {"id": "M1-I07", "mod": 1, "nivel": "Intermedio", "titulo": "Registro de consultoras ambientales", "enun": "Una consultora sin experiencia previa en el sector se ofrece a elaborar el EIA-sd a bajo costo.", "options": ["Solo puede elaborarlo si está inscrita y vigente en el Registro Nacional de Consultoras Ambientales", "Cualquier consultora de ingenieria puede elaborarlo, sin registro especial", "Solo se requiere registro si el proyecto es EIA-d"], "correctIndex": 0, "feedback": "Los estudios e instrumentos complementarios deben elaborarse por consultoras inscritas y vigentes en el Registro a cargo de SENACE, sin distinción de categoría."}, {"id": "M1-I08", "mod": 1, "nivel": "Intermedio", "titulo": "Carácter de declaración jurada", "enun": "Se detecta que la línea base del EIA-sd ya aprobado contenia información falsa sobre la calidad del agua.", "options": ["No hay consecuencia legal si la autoridad ya aprobo el instrumento", "Procede declarar la nulidad del acto administrativo, sin perjuicio de responsabilidades civiles y penales", "Solo se sanciona a la consultora, nunca al titular"], "correctIndex": 1, "feedback": "Toda la documentación tiene carácter de declaración jurada. Comprobado el fraude (art. 32.3 Ley 27444), procede la nulidad del acto y las responsabilidades correspondientes."}, {"id": "M1-I09", "mod": 1, "nivel": "Intermedio", "titulo": "Silencio de opinión no vinculante", "enun": "Una entidad consultada para opinión no vinculante sobre un EIA-sd no responde dentro del plazo otorgado.", "options": ["El procedimiento queda suspendido indefinidamente", "El instrumento se declara automáticamente improcedente", "Se entiende que no existe objeción y la autoridad continúa la evaluación"], "correctIndex": 2, "feedback": "Si la entidad consultada para opinión no vinculante no responde en plazo, la autoridad entiende que no hay objeción y continúa la evaluación."}, {"id": "M1-I10", "mod": 1, "nivel": "Intermedio", "titulo": "Inicio de obras durante la evaluación", "enun": "Durante la evaluación del EIA-sd, se verifica en campo que ya se iniciaron movimientos de tierra en el área del proyecto.", "options": ["Se suspende la evaluación hasta que se detengan las obras, sin otra consecuencia", "La solicitud se declara improcedente y se remite a la EFA competente", "Se continúa la evaluación normalmente, solo se deja constancia"], "correctIndex": 1, "feedback": "El art. 24 del RPAST modificado dispone que las solicitudes presentadas o evidenciadas con obras ya iniciadas se declaran improcedentes, remitiendose a la EFA competente."}, {"id": "M1-A01", "mod": 1, "nivel": "Avanzado", "titulo": "Modificación de una DIA aprobada por SENACE", "enun": "Un proyecto cuenta con DIA aprobada por SENACE vía clasificación. El titular necesita modificarla por un cambio de trazo menor.", "options": ["Debe solicitarla ante el propio SENACE, igual que la aprobación original", "Debe solicitarla ante la DGAAM del MTC (o unidad que haga sus veces)", "Debe tramitar una nueva clasificación completa desde cero"], "correctIndex": 1, "feedback": "La Disposición Complementaria Final Cuarta del DS 006-2026-MTC establece que la modificación de una DIA aprobada por SENACE vía clasificación corresponde evaluarla a la DGAAM-MTC."}, {"id": "M1-A02", "mod": 1, "nivel": "Avanzado", "titulo": "FITSA de aprobación automática", "enun": "Se rehabilita una estación de peaje existente, sin ampliar su huella ni modificar componentes principales.", "options": ["Requiere EIA-sd, por ser infraestructura de la red vial nacional", "Corresponde FITSA de aprobación automática, según el listado taxativo del art. 11-C", "Requiere FITSA de evaluación previa, con plazo de 10 días habiles"], "correctIndex": 1, "feedback": "El art. 11-C.1.11 del RPAST modificado incluye expresamente la rehabilitación/remodelación de estación de peaje como FITSA de aprobación automática."}, {"id": "M1-A03", "mod": 1, "nivel": "Avanzado", "titulo": "Comunicación previa por reubicación de maquinaria", "enun": "El contratista reubica una planta chancadora dentro del área de influencia directa ya evaluada, sin alterar compromisos ambientales.", "options": ["Requiere modificación no significativa del instrumento", "Basta comunicarlo con 15 días habiles de anticipación, sin modificar el instrumento", "Requiere modificación significativa, por ser componente principal"], "correctIndex": 1, "feedback": "El literal a) del art. 20-A del RPAST modificado considera este cambio como supuesto de comunicación previa, no de modificación del instrumento."}, {"id": "M1-A04", "mod": 1, "nivel": "Avanzado", "titulo": "Emergencia vial sin declaratoria formal", "enun": "Un deslizamiento bloquea una vía departamental. No existe Decreto Supremo de Declaratoria de Estado de Emergencia y se necesita actuar el mismo día.", "options": ["Puede ejecutar de inmediato las acciones necesarias, sin pronunciamiento previo de la autoridad", "Debe tramitar primero una modificación no significativa del instrumento", "No puede actuar sin Declaratoria de Estado de Emergencia previa"], "correctIndex": 0, "feedback": "El art. 11-A del RPAST modificado distingue la Declaratoria de Emergencia de la 'emergencia vial'; en ambos casos se actúa de inmediato, reportando después vía Formato de Reporte de Emergencia."}, {"id": "M1-A05", "mod": 1, "nivel": "Avanzado", "titulo": "Integración de títulos habilitantes en EIA-sd", "enun": "Un puente requiere autorización de vertimiento de aguas residuales del campamento. Debe tramitarse por separado ante la ANA antes del EIA-sd?", "options": ["Puede integrarla en el propio procedimiento del EIA-sd ante la DGAAM-MTC", "No es posible integrar autorizaciones de recursos hídricos al procedimiento de Transportes", "Si, son procedimientos independientes que deben iniciarse antes del EIA-sd"], "correctIndex": 0, "feedback": "La Disposición Complementaria Final Segunda del DS 006-2026-MTC habilita integrar permisos como la autorización de vertimientos dentro de la evaluación del EIA-sd."}, {"id": "M1-A06", "mod": 1, "nivel": "Avanzado", "titulo": "Plazos diferenciados del PAMA", "enun": "Un Gobierno Local opera un terminal terrestre sin instrumento ambiental aprobado. Tras el DS 006-2026-MTC, en cuánto tiempo debe presentar su PAMA?", "options": ["Dentro de 4 años, tras comunicar su intención en 120 días habiles", "Dentro de 2 años, igual que el sector privado", "No tiene plazo, los Gobiernos Locales están exonerados"], "correctIndex": 0, "feedback": "La Tercera Disposición Complementaria Final otorga 4 años a los Gobiernos Locales (2 años al privado, 3 a los GORE), previa comunicación de intención en 120 días habiles."}, {"id": "M1-A07", "mod": 1, "nivel": "Avanzado", "titulo": "Plazo de opinión vinculante para DIA", "enun": "La ANA debe emitir opinión vinculante sobre una DIA por intervención en un cauce menor. Han pasado 20 días habiles sin respuesta.", "options": ["El plazo de 18 días habiles ya venció; la autoridad debe trasladar las observaciones a título informativo", "Debe reiniciarse el plazo, toda demora invalida la opinión", "Aún falta tiempo, el plazo para DIA es de 45 días habiles, igual que el EIA-sd"], "correctIndex": 0, "feedback": "El art. 46.2.a del RPAST modificado fija 18 días habiles para la opinión vinculante sobre una DIA (no 45, que es para EIA-sd y EIA-d)."}, {"id": "M1-A08", "mod": 1, "nivel": "Avanzado", "titulo": "FITSA de evaluación previa por condicionante especial", "enun": "El proyecto se ubica en zona de amortiguamiento de un ANP, sin superponerse con humedales ni ecosistemas fragiles listados, y sin impactos significativos.", "options": ["Corresponde FITSA de aprobación automática, por no haber impactos significativos", "Corresponde EIA-sd, por ubicarse en zona de amortiguamiento", "Corresponde FITSA de evaluación previa, con plazo máximo de 10 días habiles"], "correctIndex": 2, "feedback": "El art. 11-B del RPAST modificado señala que la sola ubicación en zona de amortiguamiento de un ANP convierte la FITSA en una de evaluación previa, no automática."}, {"id": "M1-A09", "mod": 1, "nivel": "Avanzado", "titulo": "Fiscalización en contratos de concesión vial", "enun": "Un tramo de la Red Vial Nacional opera bajo contrato de concesión. Quién supervisa las obligaciones ambientales de dicho contrato?", "options": ["La DGAAM-MTC pierde toda competencia sobre tramos concesionados", "Se rige por el DS N 044-2006-PCM, sin perjuicio de la competencia de la DGAAM-MTC sobre el RPAST", "SENACE asume la fiscalización integral de los tramos concesionados"], "correctIndex": 1, "feedback": "El numeral 7 del art. 4 del RPAST modificado precisa que la fiscalización de la DGAAM-MTC opera sin perjuicio de las funciones del DS N 044-2006-PCM sobre contratos de concesión."}, {"id": "M1-A10", "mod": 1, "nivel": "Avanzado", "titulo": "Proyecto fuera del Listado de Inclusión vigente", "enun": "Un proyecto vial no figura en el Listado de Inclusión actualizado por la RM N 00095-2025-MINAM ni encaja en ningún supuesto de FITSA.", "options": ["Se tramita directamente un PAMA, por tratarse de un vacio normativo", "Se ejecuta sin ningún instrumento, al no estar listado expresamente", "Debe consultarse al MINAM para determinar la exigibilidad de certificación y la autoridad competente"], "correctIndex": 2, "feedback": "Ante un vacio en el listado vigente, corresponde formular consulta al MINAM como ente rector, en lugar de asumir exención automática o vacio legal."}, {"id": "M2-B01", "mod": 2, "nivel": "Basico", "titulo": "Qué es la línea base ambiental", "enun": "Antes de iniciar el expediente de un proyecto vial, el practicante debe definir qué es la línea base ambiental.", "options": ["Descripción del estado actual del medio físico, biológico y social antes de la intervención", "Descripción del estado del proyecto en su diseño final", "Descripción de los compromisos ambientales asumidos"], "correctIndex": 0, "feedback": "La línea base describe el estado actual del ambiente (componentes físico, biológico y social) antes de la ejecución del proyecto, sirviendo de referencia para medir impactos."}, {"id": "M2-B02", "mod": 2, "nivel": "Basico", "titulo": "Aprobación de TdR sin clasificación anticipada", "enun": "Quién aprueba los TdR para un proyecto vial sin clasificación anticipada?", "options": ["La autoridad competente, a partir de la EVAP o solicitud de clasificación", "El Gobierno Regional, sin importar el sector", "La propia consultora ambiental"], "correctIndex": 0, "feedback": "Cuando no hay clasificación anticipada, los TdR se elaboran y aprueban en el marco del procedimiento de clasificación a cargo de la autoridad competente, no los define la consultora libremente."}, {"id": "M2-B03", "mod": 2, "nivel": "Basico", "titulo": "Componentes mínimos de la línea base", "enun": "El supervisor pregunta qué componentes debe caracterizar de forma integrada la línea base de un proyecto vial.", "options": ["Solo el componente social, por ser el más sensible en vías", "Físico, biológico y social, de forma integrada", "Solo el componente físico (suelo, agua, aire)"], "correctIndex": 1, "feedback": "La línea base debe caracterizar de manera integrada los componentes físico, biológico y social del área de influencia, conforme al RPAST."}, {"id": "M2-B04", "mod": 2, "nivel": "Basico", "titulo": "Fuente secundaria para cobertura vegetal", "enun": "La consultora busca una fuente secundaria oficial para apoyar la caracterización de la cobertura vegetal del área de influencia.", "options": ["Información proporcionada solo por la comunidad local", "Fotografías satelitales antiguas sin validación", "El Mapa Nacional de Cobertura Vegetal de SERFOR"], "correctIndex": 2, "feedback": "El Mapa Nacional de Cobertura Vegetal, elaborado por SERFOR, es una fuente secundaria oficial válida para la caracterización de la línea base biológica."}, {"id": "M2-B05", "mod": 2, "nivel": "Basico", "titulo": "Metodología para evaluar impactos", "enun": "El residente pregunta qué tipo de metodología debe usarse para evaluar los impactos ambientales del proyecto.", "options": ["Copia de la metodología usada en otro EIA aprobado", "Solo apreciación subjetiva del consultor", "Metodologías reconocidas y, preferentemente, cuantitativas"], "correctIndex": 2, "feedback": "El RPAST exige metodologías reconocidas o generalmente aceptadas, preferentemente cuantitativas y adecuadas a las características del proyecto."}, {"id": "M2-B06", "mod": 2, "nivel": "Basico", "titulo": "Plan de Participación Ciudadana y los TdR", "enun": "El equipo social pregunta cómo se relaciona el Plan de Participación Ciudadana con el estudio ambiental.", "options": ["Solo se exige para proyectos de SENACE, nunca para los de la DGAAM-MTC", "Es un documento totalmente independiente del estudio ambiental", "Forma parte de las herramientas de gestión social vinculadas a la certificación ambiental"], "correctIndex": 2, "feedback": "El Plan de Participación Ciudadana es una herramienta de gestión social vinculada al proceso de certificación ambiental, exigible según categoría y características del proyecto."}, {"id": "M2-B07", "mod": 2, "nivel": "Basico", "titulo": "EVAP vs TdR del EIA-sd", "enun": "Se pregunta la diferencia entre la EVAP y los TdR de un EIA-sd.", "options": ["La EVAP solo aplica a EIA-d, nunca a EIA-sd", "La EVAP determina la categoría del proyecto; los TdR del EIA-sd guian su elaboración una vez determinada esa categoría", "Son sinonimos, ambos determinan la categoría"], "correctIndex": 1, "feedback": "La EVAP es el instrumento previo que permite determinar la categoría aplicable; fijada la categoría, se usan los TdR correspondientes para su elaboración."}, {"id": "M2-B08", "mod": 2, "nivel": "Basico", "titulo": "Opinión sobre TdR con incidencia hídrica", "enun": "El proyecto tiene implicancia sobre recursos hídricos. Se requiere opinión de la ANA sobre los TdR?", "options": ["Nunca se requiere opinión de la ANA sobre los TdR, solo sobre el estudio final", "Si, se requiere opinión técnica de la ANA sobre los TdR cuando hay implicancia sobre recursos hídricos", "Solo si el titular lo solicita voluntariamente"], "correctIndex": 1, "feedback": "El RPAST exige que la autoridad solicite opinión técnica sobre los TdR a la ANA (o SERNANP) cuando el proyecto incide en recursos hídricos o ANP/ZA/ACR."}, {"id": "M2-B09", "mod": 2, "nivel": "Basico", "titulo": "Canteras en la línea base", "enun": "La consultora pregunta si debe incluir las canteras proyectadas en la línea base del estudio.", "options": ["Debe identificarse y caracterizarse desde la línea base, incluida su ubicación georreferenciada", "Solo se reporta cuando ya inicio su explotación", "No es necesario, las canteras se regulan aparte del estudio ambiental"], "correctIndex": 0, "feedback": "Las canteras y DME proyectados deben identificarse y caracterizarse desde la línea base, con ubicación georreferenciada, como componentes auxiliares del proyecto."}, {"id": "M2-B10", "mod": 2, "nivel": "Basico", "titulo": "Vigencia de la información de línea base", "enun": "Han pasado varios años entre la aprobación del instrumento y el inicio de obra. Sigue siendo válida la línea base original?", "options": ["Debe ser representativa de las condiciones reales al momento de ejecutar el proyecto; si hay demoras prolongadas, corresponde evaluar su actualización", "Solo debe actualizarse si lo exige expresamente el supervisor de obra", "Es indefinida, sin importar cuánto tiempo pase"], "correctIndex": 0, "feedback": "La línea base debe reflejar las condiciones reales del entorno; ante demoras significativas, corresponde evaluar la necesidad de actualizarla."}, {"id": "M2-I01", "mod": 2, "nivel": "Intermedio", "titulo": "Plazo para solicitar opinión sobre TdR", "enun": "La autoridad debe solicitar opinión a SERNANP/ANA sobre los TdR de un proyecto en ANP. Cuál es el plazo?", "options": ["Dentro de los 5 días habiles siguientes al inicio del procedimiento", "Dentro de los 30 días habiles siguientes al inicio del procedimiento", "No hay plazo, se solicita cuando la autoridad lo considere conveniente"], "correctIndex": 0, "feedback": "El RPAST establece que la opinión técnica de terceras entidades sobre los TdR debe solicitarse dentro de los 5 días habiles siguientes al inicio del procedimiento."}, {"id": "M2-I02", "mod": 2, "nivel": "Intermedio", "titulo": "Plazo de respuesta sobre TdR", "enun": "Cuál es el plazo máximo para que las entidades opinantes emitan opinión sobre los TdR?", "options": ["15 días habiles", "45 días habiles, igual que la opinión vinculante sobre el EIA-sd", "5 días habiles, igual que el plazo para solicitarla"], "correctIndex": 0, "feedback": "Las autoridades opinantes consultadas sobre los TdR deben emitir su opinión en un plazo no mayor a 15 días habiles."}, {"id": "M2-I03", "mod": 2, "nivel": "Intermedio", "titulo": "Falta de subsanación de observaciones a los TdR", "enun": "El titular no subsana las observaciones formuladas a la línea base presentada dentro del plazo otorgado.", "options": ["La autoridad continúa evaluando indefinidamente hasta que el titular responda", "Se aprueba automáticamente por silencio administrativo positivo", "La autoridad declara el abandono del expediente y su archivamiento"], "correctIndex": 2, "feedback": "Si el titular no subsana las observaciones dentro del plazo, la autoridad declara el abandono del expediente y su archivamiento, conforme al RPAST."}, {"id": "M2-I04", "mod": 2, "nivel": "Intermedio", "titulo": "Opinión de SERNANP en Área de Conservación Regional", "enun": "El proyecto vial atraviesa la zona de amortiguamiento de un Área de Conservación Regional. Se requiere opinión sobre los TdR?", "options": ["Si, se requiere opinión técnica del SERNANP sobre los TdR, al involucrar un ACR", "Solo requiere opinión de la ANA, nunca del SERNANP", "No, el SERNANP solo opina dentro del ANP de administración nacional"], "correctIndex": 0, "feedback": "El RPAST exige opinión técnica del SERNANP cuando el proyecto se desarrolla en ANP de administración nacional, su zona de amortiguamiento o un ACR."}, {"id": "M2-I05", "mod": 2, "nivel": "Intermedio", "titulo": "Caracterización social en la línea base", "enun": "El consultor social pregunta si basta una encuesta rápida para caracterizar el componente social.", "options": ["Basta con una encuesta rápida a los pobladores del centro poblado más cercano", "Debe incluir variables de indicadores sociales de fuentes secundarias (censos, estudios socioeconomicos, data institucional)", "No es exigible si el proyecto se ejecuta dentro del derecho de vía existente"], "correctIndex": 1, "feedback": "La caracterización social debe basarse en variables de indicadores sociales de fuentes secundarias confiables, no solo en consultas informales puntuales."}, {"id": "M2-I06", "mod": 2, "nivel": "Intermedio", "titulo": "Especies amenazadas en la línea base", "enun": "Cómo debe identificarse la presencia de especies de flora y fauna amenazadas en la línea base?", "options": ["No es relevante para proyectos viales, solo para proyectos mineros", "Por percepción del consultor en campo, sin referencia normativa", "Utilizando la categorización oficial de especies amenazadas de flora y fauna silvestre vigente"], "correctIndex": 2, "feedback": "La identificación de especies amenazadas debe sustentarse en la categorización oficial vigente de flora y fauna silvestre legalmente protegida."}, {"id": "M2-I07", "mod": 2, "nivel": "Intermedio", "titulo": "Línea base y adquisición de inmuebles", "enun": "El proyecto requiere expropiar predios para la vía. Debe relacionarse esto con la línea base social?", "options": ["Si, la caracterización social debe ser consistente con el proceso de adquisición y expropiación regulado por el D.Leg. N 1192", "No, la línea base y el EIA no necesitan considerar el proceso de adquisición, por ser un trámite aparte", "La expropiación solo se menciona si el titular lo solicita expresamente"], "correctIndex": 0, "feedback": "La caracterización social del entorno debe ser consistente con el proceso de adquisición y expropiación de inmuebles regulado por el D.Leg. N 1192."}, {"id": "M2-I08", "mod": 2, "nivel": "Intermedio", "titulo": "Reclasificación por cambios en el entorno", "enun": "Tras un largo período sin ejecutar el proyecto, el entorno caracterizado en la línea base cambio significativamente. Procede algo?", "options": ["Puede proceder la reclasificación si las condiciones del entorno cambiaron de forma que los impactos previstos ya no son representativos", "Se resuelve automáticamente con una simple comunicación previa", "No aplica, la reclasificación solo opera por cambios de diseño, nunca por cambios del entorno"], "correctIndex": 0, "feedback": "Si bien la reclasificación se asocia típicamente a cambios de diseño, en la práctica de fiscalización también se evalúa cuando el entorno caracterizado ha variado significativamente."}, {"id": "M2-I09", "mod": 2, "nivel": "Intermedio", "titulo": "TdR de aplicación general vs específicos", "enun": "Cuál es la diferencia entre los TdR de aplicación general y los TdR específicos?", "options": ["Los de aplicación general (características comunes) se aprueban para tipologías recurrentes; los específicos se elaboran para proyectos particulares sin clasificación anticipada", "No existe diferencia, todos los TdR son iguales para el Sector Transportes", "Los TdR específicos solo aplican a EIA-d, nunca a EIA-sd o DIA"], "correctIndex": 0, "feedback": "Los TdR de características comunes se aprueban para tipologías recurrentes con clasificación anticipada; los específicos se formulan para proyectos particulares sin esa clasificación."}, {"id": "M2-I10", "mod": 2, "nivel": "Intermedio", "titulo": "Silencio sobre opinión de TdR", "enun": "Vence el plazo otorgado a una entidad consultada sobre los TdR, sin que responda.", "options": ["Los TdR se rechazan automáticamente", "El procedimiento de aprobación de TdR queda suspendido indefinidamente", "La autoridad puede continuar el procedimiento conforme a las reglas generales de opinión técnica del RPAST"], "correctIndex": 2, "feedback": "Ante el silencio de la entidad consultada dentro del plazo, la autoridad aplica las reglas generales del RPAST sobre opiniones técnicas para continuar el procedimiento."}, {"id": "M2-A01", "mod": 2, "nivel": "Avanzado", "titulo": "Actualización de TdR de características comunes", "enun": "Tras el DS 006-2026-MTC, en cuánto tiempo debe el MTC proponer al MINAM la actualización de los TdR de características comunes?", "options": ["Los TdR de características comunes ya no existen, fueron reemplazados por la FITSA", "Dentro de 90 días habiles desde la publicación del decreto", "La actualización es opcional y queda a discreción del MTC, sin plazo"], "correctIndex": 1, "feedback": "La Disposición Complementaria Final Novena del DS 006-2026-MTC obliga al MTC a proponer al MINAM la actualización de los TdR dentro de 90 días habiles."}, {"id": "M2-A02", "mod": 2, "nivel": "Avanzado", "titulo": "TdR aplicables mientras no se actualicen", "enun": "Mientras no se actualicen los TdR de características comunes, qué TdR deben usarse?", "options": ["No se puede tramitar ningún estudio hasta que se publiquen los nuevos TdR", "Los vigentes previos (RM 440-2018, RM 891-2019 o RM 1056-2019-MTC) o los TdR Básicos de los Anexos del Reglamento del SEIA", "Se aplican directamente los TdR del sector Minería, por analogía"], "correctIndex": 1, "feedback": "La Disposición Complementaria Transitoria Única del DS 006-2026-MTC dispone tomar como referencia los TdR previos o los TdR Básicos del Reglamento del SEIA."}, {"id": "M2-A03", "mod": 2, "nivel": "Avanzado", "titulo": "Línea base con declaración jurada falsa detectada después", "enun": "Se detecta en control posterior que la línea base contenia información falsa sobre calidad de agua.", "options": ["No genera consecuencias si el instrumento ya fue aprobado y el proyecto está en ejecución", "Genera la nulidad del acto administrativo sustentado en dicha información, sin perjuicio de responsabilidades civiles y penales", "Solo genera responsabilidad si la falsedad fue intencional y se prueba en sede penal"], "correctIndex": 1, "feedback": "Conforme al art. 12 del RPAST y al art. 32.3 de la Ley 27444, comprobado el fraude, la autoridad declara la nulidad del acto, sin perjuicio de responsabilidades civiles y penales."}, {"id": "M2-A04", "mod": 2, "nivel": "Avanzado", "titulo": "Línea base para FITSA de evaluación previa", "enun": "Qué nivel de información de línea base requiere una FITSA de evaluación previa?", "options": ["Debe tener el mismo nivel de detalle exigido para un EIA-d", "No requiere ninguna línea base, basta con declarar que no genera impactos significativos", "Información mínima que sustente el cumplimiento de los condicionantes del art. 11-B (superposición con ecosistemas fragiles, ANP, etc.)"], "correctIndex": 2, "feedback": "La FITSA de evaluación previa exige información suficiente para verificar el cumplimiento de los condicionantes del art. 11-B, sin el nivel de detalle de un EIA-d."}, {"id": "M2-A05", "mod": 2, "nivel": "Avanzado", "titulo": "Registro de consultora al elaborar vs al presentar el expediente", "enun": "La consultora elabora la línea base sin estar inscrita en el Registro, pero se inscribe antes de presentar el expediente. Es válido?", "options": ["Es válido, lo único relevante es que esté inscrita al momento de presentar el expediente", "Es irrelevante el registro si el profesional a cargo tiene CIP vigente", "No es válido: la inscripción debe estar vigente durante todo el proceso de elaboración, no solo al presentar"], "correctIndex": 2, "feedback": "El art. 12.1 del RPAST modificado exige inscripción vigente en el Registro durante la elaboración; la inscripción posterior no convalida un vicio en el origen del documento."}, {"id": "M2-A06", "mod": 2, "nivel": "Avanzado", "titulo": "Opinión sobre TdR vs opinión vinculante sobre el EIA-sd", "enun": "Existe una opinión previa favorable de la ANA sobre los TdR. Exime de pedir nueva opinión vinculante sobre el EIA-sd ya elaborado?", "options": ["No, la opinión sobre los TdR no exime de solicitar la opinión vinculante sobre el EIA-sd, pues son etapas distintas", "Solo se requiere una sola opinión de la ANA en todo el procedimiento", "Si, la opinión previa sobre los TdR exime de solicitar nueva opinión sobre el EIA-sd"], "correctIndex": 0, "feedback": "La opinión sobre los TdR (etapa previa) es distinta de la opinión vinculante sobre el EIA-sd ya elaborado (art. 46.4 RPAST); ambas etapas requieren su propia solicitud."}, {"id": "M2-A07", "mod": 2, "nivel": "Avanzado", "titulo": "Cambio en composición arquitectonica sin cambiar uso", "enun": "Un componente aprobado cambia su composición formal/arquitectonica, sin variar su uso ni incrementar impactos.", "options": ["Requiere un nuevo EIA-sd completo", "Se gestiona como supuesto de comunicación previa del art. 20-A, sin requerir modificación ni nueva línea base", "Requiere actualizar la línea base completa del proyecto"], "correctIndex": 1, "feedback": "El literal o) del art. 20-A del RPAST modificado considera estos cambios como comunicación previa, sin exigir actualización de la línea base."}, {"id": "M2-A08", "mod": 2, "nivel": "Avanzado", "titulo": "DME que excede el volumen de su ficha de caracterización", "enun": "El volumen real ejecutado de un DME excede el establecido en su ficha de caracterización de la línea base aprobada.", "options": ["No requiere ninguna gestión, los DME no forman parte de la línea base original", "Basta con una comunicación previa de 15 días habiles, como cualquier variación de DME", "No aplica la comunicación previa del art. 20-A; corresponde modificación del instrumento"], "correctIndex": 2, "feedback": "El literal t) del art. 20-A solo habilita comunicación previa si la variación NO supera los volumenes de la ficha de caracterización; si los excede, corresponde modificación."}, {"id": "M2-A09", "mod": 2, "nivel": "Avanzado", "titulo": "Uso de TdR anteriores a la actualización del DS 006-2026-MTC", "enun": "El proyecto recien inicia su clasificación y el MTC aún no actualiza los TdR conforme a la Novena Disposición. Puede usar TdR previos?", "options": ["Es válido usarlos como referencia, mientras el MTC no apruebe la actualización dispuesta por el DS 006-2026-MTC", "Solo es válido con dispensa expresa del MINAM", "Es ilegal usar TdR anteriores a 2026 bajo cualquier circunstancia"], "correctIndex": 0, "feedback": "La Disposición Complementaria Transitoria Única habilita tomar como referencia los TdR previos mientras el MTC no apruebe la actualización."}, {"id": "M2-A10", "mod": 2, "nivel": "Avanzado", "titulo": "Eventos climaticos no contemplados en la línea base original", "enun": "Durante la evaluación surgen huaycos recurrentes no caracterizados en la línea base, que modifican el riesgo previsto.", "options": ["Solo se puede actuar después de aprobado el instrumento, mediante modificación significativa", "No corresponde ninguna acción, se evalúa solo con la información presentada originalmente", "La autoridad puede requerir información complementaria o actualización de la línea base antes de aprobar el instrumento"], "correctIndex": 2, "feedback": "Si surgen hechos que modifican significativamente el riesgo o impactos previstos, la autoridad puede requerir información complementaria antes de aprobar, en ejercicio de su facultad técnica."}, {"id": "M3-B01", "mod": 3, "nivel": "Basico", "titulo": "Qué es un compromiso ambiental", "enun": "El supervisor pregunta qué es un compromiso ambiental dentro del Plan de Manejo Ambiental (PMA).", "options": ["Una obligación específica, medible y verificable asumida por el titular para prevenir, mitigar o controlar un impacto", "Una intención general de cuidar el ambiente, sin metricas", "Una recomendación opcional del consultor que el titular puede o no cumplir"], "correctIndex": 0, "feedback": "Un compromiso ambiental debe ser una obligación específica, medible y verificable, no una intención general ni una recomendación opcional."}, {"id": "M3-B02", "mod": 3, "nivel": "Basico", "titulo": "Jerarquía de mitigación", "enun": "Cuál es el orden correcto de la jerarquía de mitigación de impactos ambientales?", "options": ["Evitar, minimizar, mitigar o restaurar y, en última instancia, compensar", "Compensar primero, y solo si no es posible, evitar", "Mitigar y compensar son lo mismo, se aplican indistintamente"], "correctIndex": 0, "feedback": "La jerarquía de mitigación prioriza evitar el impacto, luego minimizarlo, luego mitigarlo o restaurarlo y, solo como última instancia, compensarlo."}, {"id": "M3-B03", "mod": 3, "nivel": "Basico", "titulo": "Responsabilidad por terceros en obra", "enun": "El contratista subcontrata el transporte de material. Quién es responsable ambientalmente de esa actividad?", "options": ["El titular es responsable de las afectaciones generadas también por terceros que actúan en su nombre", "Los subcontratistas asumen toda la responsabilidad, liberando al titular", "El titular es responsable únicamente de su propio personal directo"], "correctIndex": 0, "feedback": "El titular del proyecto es responsable de las emisiones, descargas y afectaciones generadas también por terceros que actúan en su nombre dentro de la obra."}, {"id": "M3-B04", "mod": 3, "nivel": "Basico", "titulo": "Registro de obligaciones ambientales", "enun": "Dónde deben registrarse las obligaciones ambientales aprobadas y sus documentos de sustento?", "options": ["Basta con guardarlas en el archivo físico de obra, sin reporte alguno", "Solo se reportan si la EFA las solicita expresamente", "En la plataforma virtual habilitada por el MTC"], "correctIndex": 2, "feedback": "Las obligaciones ambientales deben registrarse en la plataforma virtual habilitada por el MTC, junto con los documentos de sustento de cumplimiento."}, {"id": "M3-B05", "mod": 3, "nivel": "Basico", "titulo": "Plan de monitoreo ambiental", "enun": "Qué define el plan de monitoreo ambiental de un proyecto vial?", "options": ["Es opcional si el titular tiene buena reputación ambiental", "Se define libremente por el contratista, sin relación con el instrumento aprobado", "Puntos, parámetros, frecuencia y metodos de monitoreo conforme a lo aprobado"], "correctIndex": 2, "feedback": "El plan de monitoreo define puntos, parámetros, frecuencia y metodos conforme a lo aprobado en el instrumento de gestión ambiental."}, {"id": "M3-B06", "mod": 3, "nivel": "Basico", "titulo": "Plan de contingencias", "enun": "Para qué sirve el Plan de Contingencias de un proyecto vial?", "options": ["Solo aplica a proyectos mineros, nunca a proyectos viales", "Es un documento meramente informativo sin obligación de implementación", "Establece la respuesta ante emergencias ambientales (derrames, accidentes) para minimizar daños"], "correctIndex": 2, "feedback": "El Plan de Contingencias establece la respuesta ante emergencias ambientales para minimizar daños, y es de implementación obligatoria."}, {"id": "M3-B07", "mod": 3, "nivel": "Basico", "titulo": "Mitigación vs compensación", "enun": "Cuál es la diferencia entre una medida de mitigación y una de compensación?", "options": ["Son sinonimos y se usan indistintamente", "La mitigación reduce el impacto en su fuente; la compensación repara o sustituye un impacto residual no mitigable", "La compensación siempre se aplica antes que la mitigación"], "correctIndex": 1, "feedback": "La mitigación reduce el impacto en su fuente u origen; la compensación repara o sustituye un impacto residual que no pudo mitigarse."}, {"id": "M3-B08", "mod": 3, "nivel": "Basico", "titulo": "Modificación del PMA por el contratista", "enun": "Puede el contratista modificar libremente las medidas de manejo aprobadas en el PMA según conveniencia operativa?", "options": ["Solo requiere autorización verbal del residente de obra", "Si, el contratista decide en campo según conveniencia operativa", "No, cualquier cambio debe evaluarse conforme al procedimiento de modificación o comunicación previa que corresponda"], "correctIndex": 2, "feedback": "Cualquier cambio en las medidas de manejo aprobadas debe evaluarse conforme al procedimiento de modificación o comunicación previa correspondiente, nunca por decisión unilateral del contratista."}, {"id": "M3-B09", "mod": 3, "nivel": "Basico", "titulo": "Indicadores de cumplimiento", "enun": "Qué característica deben tener los indicadores de cumplimiento de los compromisos ambientales?", "options": ["Pueden ser meramente descriptivos, sin necesidad de ser medibles", "Deben ser medibles y verificables para permitir la fiscalización posterior", "Solo se exigen indicadores para proyectos EIA-d"], "correctIndex": 1, "feedback": "Los indicadores deben ser medibles y verificables para permitir la fiscalización posterior, sin distinción por categoría del instrumento."}, {"id": "M3-B10", "mod": 3, "nivel": "Basico", "titulo": "Compromisos sociales en el PMA", "enun": "Los compromisos sociales asumidos en el PMA tienen el mismo carácter exigible que los compromisos técnico-ambientales?", "options": ["Si, forman parte de las obligaciones fiscalizables, igual que los compromisos ambientales técnicos", "Solo se exigen si la comunidad lo solicita formalmente después de aprobado el instrumento", "No, son simples gestos de buena voluntad, sin carácter exigible"], "correctIndex": 0, "feedback": "Los compromisos sociales forman parte de las obligaciones fiscalizables del instrumento de gestión ambiental, igual que los compromisos técnicos."}, {"id": "M3-I01", "mod": 3, "nivel": "Intermedio", "titulo": "Compromiso ambiental redactado de forma ambigua", "enun": "Un compromiso indica: 'se realizaran esfuerzos razonables para minimizar el polvo'. Es una redacción adecuada?", "options": ["Es válido, la autoridad interpreta 'esfuerzos razonables' según el contexto", "Solo se exige precisión en compromisos de EIA-d", "Es deficiente, no permite verificación objetiva; debe reformularse con parámetros medibles"], "correctIndex": 2, "feedback": "Un compromiso redactado en términos ambiguos no permite verificación objetiva; debe reformularse con parámetros medibles (frecuencia de riego, estándar aplicable, etc.)."}, {"id": "M3-I02", "mod": 3, "nivel": "Intermedio", "titulo": "Cambio de cronograma sin reducir compromisos", "enun": "Se modifica el cronograma de ejecución de actividades del PMA, sin cambiar las actividades ni reducir compromisos.", "options": ["Es un supuesto de comunicación previa del art. 20-A, salvo que se trate de un PAMA o Plan de Cierre aprobado", "No requiere ninguna comunicación, es una decisión operativa libre", "Siempre requiere modificación significativa del instrumento"], "correctIndex": 0, "feedback": "El cambio de cronograma sin reducir compromisos es supuesto de comunicación previa, salvo en PAMA o Plan de Cierre, expresamente excluidos por el RPAST."}, {"id": "M3-I03", "mod": 3, "nivel": "Intermedio", "titulo": "Reubicación de un punto de monitoreo", "enun": "Se reubica un punto de monitoreo por traslado de una estación. Qué gestión corresponde?", "options": ["Es supuesto de comunicación previa, salvo que se trate de un punto de control de un componente activo que deba mantenerse monitoreado", "Siempre requiere modificación del instrumento, sin excepción", "Puede eliminarse sin comunicar a nadie"], "correctIndex": 0, "feedback": "La reubicación de un punto de monitoreo es comunicación previa, salvo que afecte el control de un componente activo que deba seguir siendo monitoreado."}, {"id": "M3-I04", "mod": 3, "nivel": "Intermedio", "titulo": "Mejora de eficiencia en PTAR sin cambiar la autorización de vertimiento", "enun": "Se mejora la eficiencia de la PTAR, sin modificar las condiciones de la autorización de vertimiento.", "options": ["Requiere modificación significativa, por tratarse de un componente de tratamiento de efluentes", "Requiere autorización previa de la ANA antes de cualquier cambio operativo", "Es supuesto de comunicación previa del art. 20-A, al ser una mejora de eficiencia"], "correctIndex": 2, "feedback": "Una mejora operativa de la PTAR que no modifica las condiciones de la autorización de vertimiento es supuesto de comunicación previa."}, {"id": "M3-I05", "mod": 3, "nivel": "Intermedio", "titulo": "Variación en capacidad de almacenamiento de hidrocarburos", "enun": "Se varia la capacidad de almacenamiento de hidrocarburos dentro de instalaciones ya contempladas en el estudio.", "options": ["Es supuesto de comunicación previa, siempre que no modifique las medidas de contingencia establecidas", "No requiere ninguna comunicación, es un cambio meramente logistico", "Siempre requiere modificación significativa, por el riesgo asociado a hidrocarburos"], "correctIndex": 0, "feedback": "La variación en capacidad de almacenamiento es comunicación previa si no modifica las medidas de contingencia establecidas en el instrumento."}, {"id": "M3-I06", "mod": 3, "nivel": "Intermedio", "titulo": "Áreas verdes con especies no nativas", "enun": "Se incorporan áreas verdes con especies no nativas, distintas a las previstas en el instrumento ambiental.", "options": ["No encaja en el supuesto de comunicación previa del art. 20-A, que exige especies nativas o las ya previstas", "Está prohibido reforestar bajo cualquier circunstancia sin un nuevo EIA", "Siempre es comunicación previa, sin importar la especie utilizada"], "correctIndex": 0, "feedback": "El supuesto de comunicación previa para áreas verdes exige especies nativas o ya previstas en el instrumento; usar especies distintas no encaja en dicho supuesto."}, {"id": "M3-I07", "mod": 3, "nivel": "Intermedio", "titulo": "Cambio de denominación del proyecto", "enun": "Se cambia la denominación comercial del proyecto, sin modificar componentes ni actividades.", "options": ["Requiere reclasificación completa del proyecto", "Es supuesto de comunicación previa del art. 20-A", "Requiere modificación no significativa del instrumento"], "correctIndex": 1, "feedback": "El cambio de denominación del proyecto, sin afectar componentes ni actividades, es supuesto de comunicación previa."}, {"id": "M3-I08", "mod": 3, "nivel": "Intermedio", "titulo": "PMA sin medidas para un impacto identificado", "enun": "El PMA no incluye medidas específicas para un impacto identificado en la línea base.", "options": ["Es una deficiencia que debe ser observada por la autoridad evaluadora antes de aprobar el instrumento", "Se corrige después de aprobado, mediante un compromiso voluntario posterior", "Es aceptable, el PMA solo necesita cubrir los impactos más severos"], "correctIndex": 0, "feedback": "Un impacto identificado en la línea base sin medidas correspondientes en el PMA es una deficiencia observable antes de la aprobación del instrumento."}, {"id": "M3-I09", "mod": 3, "nivel": "Intermedio", "titulo": "Registro de documentos de sustento", "enun": "Cuándo deben registrarse los documentos de sustento del cumplimiento de obligaciones ambientales?", "options": ["Solo si la EFA realiza una visita de supervisión", "Es opcional mientras no haya sido sancionado previamente", "Según los plazos aprobados en el instrumento de gestión ambiental o los previstos en la normativa aplicable"], "correctIndex": 2, "feedback": "El registro de documentos de sustento debe hacerse según los plazos aprobados en el instrumento o los previstos en la normativa aplicable, no de forma discrecional."}, {"id": "M3-I10", "mod": 3, "nivel": "Intermedio", "titulo": "Monitoreo trimestral realizado solo dos veces al año", "enun": "El compromiso exige monitoreo trimestral de calidad de agua, pero el titular lo realiza solo dos veces al año.", "options": ["No hay infracción si los resultados de las dos mediciones cumplen los ECA aplicables", "Solo es infracción si se demuestra daño ambiental real", "Constituye un incumplimiento de una obligación ambiental fiscalizable, independientemente de si se superaron los ECA"], "correctIndex": 2, "feedback": "Incumplir la frecuencia comprometida constituye una infracción fiscalizable por si misma, independientemente de que los resultados obtenidos cumplan los estándares."}, {"id": "M3-A01", "mod": 3, "nivel": "Avanzado", "titulo": "Cambio de ubicación de componentes sin alterar obligaciones", "enun": "Se reubican componentes dentro del área de influencia directa, sin cambios en obligaciones ni incremento de impactos.", "options": ["Requiere nueva clasificación del proyecto", "Es supuesto de comunicación previa del art. 20-A.b del RPAST modificado, no de modificación", "Siempre requiere modificación significativa, por tratarse de reubicación de componentes"], "correctIndex": 1, "feedback": "El literal b) del art. 20-A del RPAST modificado considera el cambio de ubicación de componentes sin alterar obligaciones ni impactos como comunicación previa."}, {"id": "M3-A02", "mod": 3, "nivel": "Avanzado", "titulo": "Cambio de uso de componente ya previsto", "enun": "Un componente existente cambia de uso, ya contemplado con medidas de manejo en el estudio, sin variar el área aprobada.", "options": ["No requiere ninguna comunicación, pues ya estaba previsto en el estudio", "Requiere modificación significativa, por implicar un cambio de uso", "Es supuesto de comunicación previa, conforme al literal j) del art. 20-A, si el área del componente no se modifica"], "correctIndex": 2, "feedback": "El literal j) del art. 20-A permite gestionar como comunicación previa el cambio de uso de un componente ya aprobado con medidas previstas, sin modificar el área."}, {"id": "M3-A03", "mod": 3, "nivel": "Avanzado", "titulo": "Cambios en densidades o coeficientes de construcción", "enun": "Se modifican densidades o coeficientes constructivos de componentes ya aprobados, sin alterar la importancia de los impactos evaluados.", "options": ["Requiere modificación no significativa siempre, por afectar parámetros constructivos", "Es supuesto de comunicación previa del literal n) del art. 20-A", "Requiere autorización municipal previa, sin relación con el RPAST"], "correctIndex": 1, "feedback": "El literal n) del art. 20-A considera estos cambios como comunicación previa, en tanto no se altere la importancia de los impactos evaluados."}, {"id": "M3-A04", "mod": 3, "nivel": "Avanzado", "titulo": "Cambio del sistema de coordenadas dentro del área de influencia", "enun": "Se corrige el sistema de coordenadas de ubicación geográfica del proyecto, dentro del área de influencia directa.", "options": ["Requiere modificación del instrumento por cambio en la ubicación geográfica", "Requiere reclasificación, al modificar la georreferenciación del proyecto", "Es supuesto de comunicación previa del literal d) del art. 20-A"], "correctIndex": 2, "feedback": "El literal d) del art. 20-A permite la comunicación previa para correcciones del sistema de coordenadas dentro del área de influencia directa ya evaluada."}, {"id": "M3-A05", "mod": 3, "nivel": "Avanzado", "titulo": "Comunicación previa presentada fuera de plazo", "enun": "Se presenta una comunicación previa con menos de 15 días habiles de anticipación a la implementación del cambio.", "options": ["Es válida igual, pues lo importante es que se haya comunicado antes de ejecutar el cambio", "No cumple el plazo mínimo exigido por el art. 20-A.2, lo que puede invalidar su carácter de comunicación previa ante fiscalización", "El plazo de 15 días solo aplica a comunicaciones relacionadas con DME"], "correctIndex": 1, "feedback": "El art. 20-A.2 exige 15 días habiles de anticipación como mínimo; no cumplir ese plazo puede invalidar el carácter de comunicación previa frente a una fiscalización."}, {"id": "M3-A06", "mod": 3, "nivel": "Avanzado", "titulo": "Comunicación previa sobre componente que se superpone con un cauce", "enun": "Se pretende aplicar comunicación previa a un cambio en un tramo que se superpone con un cauce o faja marginal.", "options": ["Si aplica siempre, la comunicación previa cubre cualquier componente sin excepción", "No aplica la comunicación previa, conforme al art. 20-A.3, salvo que el tramo específico no se superponga con dicho supuesto", "Solo se excluye si el cauce está dentro de un ANP"], "correctIndex": 1, "feedback": "El art. 20-A.3 excluye expresamente del régimen de comunicación previa los cambios que se superponen con cauces o fajas marginales."}, {"id": "M3-A07", "mod": 3, "nivel": "Avanzado", "titulo": "Modificación de cronograma de un PAMA", "enun": "Se pretende modificar el cronograma de cumplimiento de compromisos de un PAMA mediante comunicación previa.", "options": ["Solo se excluye si el PAMA está vencido", "No, el literal g) del art. 20-A excluye expresamente a los PAMA y Planes de Cierre de este supuesto", "Si, igual que cualquier otro instrumento de gestión ambiental"], "correctIndex": 1, "feedback": "El literal g) del art. 20-A excluye expresamente a los PAMA y Planes de Cierre de la posibilidad de modificar su cronograma mediante comunicación previa."}, {"id": "M3-A08", "mod": 3, "nivel": "Avanzado", "titulo": "Reemplazo de equipo de control de emisiones por otro equivalente", "enun": "Se reemplaza un equipo de control de emisiones por otro que cumple la misma función (mejora tecnológica).", "options": ["Requiere modificación significativa, por tratarse de un cambio tecnológico", "No requiere comunicación, por ser mantenimiento rutinario", "Es supuesto de comunicación previa del literal c) del art. 20-A, considerando los dispositivos de control evaluados"], "correctIndex": 2, "feedback": "El literal c) del art. 20-A permite la comunicación previa para el reemplazo de dispositivos de protección o control ambiental por otros equivalentes."}, {"id": "M3-A09", "mod": 3, "nivel": "Avanzado", "titulo": "No instalación de un componente auxiliar sin reducir obligaciones", "enun": "Se decide no instalar un componente auxiliar no asociado a la prevención de impactos, sin reducir obligaciones aprobadas.", "options": ["Es supuesto de comunicación previa del literal e) del art. 20-A", "Requiere modificación del instrumento, por tratarse de una variación del diseño aprobado", "No requiere ninguna gestión, al ser una simplificación del proyecto"], "correctIndex": 0, "feedback": "El literal e) del art. 20-A permite tramitar como comunicación previa la no instalación de un componente auxiliar que no reduzca obligaciones aprobadas."}, {"id": "M3-A10", "mod": 3, "nivel": "Avanzado", "titulo": "Cambio que genera residuos no caracterizados", "enun": "Se pretende aplicar comunicación previa para un cambio que implica generar residuos no caracterizados en el instrumento aprobado.", "options": ["Solo se excluye si los residuos son peligrosos, no si son no peligrosos", "Si aplica, siempre que el volumen adicional sea menor al 10% del total aprobado", "No aplica, conforme al art. 20-A.3, que excluye expresamente cambios que generan residuos, efluentes o emisiones no caracterizados"], "correctIndex": 2, "feedback": "El art. 20-A.3 excluye expresamente del régimen de comunicación previa los cambios que generan residuos, efluentes o emisiones no caracterizados en el instrumento."}, {"id": "M4-B01", "mod": 4, "nivel": "Basico", "titulo": "Canteras de uso exclusivo en obra y concesión minera", "enun": "Las canteras de materiales de construcción usadas exclusivamente para una obra vial, dentro del área de servidumbre, requieren concesión minera?", "options": ["No, pero si requieren autorización o registro ante la autoridad minera competente", "No requieren ningún trámite, basta con incluirlas en el EIA", "Si, siempre requieren concesión minera, sin excepción"], "correctIndex": 0, "feedback": "Las canteras de materiales de construcción de uso exclusivo para la obra, dentro de la servidumbre, no requieren concesión minera, pero si autorización/registro ante la autoridad minera regional."}, {"id": "M4-B02", "mod": 4, "nivel": "Basico", "titulo": "Autoridad del derecho de uso de agua superficial", "enun": "Qué autoridad otorga el derecho de uso de agua superficial para un proyecto vial?", "options": ["El MTC, como parte de la certificación ambiental", "La Autoridad Nacional del Agua (ANA)", "El Gobierno Regional, por ser competencia descentralizada"], "correctIndex": 1, "feedback": "La Autoridad Nacional del Agua (ANA) es la entidad competente para otorgar derechos de uso de agua, conforme a la Ley de Recursos Hídricos."}, {"id": "M4-B03", "mod": 4, "nivel": "Basico", "titulo": "Vertimiento de aguas residuales de campamento", "enun": "El campamento de obra requiere verter sus aguas residuales tratadas. Qué autorización necesita?", "options": ["Basta con la aprobación del instrumento de gestión ambiental, sin trámite adicional", "No requiere autorización si el volumen es menor a 5 m3 diarios", "Autorización de la ANA, además de la inclusión en el instrumento de gestión ambiental"], "correctIndex": 2, "feedback": "El vertimiento de aguas residuales requiere autorización de la ANA, además de su inclusión en el instrumento de gestión ambiental del proyecto."}, {"id": "M4-B04", "mod": 4, "nivel": "Basico", "titulo": "Definición de DME", "enun": "Qué es un DME en un proyecto vial?", "options": ["Un Depósito de Material Excedente, donde se dispone el material sobrante de la obra", "Un Documento de Memoria Explicativa del proyecto", "Un Depósito de Materiales Especiales para insumos peligrosos"], "correctIndex": 0, "feedback": "DME significa Depósito de Material Excedente, área destinada a la disposición del material sobrante generado por la obra."}, {"id": "M4-B05", "mod": 4, "nivel": "Basico", "titulo": "Identificación de canteras y DME en línea base", "enun": "Qué debe identificarse desde la línea base respecto a canteras y DME?", "options": ["Su ubicación georreferenciada y características (área, volumen estimado)", "No es necesario, se define en la etapa de ejecución", "Solo su nombre comercial, sin mayor detalle técnico"], "correctIndex": 0, "feedback": "Las canteras y DME deben identificarse desde la línea base con su ubicación georreferenciada y características (área, volumen estimado)."}, {"id": "M4-B06", "mod": 4, "nivel": "Basico", "titulo": "Autorización para obras de aprovechamiento hídrico", "enun": "Qué autorización requiere la ejecución de una toma de agua para la obra?", "options": ["Solo se requiere licencia municipal de construcción", "No requiere trámite si el agua se usa temporalmente durante la obra", "Autorización para la ejecución de obras de aprovechamiento hídrico, otorgada por la ANA"], "correctIndex": 2, "feedback": "La ejecución de
