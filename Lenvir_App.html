 obras de aprovechamiento hídrico (como una toma de agua) requiere autorización de la ANA."}, {"id": "M4-B07", "mod": 4, "nivel": "Basico", "titulo": "Cierre de una cantera", "enun": "Qué corresponde al finalizar la explotación de una cantera de la obra?", "options": ["Basta con abandonar el área sin intervención adicional", "No requiere ninguna medida si la cantera es de propiedad del Estado", "Ejecutar las medidas de cierre aprobadas en el instrumento de gestión ambiental (recontorneo, revegetación, etc.)"], "correctIndex": 2, "feedback": "El cierre de una cantera debe ejecutarse conforme a las medidas de cierre aprobadas en el instrumento de gestión ambiental."}, {"id": "M4-B08", "mod": 4, "nivel": "Basico", "titulo": "Opinión vinculante de la ANA sobre el instrumento ambiental", "enun": "En qué caso es exigible la opinión técnica vinculante de la ANA sobre el instrumento de gestión ambiental?", "options": ["Cuando el proyecto tiene incidencia en recursos hídricos y sus bienes asociados", "Solo si el titular lo solicita voluntariamente", "Nunca es vinculante, solo informativa"], "correctIndex": 0, "feedback": "La opinión de la ANA es vinculante cuando el proyecto tiene incidencia en recursos hídricos y sus bienes asociados."}, {"id": "M4-B09", "mod": 4, "nivel": "Basico", "titulo": "Variación de diseño de un DME dentro de su área y volumen", "enun": "Se ajusta el diseño de ingenieria de un DME, sin exceder el área ni el volumen ya establecidos.", "options": ["No requiere ninguna gestión, por tratarse de un ajuste menor", "Se gestiona como comunicación previa, conforme al Manual de Carreteras y el RPAST", "Siempre requiere una modificación significativa del instrumento"], "correctIndex": 1, "feedback": "La variación de diseño de un DME dentro del área y volumen ya establecidos se gestiona como comunicación previa."}, {"id": "M4-B10", "mod": 4, "nivel": "Basico", "titulo": "Uso de agua para riego o mezcla de concreto", "enun": "El agua usada para riego de vías o mezcla de concreto en obra requiere derecho de uso formal ante la ANA?", "options": ["No, si el uso es temporal durante la obra", "Si, conforme a la Ley de Recursos Hídricos, todo uso de agua requiere derecho otorgado por la ANA, salvo excepciones expresas", "Solo se requiere si el volumen supera los 100 m3 diarios"], "correctIndex": 1, "feedback": "Conforme a la Ley de Recursos Hídricos, todo uso de agua requiere derecho otorgado por la ANA, salvo las excepciones expresamente previstas por la norma."}, {"id": "M4-I01", "mod": 4, "nivel": "Intermedio", "titulo": "Cantera fuera del área de servidumbre", "enun": "Una cantera de uso exclusivo en obra se ubica fuera del área de servidumbre prevista para la exención minera.", "options": ["Solo pierde la exención si se vende material a terceros", "Mantiene la exención sin importar la ubicación, siempre que sea para la misma obra", "Pierde la exención de concesión minera y debe tramitarse conforme al régimen general de concesiones"], "correctIndex": 2, "feedback": "Al ubicarse fuera del área de servidumbre prevista, la cantera pierde la exención de concesión minera y debe sujetarse al régimen general."}, {"id": "M4-I02", "mod": 4, "nivel": "Intermedio", "titulo": "Cantera que excede el volumen de su ficha de caracterización", "enun": "La capacidad de extracción de una cantera supera el volumen establecido en su ficha de caracterización aprobada.", "options": ["Siempre se gestiona como comunicación previa, sin importar el volumen", "Solo requiere informar a la autoridad minera regional", "No aplica la comunicación previa; corresponde tramitar la modificación del instrumento de gestión ambiental"], "correctIndex": 2, "feedback": "Exceder el volumen de la ficha de caracterización no encaja en el supuesto de comunicación previa; corresponde tramitar la modificación del instrumento."}, {"id": "M4-I03", "mod": 4, "nivel": "Intermedio", "titulo": "Integración de disponibilidad hídrica en EIA-sd", "enun": "Es posible integrar la acreditación de disponibilidad hídrica dentro del procedimiento de evaluación de un EIA-sd?", "options": ["Si, aplicando el mecanismo de integración de títulos habilitantes previsto en la Ley N 30327 y su reglamento", "No, deben tramitarse siempre por cuerdas separadas ante la ANA", "Solo es posible si el proyecto es de alcance internacional"], "correctIndex": 0, "feedback": "La integración de títulos habilitantes como la disponibilidad hídrica dentro del EIA-sd es posible conforme a la Ley N 30327 y su reglamento."}, {"id": "M4-I04", "mod": 4, "nivel": "Intermedio", "titulo": "Silencio de la ANA sobre opinión vinculante en EIA-sd", "enun": "La ANA no responde en 45 días habiles sobre la opinión vinculante de un EIA-sd con incidencia hídrica.", "options": ["Se entiende aprobado tácitamente lo señalado respecto a recursos hídricos", "El procedimiento sigue suspendido a la espera de la opinión vinculante de la ANA", "La opinión de la ANA deja de ser vinculante por el solo transcurso del plazo"], "correctIndex": 1, "feedback": "Vencido el plazo sin respuesta de una entidad cuya opinión es vinculante, el procedimiento sigue suspendido hasta que se pronuncie."}, {"id": "M4-I05", "mod": 4, "nivel": "Intermedio", "titulo": "DME ubicado en cauce o faja marginal", "enun": "Un DME se ubica dentro de un cauce o faja marginal de un río.", "options": ["Está sujeto a restricciones especiales y normalmente requiere opinión vinculante de la ANA, sin encajar en comunicación previa", "No requiere ninguna autorización especial, si el material ya fue caracterizado en el EIA", "Se gestiona igual que cualquier DME fuera de cauces"], "correctIndex": 0, "feedback": "Un DME en cauce o faja marginal está sujeto a restricciones especiales, requiere opinión vinculante de la ANA y no encaja en los supuestos de comunicación previa."}, {"id": "M4-I06", "mod": 4, "nivel": "Intermedio", "titulo": "Cantera que excede el uso exclusivo de la obra", "enun": "Una cantera de la obra empieza a vender excedente de material a terceros.", "options": ["Deja de calificar como cantera de uso exclusivo y debe sujetarse al régimen general de concesión minera", "Mantiene la exención, siempre que la venta sea ocasional", "Solo requiere informar el hecho a la DGAAM-MTC"], "correctIndex": 0, "feedback": "Al destinar material a la venta a terceros, la cantera deja de calificar como de uso exclusivo y debe sujetarse al régimen general de concesión minera."}, {"id": "M4-I07", "mod": 4, "nivel": "Intermedio", "titulo": "Vertimiento que cumple LMP sin autorización formal", "enun": "El efluente del campamento cumple los LMP aplicables, pero no cuenta con autorización formal de vertimiento de la ANA.", "options": ["Solo es infracción si el efluente supera los ECA del cuerpo receptor", "No hay infracción si se cumplen los LMP aplicables", "Constituye una infracción, pues el cumplimiento de los LMP no sustituye la obligación de contar con autorización"], "correctIndex": 2, "feedback": "Cumplir los LMP no sustituye la obligación de contar con autorización de vertimiento; su ausencia constituye infracción independiente."}, {"id": "M4-I08", "mod": 4, "nivel": "Intermedio", "titulo": "Cambio de ubicación de fuente de agua sin variar caudal", "enun": "Se cambia la ubicación de una fuente de agua dentro del área de influencia directa, sin variar el caudal ni los compromisos aprobados.", "options": ["Requiere una nueva autorización de la ANA desde cero", "Siempre requiere modificación significativa, por afectar un recurso hídrico", "Puede gestionarse como comunicación previa, según el supuesto de cambio de ubicación de componentes del art. 20-A"], "correctIndex": 2, "feedback": "El cambio de ubicación de una fuente de agua sin variar caudal ni compromisos puede gestionarse como comunicación previa del art. 20-A."}, {"id": "M4-I09", "mod": 4, "nivel": "Intermedio", "titulo": "Plazo de opinión vinculante de la ANA sobre una DIA", "enun": "Cuál es el plazo de opinión vinculante de la ANA sobre una DIA con intervención menor en un cauce?", "options": ["45 días habiles, igual que cualquier instrumento con incidencia hídrica", "18 días habiles, conforme al plazo aplicable a la DIA", "No tiene plazo definido, depende de la carga procesal de la ANA"], "correctIndex": 1, "feedback": "El plazo de opinión vinculante para la DIA es de 18 días habiles, distinto de los 45 días habiles aplicables a EIA-sd y EIA-d."}, {"id": "M4-I10", "mod": 4, "nivel": "Intermedio", "titulo": "Cierre de cantera no ejecutado conforme a lo aprobado", "enun": "El cierre de una cantera no se ejecuta conforme a las medidas aprobadas en el instrumento ambiental.", "options": ["No genera responsabilidad si la cantera fue abandonada antes de la fiscalización", "Constituye un incumplimiento fiscalizable, independientemente de que la cantera ya no este en explotación", "Solo genera responsabilidad si un tercero resulta directamente perjudicado"], "correctIndex": 1, "feedback": "No ejecutar el cierre conforme a lo aprobado constituye un incumplimiento fiscalizable, sin importar que la cantera ya no este en explotación."}, {"id": "M4-A01", "mod": 4, "nivel": "Avanzado", "titulo": "Variación de capacidad de extracción/disposición dentro de la ficha de caracterización", "enun": "Tras el DS 006-2026-MTC, como se gestiona la variación en la capacidad de extracción o disposición en canteras/DME dentro de los volumenes ya establecidos?", "options": ["Requiere autorización previa de la ANA en todos los casos", "Requiere modificación no significativa del instrumento, igual que antes del decreto", "Mediante comunicación previa, conforme al literal t) del art. 20-A incorporado por dicho decreto"], "correctIndex": 2, "feedback": "El literal t) del art. 20-A, incorporado por el DS 006-2026-MTC, habilita la comunicación previa para variaciones de capacidad dentro de los volumenes ya establecidos."}, {"id": "M4-A02", "mod": 4, "nivel": "Avanzado", "titulo": "Variación de diseño conforme al Manual de Carreteras (RD N 03-2018-MTC/14)", "enun": "Se ajusta el diseño de ingenieria de canteras o DME sin exceder área o volumen ya establecido, conforme al Manual de Carreteras.", "options": ["Requiere siempre una modificación significativa del instrumento", "Encaja en el literal u) del art. 20-A del RPAST modificado, como supuesto de comunicación previa", "Requiere aprobación previa del MTC mediante Resolución Directoral específica"], "correctIndex": 1, "feedback": "El literal u) del art. 20-A considera la variación de diseño de canteras/DME conforme al Manual de Carreteras, sin exceder lo aprobado, como comunicación previa."}, {"id": "M4-A03", "mod": 4, "nivel": "Avanzado", "titulo": "Integración de autorización de vertimientos industriales", "enun": "Se requiere integrar la autorización de vertimiento de aguas residuales industriales en el EIA-sd, mientras el MTC no tiene lineamientos propios.", "options": ["Se aplica directamente el TUPA de la ANA, sin relación con la Ley N 30327", "No es posible integrar este permiso hasta que el MTC publique sus lineamientos", "Se aplica supletoriamente el Reglamento del Título II de la Ley N 30327, conforme a la Segunda Disposición Complementaria Final del DS 006-2026-MTC"], "correctIndex": 2, "feedback": "Mientras el MTC no apruebe lineamientos propios, se aplica supletoriamente el Reglamento del Título II de la Ley N 30327 para la integración de este permiso."}, {"id": "M4-A04", "mod": 4, "nivel": "Avanzado", "titulo": "Cantera en zona de amortiguamiento mediante FITSA automática", "enun": "Se pretende tramitar mediante FITSA de aprobación automática una cantera dentro de zona de amortiguamiento de un ANP.", "options": ["Corresponde FITSA de aprobación automática, pero requiere opinión previa del SERNANP igualmente", "No corresponde, pues el art. 11-C excluye expresamente proyectos en ámbitos de ANP, ZA o ACR de la aprobación automática", "Si corresponde, siempre que la cantera no supere los 20 km de longitud"], "correctIndex": 1, "feedback": "El art. 11-C excluye expresamente los proyectos en ámbitos de ANP, zonas de amortiguamiento o ACR de la modalidad de FITSA de aprobación automática."}, {"id": "M4-A05", "mod": 4, "nivel": "Avanzado", "titulo": "DME que excede el volumen autorizado detectado en supervisión", "enun": "Una supervisión de la DGAAM-MTC detecta que el volumen real ejecutado de un DME excede la ficha de caracterización aprobada.", "options": ["Es subsanable solo con una comunicación previa posterior al hallazgo", "No hay infracción si el exceso es menor al 15% del volumen autorizado", "Constituye un hallazgo fiscalizable por exceder lo aprobado, debiendo el titular regularizar mediante la modificación correspondiente"], "correctIndex": 2, "feedback": "Exceder el volumen aprobado en la ficha de caracterización constituye un hallazgo fiscalizable, que debe regularizarse mediante modificación del instrumento, no mediante comunicación previa posterior."}, {"id": "M4-A06", "mod": 4, "nivel": "Avanzado", "titulo": "Reuso de aguas residuales tratadas para actividades de obra", "enun": "Se pretende reusar agua residual tratada para riego de vías o compactación. Requiere algún trámite adicional?", "options": ["Si, requiere autorización de la ANA para el reuso, además de la inclusión en el instrumento de gestión ambiental", "Solo requiere autorización si el reuso es para consumo humano", "No requiere autorización si el agua ya fue tratada y cumple los LMP de vertimiento"], "correctIndex": 0, "feedback": "El reuso de aguas residuales tratadas requiere autorización de la ANA, independientemente de que el efluente cumpla los LMP de vertimiento."}, {"id": "M4-A07", "mod": 4, "nivel": "Avanzado", "titulo": "Cambio operativo en PTAR que si modifica la autorización de vertimiento", "enun": "Se realiza un cambio operativo en la PTAR que modifica las condiciones de la autorización de vertimiento.", "options": ["Solo requiere informar a la ANA, sin relación con el RPAST", "Aplica igual, siempre que mejore la eficiencia del tratamiento", "No aplica la comunicación previa del literal m) del art. 20-A, pues este exige que no se modifiquen dichas condiciones"], "correctIndex": 2, "feedback": "El literal m) del art. 20-A exige expresamente que el cambio no modifique las condiciones de la autorización de vertimiento para calificar como comunicación previa."}, {"id": "M4-A08", "mod": 4, "nivel": "Avanzado", "titulo": "Canteras y DME en certificación fraccionada por tramos", "enun": "Un proyecto certificado por tramos tiene canteras y DME aprobados de forma independiente por cada tramo.", "options": ["Conforme a la Sexta Disposición Complementaria Final del DS 006-2026-MTC, puede no integrarse si la ejecución lo impide, debiendo actualizar cada certificación de forma independiente", "La certificación fraccionada es nula de pleno derecho", "Siempre debe integrar obligatoriamente todas las canteras y DME en una sola certificación"], "correctIndex": 0, "feedback": "La Sexta Disposición Complementaria Final permite que, si la ejecución por tramos impide la integración, cada certificación se modifique o actualice de forma independiente."}, {"id": "M4-A09", "mod": 4, "nivel": "Avanzado", "titulo": "Cantera identificada pero nunca explotada", "enun": "Una cantera identificada en la línea base nunca fue explotada durante la ejecución del proyecto.", "options": ["Debe ejecutarse el cierre igualmente, aunque nunca se haya intervenido el área", "No genera obligación de cierre físico, pero su retiro del instrumento debe evaluarse conforme a las reglas de modificación o comunicación previa aplicables", "Genera responsabilidad automática por incumplimiento del instrumento aprobado"], "correctIndex": 1, "feedback": "Una cantera nunca intervenida no genera obligación de cierre físico, pero su retiro del instrumento debe gestionarse según corresponda (comunicación previa o modificación)."}, {"id": "M4-A10", "mod": 4, "nivel": "Avanzado", "titulo": "Integración de autorización de desbosque en el EIA-sd", "enun": "Se solicita integrar la autorización de desbosque dentro del EIA-sd de un proyecto vial.", "options": ["No es posible integrar la autorización de desbosque, debe tramitarse siempre de forma independiente ante SERFOR", "Solo es integrable si el desbosque es menor a una hectarea", "Está expresamente prevista como uno de los permisos integrables conforme a la Segunda Disposición Complementaria Final del DS 006-2026-MTC"], "correctIndex": 2, "feedback": "La autorización de desbosque está prevista expresamente entre los permisos integrables al EIA-sd conforme a la Segunda Disposición Complementaria Final del decreto."}, {"id": "M5-B01", "mod": 5, "nivel": "Basico", "titulo": "Norma que crea el SINEFA", "enun": "El nuevo fiscalizador pregunta qué ley creó el Sistema Nacional de Evaluación y Fiscalización Ambiental (SINEFA).", "options": ["La Ley N 28611", "La Ley N 27446", "La Ley N 29325"], "correctIndex": 2, "feedback": "La Ley N 29325 es la Ley del Sistema Nacional de Evaluación y Fiscalización Ambiental (SINEFA), que crea el marco institucional de OEFA."}, {"id": "M5-B02", "mod": 5, "nivel": "Basico", "titulo": "Etapas del PAS de OEFA", "enun": "Cuales son las etapas principales del Procedimiento Administrativo Sancionador (PAS) de OEFA?", "options": ["Tres etapas iguales a un proceso judicial penal", "Solo una etapa, resuelta directamente por la autoridad decisora", "Etapa instructora y etapa decisora, diferenciadas conforme al Reglamento del PAS"], "correctIndex": 2, "feedback": "El PAS de OEFA se estructura en una etapa instructora y una etapa decisora, conforme a su Reglamento (RCD N 027-2017-OEFA/CD)."}, {"id": "M5-B03", "mod": 5, "nivel": "Basico", "titulo": "Inicio del PAS", "enun": "Qué autoridad inicia formalmente el PAS dentro de OEFA?", "options": ["El supervisor de campo directamente, sin resolución formal", "La Autoridad Decisora, sin participación de una autoridad instructora", "La Autoridad Instructora, mediante Resolución de inicio del procedimiento"], "correctIndex": 2, "feedback": "El PAS se inicia mediante Resolución de la Autoridad Instructora, no por el supervisor de campo directamente."}, {"id": "M5-B04", "mod": 5, "nivel": "Basico", "titulo": "Subsanación voluntaria", "enun": "Qué efecto tiene subsanar voluntariamente un incumplimiento detectado en supervisión, antes del inicio del PAS?", "options": ["Nunca exime de responsabilidad, solo atenua la sanción", "Da lugar al archivo del expediente de supervisión en ese extremo", "Solo aplica si el administrado paga una multa simbolica"], "correctIndex": 1, "feedback": "Conforme al Reglamento de Supervisión de OEFA, la subsanación voluntaria acreditada antes del inicio del PAS da lugar al archivo del expediente en ese extremo."}, {"id": "M5-B05", "mod": 5, "nivel": "Basico", "titulo": "Clasificación de incumplimientos", "enun": "Cómo clasifica el Reglamento de Supervisión de OEFA los incumplimientos detectados?", "options": ["En leves y trascendentes, según el tipo de riesgo o daño involucrado", "No existe clasificación, todos se tratan igual", "En administrativos y penales"], "correctIndex": 0, "feedback": "El Reglamento de Supervisión clasifica los incumplimientos en leves y trascendentes según el riesgo o daño involucrado."}, {"id": "M5-B06", "mod": 5, "nivel": "Basico", "titulo": "Qué es el RUIAS", "enun": "Qué es el RUIAS de OEFA?", "options": ["El Registro Único de Instrumentos Ambientales Aprobados por SENACE", "El Registro Único de Infractores Ambientales Sancionados", "El Reglamento Único de Infracciones Administrativas Sectoriales"], "correctIndex": 1, "feedback": "El RUIAS es el Registro Único de Infractores Ambientales Sancionados por OEFA."}, {"id": "M5-B07", "mod": 5, "nivel": "Basico", "titulo": "Permanencia en el RUIAS", "enun": "Por cuánto tiempo permanece un administrado sancionado en el RUIAS, en general?", "options": ["1 año, igual para todos los casos", "5 años contados desde la publicación, salvo el plazo especial para reincidentes", "Permanencia indefinida, sin posibilidad de exclusión"], "correctIndex": 1, "feedback": "La permanencia general en el RUIAS es de 5 años desde la publicación, con un plazo especial diferenciado para reincidentes."}, {"id": "M5-B08", "mod": 5, "nivel": "Basico", "titulo": "Medida correctiva en materia ambiental", "enun": "Qué busca una medida correctiva impuesta por OEFA?", "options": ["Solo se aplica si el administrado lo solicita voluntariamente", "Revertir o compensar el daño causado, además de la sanción que corresponda", "Es lo mismo que una multa, solo cambia el nombre"], "correctIndex": 1, "feedback": "Una medida correctiva busca revertir o compensar el daño causado, de forma independiente a la sanción administrativa que se imponga."}, {"id": "M5-B09", "mod": 5, "nivel": "Basico", "titulo": "Perdida de voluntariedad de la subsanación", "enun": "En qué momento se pierde la voluntariedad de una subsanación para efectos del archivo del expediente?", "options": ["Se pierde solo si el administrado lo reconoce expresamente", "Cuando la Autoridad de Supervisión o el supervisor efectúa un requerimiento previo sobre el incumplimiento", "Nunca se pierde, la voluntariedad es siempre reconocida"], "correctIndex": 1, "feedback": "La voluntariedad de la subsanación se pierde cuando existe un requerimiento previo del supervisor o la Autoridad de Supervisión sobre el incumplimiento."}, {"id": "M5-B10", "mod": 5, "nivel": "Basico", "titulo": "Recursos contra una Resolución Directoral de OEFA", "enun": "Qué recursos administrativos proceden contra una Resolución Directoral de OEFA en primera instancia?", "options": ["Recurso de reconsideración o de apelación", "No existe posibilidad de impugnación en sede administrativa", "Solo una acción judicial directa, sin recurso administrativo previo"], "correctIndex": 0, "feedback": "Contra una Resolución Directoral de primera instancia de OEFA proceden los recursos de reconsideración o de apelación en sede administrativa."}, {"id": "M5-I01", "mod": 5, "nivel": "Intermedio", "titulo": "Incumplimiento leve tras requerimiento previo", "enun": "Se detecta un incumplimiento leve, tras un requerimiento previo del supervisor, antes del inicio del PAS.", "options": ["Se archiva automáticamente, sin evaluación adicional, por ser leve", "Siempre se inicia el PAS, sin posibilidad de archivo, por haber existido requerimiento previo", "La autoridad de supervisión puede disponer el archivo del expediente si, pese a no ser voluntaria, el incumplimiento califica como leve y fue subsanado"], "correctIndex": 2, "feedback": "Aun perdida la voluntariedad por el requerimiento previo, la clasificación como incumplimiento leve subsanado puede dar lugar al archivo conforme al Reglamento de Supervisión."}, {"id": "M5-I02", "mod": 5, "nivel": "Intermedio", "titulo": "Clasificación de daño a flora o fauna", "enun": "Un incumplimiento involucra daño a la flora o fauna del área de influencia.", "options": ["Se clasifica como trascendente, conforme al Reglamento de Supervisión de OEFA", "No tiene clasificación específica en la normativa de supervisión", "Se clasifica siempre como leve, salvo que la especie este en peligro crítico"], "correctIndex": 0, "feedback": "Un incumplimiento que involucra daño a flora o fauna se clasifica como trascendente conforme al Reglamento de Supervisión."}, {"id": "M5-I03", "mod": 5, "nivel": "Intermedio", "titulo": "Reincidencia de un administrado sancionado", "enun": "Un administrado ya sancionado reincide en un incumplimiento similar.", "options": ["No tiene ninguna consecuencia adicional respecto al RUIAS", "Genera su inclusión adicional en el RUIAS como infractor reincidente, con un plazo especial de permanencia de 1 año", "Genera automáticamente el cierre definitivo de sus actividades"], "correctIndex": 1, "feedback": "La reincidencia genera una inclusión adicional en el RUIAS con un plazo especial de permanencia distinto al de la sanción original."}, {"id": "M5-I04", "mod": 5, "nivel": "Intermedio", "titulo": "Plazo para presentar descargos al inicio del PAS", "enun": "Cuál es el plazo para presentar descargos tras notificada la Resolución de inicio del PAS?", "options": ["5 días habiles", "20 días habiles", "45 días habiles"], "correctIndex": 1, "feedback": "El plazo para presentar descargos al inicio del PAS de OEFA es de 20 días habiles conforme a su Reglamento."}, {"id": "M5-I05", "mod": 5, "nivel": "Intermedio", "titulo": "Informe Final de Instrucción (IFI)", "enun": "Quién elabora el Informe Final de Instrucción (IFI) dentro del PAS?", "options": ["La Autoridad Decisora, como acto final del procedimiento", "Es un documento informal sin valor probatorio dentro del expediente", "La Autoridad Instructora, recomendando declarar responsabilidad o archivar el procedimiento"], "correctIndex": 2, "feedback": "El IFI es elaborado por la Autoridad Instructora y contiene la recomendación de declarar responsabilidad o archivar el procedimiento."}, {"id": "M5-I06", "mod": 5, "nivel": "Intermedio", "titulo": "Medida preventiva ante riesgo inminente", "enun": "Puede OEFA dictar una medida preventiva antes de concluir el PAS, ante un riesgo ambiental inminente?", "options": ["Solo puede dictarse después de concluido el PAS", "Equivale siempre a la suspensión definitiva de actividades", "Si, puede dictarse antes o al inicio del PAS, independientemente de la sanción que finalmente se determine"], "correctIndex": 2, "feedback": "Una medida preventiva puede dictarse antes o al inicio del PAS ante un riesgo inminente, de forma independiente a la sanción final."}, {"id": "M5-I07", "mod": 5, "nivel": "Intermedio", "titulo": "Reconocimiento de responsabilidad como atenuante", "enun": "Tiene algún efecto reconocer responsabilidad durante el PAS de OEFA?", "options": ["Si, constituye un atenuante reconocido en la normativa de OEFA, según la etapa procesal en que se reconozca", "No existe ningún beneficio por reconocer responsabilidad en sede administrativa", "Solo aplica si el reconocimiento se da después de la resolución final"], "correctIndex": 0, "feedback": "El reconocimiento de responsabilidad constituye un atenuante dentro del régimen de beneficios de OEFA, variando según el momento procesal del reconocimiento."}, {"id": "M5-I08", "mod": 5, "nivel": "Intermedio", "titulo": "Pronto pago de multa", "enun": "Qué beneficio existe por pronto pago de una multa impuesta por OEFA?", "options": ["No genera ningún beneficio adicional al administrado", "Da lugar a un descuento adicional sobre el monto de la multa, dentro del régimen de beneficios vigente", "Solo aplica si el administrado no impugna ni reconoce responsabilidad"], "correctIndex": 1, "feedback": "El pronto pago de la multa genera un descuento adicional conforme al régimen de beneficios vigente de OEFA."}, {"id": "M5-I09", "mod": 5, "nivel": "Intermedio", "titulo": "Aplicación temporal de cambios al Reglamento del PAS", "enun": "Se modifica el Reglamento del PAS de OEFA mientras hay procedimientos en trámite.", "options": ["Se rigen por las normas vigentes al momento en que se iniciaron, salvo que las nuevas disposiciones sean más beneficiosas", "Se rigen siempre por la norma más reciente, sin excepción", "Quedan automáticamente sin efecto y deben reiniciarse"], "correctIndex": 0, "feedback": "Los procedimientos en trámite se rigen por la norma vigente al inicio, salvo que la modificación resulte más favorable para el administrado."}, {"id": "M5-I10", "mod": 5, "nivel": "Intermedio", "titulo": "Responsabilidad administrativa vs civil y penal", "enun": "La responsabilidad administrativa ambiental impuesta por OEFA sustituye a otras responsabilidades por el mismo hecho?", "options": ["No, es independiente de las responsabilidades civiles y penales que puedan derivarse del mismo hecho", "Si, sustituye a cualquier responsabilidad civil o penal derivada del mismo hecho", "Solo se activa si previamente existe una sentencia penal firme"], "correctIndex": 0, "feedback": "La responsabilidad administrativa ambiental es independiente de las responsabilidades civiles y penales derivadas del mismo hecho."}, {"id": "M5-A01", "mod": 5, "nivel": "Avanzado", "titulo": "Criterio principal para graduar multas tras marzo 2026", "enun": "Cuál es el criterio principal para graduar multas según la nueva metodología aprobada por OEFA en marzo de 2026?", "options": ["Se mantiene igual la distinción entre daño potencial y daño real, sin cambios desde 2013", "El criterio principal paso a ser exclusivamente la capacidad económica del infractor", "El 'impacto ambiental negativo', que reemplaza la distinción previa entre daño potencial y daño real"], "correctIndex": 2, "feedback": "La RCD N 00005-2026-OEFA/CD reemplazo el criterio de daño potencial/real por el de 'impacto ambiental negativo' como eje de la graduación de multas."}, {"id": "M5-A02", "mod": 5, "nivel": "Avanzado", "titulo": "Agravante por zona de pobreza", "enun": "Sigue vigente el agravante por ubicación de la infracción en una zona de alta incidencia de pobreza?", "options": ["Si, sigue vigente y se aplica automáticamente", "Nunca existio como criterio en la metodología de OEFA", "No, fue retirado por la RCD N 00005-2026-OEFA/CD"], "correctIndex": 2, "feedback": "El agravante por zona de alta incidencia de pobreza fue retirado por la nueva metodología de calculo de multas de OEFA de marzo de 2026."}, {"id": "M5-A03", "mod": 5, "nivel": "Avanzado", "titulo": "Atenuante por medidas de corrección tras marzo 2026", "enun": "Cómo se trata, según la metodología vigente desde marzo de 2026, la adopción de medidas de corrección tras detectada la infracción?", "options": ["Se mantiene el esquema anterior de agravante de 30% o atenuante de 10%", "Se otorga un atenuante del 38% cuando la empresa toma acciones de corrección, sin agravante ya por no tomar ninguna medida", "Ya no existe ningún atenuante relacionado con medidas de corrección"], "correctIndex": 1, "feedback": "La nueva metodología introduce un atenuante del 38% por adopción de medidas correctivas, eliminando el agravante anterior por inacción."}, {"id": "M5-A04", "mod": 5, "nivel": "Avanzado", "titulo": "Tope máximo de multa de OEFA", "enun": "Cuál es el tope máximo de multa que puede imponer OEFA según su tipificación de sanciones?", "options": ["Hasta 1,000 UIT, como límite general", "Hasta 30,000 UIT, según la gravedad de la infracción", "No existe un tope máximo, se calcula sin límite normativo"], "correctIndex": 1, "feedback": "La tipificación de sanciones de OEFA contempla multas que pueden alcanzar hasta 30,000 UIT, según la gravedad de la infracción."}, {"id": "M5-A05", "mod": 5, "nivel": "Avanzado", "titulo": "Multa por incumplir compromisos del instrumento ambiental", "enun": "A cuánto puede ascender la multa por incumplir los compromisos establecidos en el instrumento de gestión ambiental aprobado?", "options": ["No está tipificada como infracción autonoma", "Puede alcanzar hasta 15,000 UIT, según la tipificación vigente de OEFA", "Tiene un tope fijo de 100 UIT, independientemente de la gravedad"], "correctIndex": 1, "feedback": "El incumplimiento de los compromisos del instrumento de gestión ambiental está tipificado con una multa que puede llegar hasta 15,000 UIT."}, {"id": "M5-A06", "mod": 5, "nivel": "Avanzado", "titulo": "Simplificación de supuestos de omisión o aplicación tardia", "enun": "La metodología anterior distinguia 'omisión total', 'aplicación tardia' o 'aplicación oportuna' de medidas de mitigación. Qué ocurrio con esos supuestos?", "options": ["Se mantienen exactamente igual en la metodología vigente", "Fueron trasladados íntegramente al ámbito penal", "Fueron simplificados por la nueva metodología, que ya no diferencia estos supuestos de la misma manera"], "correctIndex": 2, "feedback": "La nueva metodología de marzo de 2026 simplifico la distinción anterior entre omisión, aplicación tardia y aplicación oportuna de medidas de mitigación."}, {"id": "M5-A07", "mod": 5, "nivel": "Avanzado", "titulo": "Aplicación de la nueva metodología a PAS en trámite", "enun": "Se inicio un PAS antes de la publicación de la RCD N 00005-2026-OEFA/CD. Puede aplicarse la nueva metodología?", "options": ["Se aplica automáticamente sin importar si es más o menos beneficiosa", "Si puede aplicarse, si resulta más beneficiosa para el administrado, conforme a la regla de aplicación de normas más favorables", "Nunca se aplica a procedimientos en trámite, sin excepción"], "correctIndex": 1, "feedback": "Conforme a la regla de aplicación de la norma más beneficiosa, la nueva metodología puede aplicarse a un PAS en trámite si resulta más favorable al administrado."}, {"id": "M5-A08", "mod": 5, "nivel": "Avanzado", "titulo": "Origen sectorial de la metodología reemplazada en 2026", "enun": "Para qué sector se diseñó originalmente la metodología de calculo de multas reemplazada en 2026?", "options": ["Fue diseñada de forma generica para todos los sectores por igual", "Fue diseñada en 2013 pensando principalmente en la gran minería, sector en que OEFA empezo a fiscalizar", "Fue diseñada para el sector Transportes desde su creación"], "correctIndex": 1, "feedback": "La metodología de 2013 se diseñó principalmente para la gran minería, sector inicial de fiscalización de OEFA, lo que motivó su actualización en 2026."}, {"id": "M5-A09", "mod": 5, "nivel": "Avanzado", "titulo": "Fundamento de eliminar el criterio de daño potencial/real", "enun": "Cuál es el fundamento de eliminar el criterio de 'daño potencial o real' en la nueva metodología de OEFA?", "options": ["Busca mayor precisión y objetividad, alineando el calculo de multas al impacto ambiental negativo efectivamente generado", "Busca reducir la recaudación de OEFA por disposición del MEF", "Responde a una sentencia judicial que declaro inconstitucional el criterio anterior"], "correctIndex": 0, "feedback": "El cambio busca mayor precisión y objetividad en el calculo de multas, alineandolo al impacto ambiental negativo efectivamente generado."}, {"id": "M5-A10", "mod": 5, "nivel": "Avanzado", "titulo": "Aplicabilidad de la nueva metodología al sector Transportes", "enun": "Es aplicable directamente la nueva metodología de multas de OEFA a un proyecto vial, mientras la fiscalización siga a cargo de la DGAAM-MTC?", "options": ["No resulta aplicable directamente, pues en ese sector la fiscalización corresponde a la autoridad sectorial hasta que se transfiera a OEFA", "Se aplica solo si el proyecto cuenta con EIA-d aprobado por SENACE", "Se aplica igual, pues la metodología de multas es transversal a cualquier autoridad fiscalizadora del pais"], "correctIndex": 0, "feedback": "Mientras la fiscalización del Sector Transportes no se transfiera a OEFA, la metodología de calculo de multas de OEFA no resulta aplicable directamente a ese sector."}, {"id": "M6-B01", "mod": 6, "nivel": "Basico", "titulo": "Definición de pasivo ambiental", "enun": "Cómo se define un pasivo ambiental en el contexto de un proyecto vial?", "options": ["Cualquier compromiso ambiental pendiente de un proyecto en ejecución actual", "Un gasto contable relacionado con el seguro ambiental del proyecto", "Una afectación ambiental generada por actividades pasadas, no remediada, que persiste en el presente"], "correctIndex": 2, "feedback": "Un pasivo ambiental es una afectación ambiental generada por actividades pasadas que no fue remediada y persiste en el presente."}, {"id": "M6-B02", "mod": 6, "nivel": "Basico", "titulo": "Existencia de ley específica para pasivos viales", "enun": "Existe en el Perú una ley específica de pasivos ambientales para el sector Transportes, equivalente a la minera?", "options": ["No; la Ley N 28271 regula los pasivos ambientales de la actividad minera, no existe una ley equivalente específica para Transportes", "Si, la Ley N 28271 aplica indistintamente a minería y transportes", "Si, el RPAST contiene un capítulo identico al de la Ley N 28271"], "correctIndex": 0, "feedback": "La Ley N 28271 es específica del sector minero; no existe en el Perú una ley equivalente de pasivos ambientales para el sector Transportes."}, {"id": "M6-B03", "mod": 6, "nivel": "Basico", "titulo": "Norma de referencia para suelos contaminados", "enun": "Qué norma sirve de referencia para evaluar contaminación de suelos en un pasivo ambiental vial?", "options": ["El ECA para Suelo, aprobado por el DS N 002-2014-MINAM", "No existe ningún estándar aplicable a suelos en el Perú", "El LMP de la actividad minera"], "correctIndex": 0, "feedback": "El Estándar de Calidad Ambiental (ECA) para Suelo, DS N 002-2014-MINAM, es la referencia para evaluar contaminación de suelos."}, {"id": "M6-B04", "mod": 6, "nivel": "Basico", "titulo": "Hallazgo de pasivo durante la ejecución de obra", "enun": "Durante la ejecución de la obra se halla un depósito clandestino previo con suelo contaminado.", "options": ["Se puede ocultar si no afecta el cronograma de obra", "Debe reportarse a la autoridad competente y evaluarse su tratamiento dentro de la gestión ambiental del proyecto", "Solo se reporta si un tercero lo denuncia primero"], "correctIndex": 1, "feedback": "Todo hallazgo de un pasivo ambiental durante la obra debe reportarse a la autoridad competente, evaluando su tratamiento dentro de la gestión ambiental."}, {"id": "M6-B05", "mod": 6, "nivel": "Basico", "titulo": "Responsabilidad por pasivo de un tercero anterior", "enun": "Quién es responsable de un pasivo ambiental generado por un tercero antes de la llegada del titular actual?", "options": ["Siempre es responsabilidad exclusiva del titular actual del proyecto", "Debe analizarse caso por caso, pudiendo existir responsabilidad solidaria o del Estado según el origen del pasivo", "Nunca genera responsabilidad para nadie si el causante original no es identificable"], "correctIndex": 1, "feedback": "La responsabilidad por un pasivo generado por un tercero anterior debe analizarse caso por caso, conforme a la normativa ambiental general."}, {"id": "M6-B06", "mod": 6, "nivel": "Basico", "titulo": "Infraestructura abandonada y obligaciones ambientales", "enun": "Un puente abandonado, sin operación ni mantenimiento, genera obligaciones ambientales?", "options": ["No, una infraestructura abandonada queda fuera de cualquier obligación ambiental", "Si, su responsable debe evaluar y gestionar los riesgos ambientales asociados a su abandono", "Solo genera obligaciones si colapsa y causa un accidente"], "correctIndex": 1, "feedback": "Una infraestructura abandonada genera la obligación de evaluar y gestionar los riesgos ambientales asociados, sin esperar a que ocurra un accidente."}, {"id": "M6-B07", "mod": 6, "nivel": "Basico", "titulo": "Plan de remediación de un pasivo identificado", "enun": "Qué debe hacerse con el plan de remediación de un pasivo ambiental identificado?", "options": ["Solo se exige si el pasivo afecta a una comunidad organizada", "Debe incorporarse en el instrumento de gestión ambiental o tramitarse ante la autoridad competente, según corresponda", "Es un documento opcional sin necesidad de aprobación previa"], "correctIndex": 1, "feedback": "El plan de remediación de un pasivo identificado debe incorporarse en el instrumento de gestión ambiental o tramitarse ante la autoridad competente."}, {"id": "M6-B08", "mod": 6, "nivel": "Basico", "titulo": "Pasivo vs impacto del proyecto en curso", "enun": "Cuál es la diferencia entre un pasivo ambiental y un impacto ambiental del proyecto en curso?", "options": ["Son exactamente lo mismo, solo cambia el nombre según el contexto", "El pasivo proviene de actividades pasadas no remediadas; el impacto del proyecto en curso se gestiona mediante el instrumento ambiental vigente", "El pasivo solo existe en el sector minero, nunca en otros sectores"], "correctIndex": 1, "feedback": "El pasivo proviene de actividades pasadas no remediadas, mientras que el impacto del proyecto en curso se previene y maneja con el instrumento vigente."}, {"id": "M6-B09", "mod": 6, "nivel": "Basico", "titulo": "Hallazgo de patrimonio arqueologico durante remediación", "enun": "Durante la remoción de un pasivo ambiental se halla un resto arqueologico.", "options": ["Se puede continuar la remediación sin reportar nada, si no afecta el cronograma", "Solo se reporta si el hallazgo es de valor económico evidente", "Debe suspenderse la intervención en esa área y comunicarse a la entidad cultural competente"], "correctIndex": 2, "feedback": "Ante un hallazgo de patrimonio cultural o arqueologico durante la remediación, debe suspenderse la intervención y comunicarse a la entidad cultural competente."}, {"id": "M6-B10", "mod": 6, "nivel": "Basico", "titulo": "Suelo por encima del ECA Suelo aplicable", "enun": "Qué corresponde cuando un suelo presenta concentración de contaminantes por encima del ECA Suelo aplicable?", "options": ["Solo requiere remediación si se demuestra daño a la salud de alguna persona específica", "Es aceptable si el área no está habitada", "Requiere acciones de remediación conforme a los criterios técnicos de la autoridad ambiental competente"], "correctIndex": 2, "feedback": "Un suelo que excede el ECA Suelo aplicable requiere acciones de remediación conforme a los criterios técnicos de la autoridad ambiental."}, {"id": "M6-I01", "mod": 6, "nivel": "Intermedio", "titulo": "Pasivo identificado antes de iniciar un nuevo proyecto", "enun": "Se identifica un pasivo dentro del área de influencia directa de un proyecto vial nuevo, antes de iniciar la obra.", "options": ["No es relevante para el nuevo proyecto, pues corresponde a un hecho anterior", "Debe identificarse y caracterizarse en la línea base, previendo su tratamiento en el instrumento de gestión ambiental", "Se resuelve automáticamente al aprobarse el instrumento, sin medidas adicionales"], "correctIndex": 1, "feedback": "Un pasivo identificado antes de iniciar un proyecto nuevo debe caracterizarse en la línea base y preverse su tratamiento en el instrumento ambiental."}, {"id": "M6-I02", "mod": 6, "nivel": "Intermedio", "titulo": "Pasivo generado por un anterior concesionario", "enun": "Se identifica un pasivo generado por un anterior concesionario vial, ya extinguida la concesión.", "options": ["Siempre es responsabilidad del nuevo concesionario, sin excepción", "Debe analizarse el contrato de concesión y la normativa aplicable, pudiendo derivar responsabilidad al Estado o al excontratista", "Se extingue automáticamente al finalizar el contrato de concesión, sin responsable"], "correctIndex": 1, "feedback": "La responsabilidad por un pasivo de un anterior concesionario debe determinarse conforme al contrato de concesión y la normativa aplicable, no se asume automáticamente."}, {"id": "M6-I03", "mod": 6, "nivel": "Intermedio", "titulo": "DME abandonado sin cierre conforme a lo aprobado", "enun": "Se halla un DME abandonado de un proyecto vial concluido años atrás, sin cierre conforme a lo aprobado.", "options": ["Constituye un pasivo ambiental que debe gestionarse conforme a la normativa vigente, identificando al responsable que corresponda", "Solo se atiende si el área es reclamada para un nuevo proyecto", "No genera ninguna obligación, al haber transcurrido el tiempo de ejecución del proyecto original"], "correctIndex": 0, "feedback": "Un DME sin cierre conforme a lo aprobado constituye un pasivo ambiental que debe gestionarse identificando al responsable correspondiente."}, {"id": "M6-I04", "mod": 6, "nivel": "Intermedio", "titulo": "Suelo con hidrocarburos descubierto en ampliación de vía", "enun": "Se descubre suelo contaminado con hidrocarburos por un derrame antiguo no reportado, durante una ampliación de vía.", "options": ["Se puede remediar de forma discreta, sin reportar el hallazgo", "No requiere remediación si el derrame ocurrio hace más de 10 años", "Debe reportarse a la autoridad y evaluarse conforme al ECA Suelo, incorporando medidas de remediación al instrumento de la ampliación"], "correctIndex": 2, "feedback": "El hallazgo debe reportarse y evaluarse conforme al ECA Suelo, incorporando medidas de remediación al instrumento de gestión ambiental de la ampliación."}, {"id": "M6-I05", "mod": 6, "nivel": "Intermedio", "titulo": "Pasivo dentro de una concesión vigente generado antes de la entrega", "enun": "Se identifica un pasivo dentro de una concesión vial vigente, generado antes de su entrega en concesión.", "options": ["Es responsabilidad exclusiva y automática del concesionario actual, por estar dentro de su área de concesión", "Es responsabilidad exclusiva del Estado, sin posibilidad de traslado contractual", "La responsabilidad debe determinarse conforme a las clausulas del contrato y la normativa aplicable, no se asume automáticamente por el concesionario actual"], "correctIndex": 2, "feedback": "La responsabilidad por un pasivo generado antes de la entrega en concesión debe determinarse conforme al contrato y la normativa, no se asume automáticamente."}, {"id": "M6-I06", "mod": 6, "nivel": "Intermedio", "titulo": "Pasivo que afecta un cuerpo de agua", "enun": "Un pasivo identificado afecta un cuerpo de agua cercano a la vía.", "options": ["Solo se requiere si el pasivo está dentro de un área natural protegida", "Corresponde solicitar opinión técnica a la entidad competente (como la ANA), similar a cualquier instrumento que incida en recursos hídricos", "Nunca se requiere opinión de otras entidades para pasivos ambientales"], "correctIndex": 1, "feedback": "Cuando un pasivo afecta un cuerpo de agua, corresponde solicitar opinión técnica a la entidad competente en recursos hídricos."}, {"id": "M6-I07", "mod": 6, "nivel": "Intermedio", "titulo": "Pasivo de origen no determinado con certeza", "enun": "No puede determinarse con certeza el origen de un pasivo ambiental identificado.", "options": ["Se traslada automáticamente al titular del proyecto que lo descubre", "Queda sin solución posible y no se remedia", "Debe evaluarse conforme a los principios de la normativa ambiental general, pudiendo corresponder al Estado la remediación ante ausencia de responsable"], "correctIndex": 2, "feedback": "Ante un pasivo de origen incierto, se aplican los principios generales del Derecho Ambiental, pudiendo corresponder al Estado un rol subsidiario en su remediación."}, {"id": "M6-I08", "mod": 6, "nivel": "Intermedio", "titulo": "Plazo de reporte del hallazgo de un pasivo en obra", "enun": "En qué plazo debe reportarse el hallazgo de un pasivo ambiental durante la ejecución de obra?", "options": ["No existe obligación de reportarlo si no afecta directamente la seguridad de la obra", "De forma oportuna a la autoridad ambiental y a la EFA competente, similar a la lógica de reporte de emergencias del RPAST", "Solo se reporta al concluir la obra, en el informe final"], "correctIndex": 1, "feedback": "El hallazgo de un pasivo ambiental debe reportarse oportunamente a la autoridad ambiental y a la EFA competente, no esperar al informe final."}, {"id": "M6-I09", "mod": 6, "nivel": "Intermedio", "titulo": "Inclusión de medidas para pasivos en el PMA", "enun": "Un proyecto de mejoramiento vial interviene un área con antecedentes de contaminación. Debe el PMA contemplar esto?", "options": ["Se gestiona completamente fuera del instrumento ambiental, mediante un trámite distinto", "No es necesario, el PMA solo cubre impactos futuros del proyecto en evaluación", "Si, debe incluirse un componente específico de manejo o remediación de dicho pasivo dentro del instrumento de gestión ambiental"], "correctIndex": 2, "feedback": "El PMA de un proyecto que interviene un área con antecedentes de contaminación debe incluir un componente específico de manejo del pasivo identificado."}, {"id": "M6-I10", "mod": 6, "nivel": "Intermedio", "titulo": "Pasivo identificado en un EIA-d en evaluación por SENACE", "enun": "Se identifica un pasivo ambiental durante la evaluación de un EIA-d por parte de SENACE.", "options": ["Se resuelve siempre en un procedimiento totalmente independiente del EIA-d", "Su tratamiento puede formar parte de las observaciones del proceso de evaluación, exigiendo incorporar medidas específicas antes de aprobar", "SENACE no tiene competencia para observar temas relacionados con pasivos ambientales"], "correctIndex": 1, "feedback": "SENACE puede formular observaciones sobre el tratamiento de un pasivo identificado durante la evaluación del EIA-d, exigiendo medidas específicas previas a la aprobación."}, {"id": "M6-A01", "mod": 6, "nivel": "Avanzado", "titulo": "Aplicabilidad directa de la Ley de pasivos mineros a un pasivo vial", "enun": "Puede aplicarse directamente la Ley N 28271 (pasivos mineros) a un pasivo identificado en un proyecto vial?", "options": ["No es aplicable directamente, al ser una ley específica del sector minero; el pasivo vial se rige por la normativa ambiental general y sectorial de Transportes", "Es aplicable por analogía obligatoria, conforme a la Ley General del Ambiente", "Es aplicable solo si el pasivo proviene de una actividad minera anterior dentro del derecho de vía"], "correctIndex": 0, "feedback": "La Ley N 28271 no es aplicable directamente a pasivos viales; estos se rigen por la normativa ambiental general y sectorial de Transportes."}, {"id": "M6-A02", "mod": 6, "nivel": "Avanzado", "titulo": "Pasivo no declarado detectado en supervisión", "enun": "Una supervisión de la DGAAM-MTC detecta un pasivo ambiental no declarado previamente por el titular en su instrumento ambiental.", "options": ["Puede constituir un hallazgo fiscalizable, debiendo el titular regularizar su gestión, sin perjuicio de determinar el origen y responsable del pasivo", "Se resuelve automáticamente declarando la nulidad del instrumento ambiental aprobado", "No genera ninguna consecuencia si el titular no era el causante original"], "correctIndex": 0, "feedback": "Un pasivo no declarado detectado en supervisión puede ser un hallazgo fiscalizable, exigiendo regularización sin perjuicio del análisis sobre su origen y responsable."}, {"id": "M6-A03", "mod": 6, "nivel": "Avanzado", "titulo": "Pasivo en certificación ambiental fraccionada por tramos", "enun": "Se identifica un pasivo en un tramo con certificación ambiental fraccionada (Sexta Disposición Complementaria Final del DS 006-2026-MTC).", "options": ["Se resuelve necesariamente en la certificación ambiental integrada de todo el proyecto", "Su tratamiento corresponde evaluarse en el marco de la certificación específica de ese tramo, conforme a las reglas de integración o no integración previstas", "No es posible atender pasivos ambientales en proyectos con certificación fraccionada"], "correctIndex": 1, "feedback": "En proyectos con certificación fraccionada por tramos, el tratamiento del pasivo se evalúa en el marco de la certificación específica de ese tramo."}, {"id": "M6-A04", "mod": 6, "nivel": "Avanzado", "titulo": "Remediación de pasivo que requiere intervenir un cauce", "enun": "La remediación de un pasivo ambiental requiere intervenir un cauce o faja marginal.", "options": ["No puede tramitarse como comunicación previa del art. 20-A, al estar expresamente excluidos estos supuestos conforme al numeral 20-A.3", "Puede tramitarse siempre como comunicación previa, al ser una medida correctiva y no un nuevo componente", "Solo requiere informar a la ANA, sin relación con el RPAST"], "correctIndex": 0, "feedback": "La intervención en cauces o fajas marginales está expresamente excluida del régimen de comunicación previa, sin importar que se trate de una medida correctiva."}, {"id": "M6-A05", "mod": 6, "nivel": "Avanzado", "titulo": "Pasivo identificado en un proyecto que se acoge al PAMA", "enun": "Se identifica un pasivo ambiental en un proyecto que se acoge al PAMA conforme a la Tercera Disposición Complementaria Final del DS 006-2026-MTC.", "options": ["El PAMA nunca puede incluir pasivos ambientales", "Su atención puede incorporarse dentro del propio PAMA, como parte de la adecuación ambiental de la actividad en curso", "El pasivo ambiental impide automáticamente el acogimiento al PAMA"], "correctIndex": 1, "feedback": "El PAMA puede incorporar la atención de un pasivo identificado como parte de la adecuación ambiental de la actividad en curso."}, {"id": "M6-A06", "mod": 6, "nivel": "Avanzado", "titulo": "Hallazgo de pasivo en área de comunidades nativas", "enun": "Se halla un pasivo ambiental en un área de comunidades nativas, durante un mantenimiento vial bajo comunicación previa.", "options": ["Solo se excluye si la comunidad nativa cuenta con título de propiedad inscrito", "No aplica la comunicación previa, conforme al numeral 20-A.3, que excluye expresamente las áreas de comunidades nativas; corresponde un tratamiento específico", "Aplica igual, siempre que la comunidad no se oponga expresamente"], "correctIndex": 1, "feedback": "El art. 20-A.3 excluye expresamente las áreas de comunidades nativas del régimen de comunicación previa, requiriendo un tratamiento específico ante la autoridad competente."}, {"id": "M6-A07", "mod": 6, "nivel": "Avanzado", "titulo": "Rol subsidiario del Estado ante pasivo sin responsable identificable", "enun": "No se identifica un responsable de un pasivo ambiental vial. Qué rol puede asumir el Estado?", "options": ["La responsabilidad recae automáticamente en el primer titular del SEIA que solicite cualquier instrumento sobre esa área", "Puede asumir un rol subsidiario en la remediación, conforme a los principios de prevención y responsabilidad ambiental de la Ley N 28611", "El Estado nunca puede asumir la remediación de pasivos ambientales"], "correctIndex": 1, "feedback": "Ante la ausencia de un responsable identificado, el Estado puede asumir un rol subsidiario en la remediación, conforme a los principios de la Ley General del Ambiente."}, {"id": "M6-A08", "mod": 6, "nivel": "Avanzado", "titulo": "Pasivo como componente de comunicación previa por reubicación", "enun": "Se pretende gestionar la atención de un pasivo como reubicación de componente bajo comunicación previa, sin alterar impactos evaluados.", "options": ["No corresponde, pues el art. 20-A regula cambios de componentes del proyecto en evaluación, no la gestión de pasivos ambientales preexistentes", "Corresponde solo si el pasivo tiene menos de 5 años de antiguedad", "Corresponde siempre, pues cualquier cambio menor en obra puede tramitarse como comunicación previa"], "correctIndex": 0, "feedback": "El art. 20-A regula cambios de componentes del proyecto evaluado, no la gestión de pasivos ambientales preexistentes; no corresponde forzar esa figura."}, {"id": "M6-A09", "mod": 6, "nivel": "Avanzado", "titulo": "Pasivos e integración de títulos habilitantes en EIA-sd", "enun": "Puede incluirse la atención de un pasivo ambiental dentro de la integración de títulos habilitantes prevista para el EIA-sd?", "options": ["Es obligatorio integrarlo, de lo contrario el EIA-sd es nulo", "No forma parte de los supuestos de integración previstos en la Segunda Disposición Complementaria Final del DS 006-2026-MTC, limitados a permisos específicos", "Forma parte automáticamente de cualquier integración de títulos habilitantes"], "correctIndex": 1, "feedback": "La atención de pasivos ambientales no está entre los supuestos de integración de títulos habilitantes previstos, que se limitan a permisos específicos como recursos hídricos y desbosque."}, {"id": "M6-A10", "mod": 6, "nivel": "Avanzado", "titulo": "Pasivo detectado en zona de emergencia vial declarada", "enun": "Se detecta un pasivo ambiental en una zona declarada en emergencia vial conforme al art. 11-A del RPAST modificado.", "options": ["La declaratoria de emergencia exime automáticamente de cualquier obligación relacionada con pasivos ambientales en la zona", "La excepción del art. 11-A se limita a las acciones de la emergencia vial; no exime de gestionar el pasivo preexistente conforme a la normativa aplicable", "El pasivo ambiental se considera parte de la emergencia y se reporta únicamente mediante el Formato de Reporte de Emergencia"], "correctIndex": 1, "feedback": "La excepción del art. 11-A solo cubre las acciones de prevención, mitigación y control de la emergencia vial, no exime de gestionar pasivos ambientales preexistentes."}, {"id": "M7-B01", "mod": 7, "nivel": "Basico", "titulo": "Norma marco de residuos sólidos", "enun": "Cuál es la norma marco de gestión de residuos sólidos en el Perú?", "options": ["La Ley N 27446, Ley del SEIA", "El Decreto Legislativo N 1278, Ley de Gestión Integral de Residuos Sólidos", "La Ley N 28611, Ley General del Ambiente, exclusivamente"], "correctIndex": 1, "feedback": "El Decreto Legislativo N 1278 es la Ley de Gestión Integral de Residuos Sólidos, norma marco vigente en esta materia."}, {"id": "M7-B02", "mod": 7, "nivel": "Basico", "titulo": "Qué es una EO-RS", "enun": "Qué es una EO-RS en el manejo de residuos sólidos?", "options": ["Un tipo de instrumento de gestión ambiental complementario", "Una Entidad de Observación y Reporte Socioambiental", "Una Empresa Operadora de Residuos Sólidos, autorizada para su manejo"], "correctIndex": 2, "feedback": "La EO-RS es una Empresa Operadora de Residuos Sólidos, autorizada para su recolección, transporte, tratamiento o disposición final."}, {"id": "M7-B03", "mod": 7, "nivel": "Basico", "titulo": "Qué es el MRSP", "enun": "Qué documento acompana el traslado de residuos peligrosos generados en obra?", "options": ["Es un documento opcional, solo exigido para residuos de gran volumen", "Solo se exige para residuos peligrosos de origen industrial, no de obra civil", "El Manifiesto de Residuos Sólidos Peligrosos (MRSP), con copias para generador, transportista y disposición final"], "correctIndex": 2, "feedback": "El MRSP acompana el traslado de residuos peligrosos, con copias diferenciadas para el generador, el transportista y la disposición final."}, {"id": "M7-B04", "mod": 7, "nivel": "Basico", "titulo": "Conservación del MRSP", "enun": "Por cuánto tiempo deben conservar el MRSP el generador y la EO-RS?", "options": ["5 años, para fines de supervisión y fiscalización", "6 meses", "Indefinidamente, sin plazo de conservación"], "correctIndex": 0, "feedback": "El generador y la EO-RS deben conservar el MRSP por 5 años, para fines de supervisión y fiscalización."}, {"id": "M7-B05", "mod": 7, "nivel": "Basico", "titulo": "Tratamiento dentro de las instalaciones del generador", "enun": "Puede el generador tratar sus residuos dentro de sus propias instalaciones?", "options": ["Es posible sin ninguna condición adicional", "Nunca es posible, siempre debe trasladarse a una EO-RS externa", "Si, si está contemplado previamente en su instrumento de gestión ambiental, sin requerir Registro de EO-RS en ese caso"], "correctIndex": 2, "feedback": "El tratamiento dentro de las instalaciones del propio generador es posible si está contemplado en su instrumento de gestión ambiental."}, {"id": "M7-B06", "mod": 7, "nivel": "Basico", "titulo": "Accidente con derrame de residuos peligrosos en transporte", "enun": "Ocurre un derrame de residuos peligrosos durante su transporte. Qué corresponde?", "options": ["Se reporta únicamente al MTC, sin involucrar a otras entidades", "Solo se reporta si hay lesionados", "Reportarlo a las autoridades competentes y aplicar de inmediato el Plan de Contingencias de la EO-RS"], "correctIndex": 2, "feedback": "Ante un derrame de residuos peligrosos, debe reportarse a las autoridades competentes y aplicarse de inmediato el Plan de Contingencias de la EO-RS."}, {"id": "M7-B07", "mod": 7, "nivel": "Basico", "titulo": "Plazo de reporte de la DGASA-MTC a otras entidades", "enun": "En qué plazo la DGASA-MTC debe reportar a otras entidades un accidente con derrame de residuos peligrosos?", "options": ["72 horas", "No existe plazo específico", "No mayor a 24 horas de haber tomado conocimiento"], "correctIndex": 2, "feedback": "La DGASA-MTC debe informar a MINAM, MINSA, OEFA y otras entidades dentro de un plazo no mayor a 24 horas de tomado conocimiento."}, {"id": "M7-B08", "mod": 7, "nivel": "Basico", "titulo": "Accidente con residuos no peligrosos", "enun": "Ocurre un accidente con derrame de residuos NO peligrosos durante el transporte.", "options": ["El generador debe informar a la autoridad de fiscalización dentro de las 48 horas siguientes", "Se reporta en el mismo plazo de 24 horas que los residuos peligrosos", "No requiere ningún reporte, al no ser residuos peligrosos"], "correctIndex": 0, "feedback": "El generador debe informar a la autoridad de fiscalización dentro de las 48 horas siguientes a un accidente con residuos no peligrosos."}, {"id": "M7-B09", "mod": 7, "nivel": "Basico", "titulo": "Devolución del MRSP", "enun": "En qué plazo debe devolver la EO-RS de disposición final el MRSP al generador?", "options": ["Dentro de las 48 horas siguientes", "No existe obligación de devolución del MRSP", "Dentro de los 15 días calendario siguientes a la recepción de los residuos"], "correctIndex": 2, "feedback": "La EO-RS de disposición final debe devolver el MRSP al generador dentro de los 15 días calendario siguientes a la recepción de los residuos."}, {"id": "M7-B10", "mod": 7, "nivel": "Basico", "titulo": "Información inexacta en el MRSP", "enun": "Se detecta información inexacta consignada en un MRSP.", "options": ["Solo genera responsabilidad para el transportista", "No genera ninguna consecuencia si el error es involuntario", "La EO-RS de disposición final debe comunicar el hecho a la entidad de fiscalización, sin perjuicio de las acciones legales correspondientes"], "correctIndex": 2, "feedback": "Ante información inexacta en el MRSP, la EO-RS de disposición final debe comunicarlo a la entidad de fiscalización, sin perjuicio de las acciones legales correspondientes."}, {"id": "M7-I01", "mod": 7, "nivel": "Intermedio", "titulo": "Transporte de residuos peligrosos no municipales", "enun": "Cómo debe transportarse residuos sólidos peligrosos no municipales generados en una obra vial?", "options": ["A través de una EO-RS, conforme a la normativa del MTC y la normativa municipal provincial aplicable", "Con el propio personal de la obra, sin necesidad de una EO-RS registrada", "Solo requiere EO-RS si el volumen supera una tonelada"], "correctIndex": 0, "feedback": "El transporte de residuos peligrosos generados en obra debe realizarse a través de una EO-RS registrada, conforme a la normativa aplicable."}, {"id": "M7-I02", "mod": 7, "nivel": "Intermedio", "titulo": "Residuos de construcción y demolición", "enun": "Cómo se gestionan los escombros generados en una obra vial?", "options": ["Conforme a la normativa de residuos de la construcción y demolición, considerando su disposición final autorizada", "No requieren ninguna gestión formal, al no ser residuos domesticos", "Se consideran automáticamente residuos peligrosos, por su origen en obra civil"], "correctIndex": 0, "feedback": "Los residuos de construcción y demolición se gestionan conforme a su normativa específica, considerando su disposición final autorizada."}, {"id": "M7-I03", "mod": 7, "nivel": "Intermedio", "titulo": "Almacenamiento temporal de residuos peligrosos en obra", "enun": "Cómo debe almacenarse temporalmente un residuo peligroso antes de su traslado?", "options": ["No requiere ninguna condición especial si el almacenamiento es temporal (menos de una semana)", "Puede almacenarse junto a los residuos no peligrosos, sin segregación, si el volumen es bajo", "En condiciones que prevengan riesgos ambientales y a la salud, conforme al instrumento de gestión ambiental y la normativa de residuos"], "correctIndex": 2, "feedback": "El almacenamiento temporal de residuos peligrosos debe prevenir riesgos ambientales y a la salud, conforme al instrumento ambiental y la normativa de residuos."}, {"id": "M7-I04", "mod": 7, "nivel": "Intermedio", "titulo": "Cadena de custodia de residuos peligrosos", "enun": "En qué documento se sustenta principalmente la cadena de custodia de residuos peligrosos desde su generación hasta su disposición final?", "options": ["No existe obligación de documentar la cadena de custodia en el Perú", "En el MRSP, que documenta cada etapa del manejo (generador, transportista, disposición final)", "Únicamente en el registro interno del generador"], "correctIndex": 1, "feedback": "La cadena de custodia de residuos peligrosos se sustenta principalmente en el MRSP, documentando cada etapa de su manejo."}, {"id": "M7-I05", "mod": 7, "nivel": "Intermedio", "titulo": "Solidificación de residuos peligrosos", "enun": "Una EO-RS propone tratar residuos peligrosos mediante solidificación. Es un proceso válido?", "options": ["Si, es un proceso válido conforme a las normas técnicas aplicables, integrando los residuos en un material sólido estructural", "Está prohibido en el Perú para cualquier tipo de residuo peligroso", "Solo puede aplicarse a residuos de origen minero"], "correctIndex": 0, "feedback": "La solidificación es un proceso de tratamiento válido conforme a las normas técnicas aplicables a residuos peligrosos."}, {"id": "M7-I06", "mod": 7, "nivel": "Intermedio", "titulo": "Campamento alejado sin EO-RS cercana", "enun": "Un campamento en zona alejada genera residuos peligrosos y no hay EO-RS cercana.", "options": ["Puede almacenarlos indefinidamente en el campamento mientras dure la obra", "Puede disponerlos en un relleno sanitario municipal común, sin tratamiento especial", "El titular debe gestionar el traslado mediante una EO-RS autorizada, aun si implica mayor distancia o costo logistico"], "correctIndex": 2, "feedback": "El titular debe gestionar el traslado mediante una EO-RS autorizada, sin importar la distancia o el costo logistico que implique."}, {"id": "M7-I07", "mod": 7, "nivel": "Intermedio", "titulo": "Exactitud de la información del MRSP", "enun": "Qué exigencia tiene la información sobre cantidad y tipo de residuo que consigna el MRSP?", "options": ["Debe ser exacta y verificable, dado el carácter de declaración jurada de la documentación ambiental en general", "Puede ser aproximada, sin mayor exigencia de exactitud", "Solo es relevante el peso total, sin detalle del tipo de residuo"], "correctIndex": 0, "feedback": "La información del MRSP debe ser exacta y verificable, al tener carácter de declaración jurada como toda la documentación ambiental."}, {"id": "M7-I08", "mod": 7, "nivel": "Intermedio", "titulo": "Residuos del mantenimiento de maquinaria pesada", "enun": "Cómo deben gestionarse los aceites usados, filtros y trapos contaminados del mantenimiento de maquinaria?", "options": ["Pueden quemarse en obra si no hay relleno de seguridad cercano", "Como residuos peligrosos, con manejo, transporte y disposición a través de una EO-RS autorizada", "Como residuos no peligrosos si la cantidad generada es menor a 50 kg mensuales"], "correctIndex": 1, "feedback": "Los residuos del mantenimiento de maquinaria pesada (aceites, filtros, trapos contaminados) se gestionan como residuos peligrosos a través de una EO-RS."}, {"id": "M7-I09", "mod": 7, "nivel": "Intermedio", "titulo": "Plan de Manejo de Residuos en el instrumento ambiental", "enun": "Qué debe identificar el Plan de Manejo de Residuos Sólidos dentro del instrumento de gestión ambiental?", "options": ["Los tipos de residuos generados, su manejo diferenciado y las EO-RS o infraestructuras autorizadas a utilizar", "Solo se exige para proyectos EIA-d, no para DIA o EIA-sd", "Es un documento generico, sin necesidad de identificar EO-RS específicas"], "correctIndex": 0, "feedback": "El Plan de Manejo de Residuos debe identificar los tipos de residuos, su manejo diferenciado y las EO-RS o infraestructuras autorizadas a utilizar."}, {"id": "M7-I10", "mod": 7, "nivel": "Intermedio", "titulo": "Fiscalización del manejo de residuos en obra vial hoy", "enun": "Quién fiscaliza actualmente el manejo de residuos sólidos en una obra vial?", "options": ["La EFA competente del sector, que en Transportes es actualmente la DGAAM-MTC, mientras no se transfiera a OEFA", "Corresponde siempre y exclusivamente a las municipalidades", "Corresponde a OEFA desde la vigencia del Decreto Legislativo N 1278"], "correctIndex": 0, "feedback": "La fiscalización del manejo de residuos en obra vial corresponde actualmente a la DGAAM-MTC, mientras no se transfiera la función a OEFA."}, {"id": "M7-A01", "mod": 7, "nivel": "Avanzado", "titulo": "Modificación del DL 1278 sobre industrialización del reciclaje", "enun": "Qué introdujo la modificación posterior de los artículos 6, 15 y 21 del Decreto Legislativo N 1278?", "options": ["Elimino la obligación de utilizar EO-RS para residuos peligrosos", "La industrialización del reciclaje dentro del desarrollo de la Ley de Gestión Integral de Residuos Sólidos", "Traslado la competencia de fiscalización de residuos sólidos a SENACE"], "correctIndex": 1, "feedback": "La modificación del Decreto Legislativo N 1278 introdujo la industrialización del reciclaje dentro de la Ley de Gestión Integral de Residuos Sólidos."}, {"id": "M7-A02", "mod": 7, "nivel": "Avanzado", "titulo": "Cambio en composición de residuos no caracterizada", "enun": "Un cambio operativo de obra genera una composición de residuos no caracterizada en el instrumento ambiental aprobado.", "options": ["Se gestiona siempre como comunicación previa, sin excepción, si el cambio es menor", "No requiere ninguna gestión, pues los residuos siempre se regulan aparte del instrumento ambiental", "No puede tramitarse como comunicación previa del art. 20-A del RPAST modificado, al estar expresamente excluida la generación de residuos no caracterizados"], "correctIndex": 2, "feedback": "El art. 20-A.3 excluye expresamente del régimen de comunicación previa la generación de residuos no caracterizados en el instrumento aprobado."}, {"id": "M7-A03", "mod": 7, "nivel": "Avanzado", "titulo": "Reporte de derrame en vía concesionada", "enun": "Ocurre un derrame de residuos peligrosos en una vía bajo concesión. A quién debe informarse dentro de las 24 horas a cargo de la DGASA-MTC?", "options": ["Solo al concedente de la obra, sin involucrar a otras entidades estatales", "El plazo de 24 horas solo aplica si el derrame ocurre dentro de un área urbana", "A MINAM, MINSA, OEFA y otras entidades pertinentes, sin perjuicio de aplicar de inmediato el Plan de Contingencias de la EO-RS"], "correctIndex": 2, "feedback": "El reporte de un derrame de residuos peligrosos debe alcanzar a MINAM, MINSA, OEFA y otras entidades pertinentes dentro de 24 horas, sin perjuicio del Plan de Contingencias."}, {"id": "M7-A04", "mod": 7, "nivel": "Avanzado", "titulo": "Residuos generados en una emergencia vial", "enun": "Se generan residuos peligrosos durante una acción de emergencia vial reportada mediante el Formato de Reporte de Emergencia.", "options": ["Las medidas de manejo de dichos residuos constituyen obligaciones fiscalizables, debiendo incluirse en la siguiente modificación o actualización del instrumento", "Solo se reportan si superan un volumen determinado", "Quedan completamente exentas de cualquier obligación posterior, por haberse generado en una emergencia"], "correctIndex": 0, "feedback": "Aunque generados en una emergencia vial, las medidas de manejo de esos residuos son obligaciones fiscalizables que deben incorporarse al instrumento ambiental."}, {"id": "M7-A05", "mod": 7, "nivel": "Avanzado", "titulo": "EO-RS con registro vencido durante el servicio", "enun": "El registro de una EO-RS vence durante la ejecución de un contrato de transporte de residuos peligrosos.", "options": ["Es irrelevante si la EO-RS tenia registro vigente al momento de la firma del contrato", "Solo es responsabilidad de la EO-RS, nunca del generador que la contrata", "El generador debe verificar que la EO-RS mantenga su registro vigente durante todo el servicio, pues contratar sin registro vigente compromete la validez del manejo"], "correctIndex": 2, "feedback": "El generador debe verificar que la EO-RS mantenga registro vigente durante todo el servicio; contratarla sin registro vigente compromete la validez del manejo realizado."}, {"id": "M7-A06", "mod": 7, "nivel": "Avanzado", "titulo": "Gestión de residuos como título habilitante integrable", "enun": "Puede integrarse la gestión de residuos sólidos como parte de los títulos habilitantes integrables en un EIA-sd?", "options": ["Es obligatorio integrarla, de lo contrario el EIA-sd carece de validez", "No forma parte de los permisos listados en la Segunda Disposición Complementaria Final del DS 006-2026-MTC, enfocada en recursos hídricos y desbosque", "Forma parte automáticamente de cualquier integración de títulos habilitantes en el sector Transportes"], "correctIndex": 1, "feedback": "La gestión de residuos sólidos no figura entre los permisos integrables previstos en la Segunda Disposición Complementaria Final, enfocada en recursos hídricos y desbosque."}, {"id": "M7-A07", "mod": 7, "nivel": "Avanzado", "titulo": "Manejo de residuos peligrosos bajo FITSA de aprobación automática", "enun": "Un proyecto con FITSA de aprobación automática (mejoramiento de vía vecinal de 18 km) genera residuos peligrosos.", "options": ["Igual debe cumplir la normativa general de residuos sólidos (D.L. N 1278 y su Reglamento), pues la FITSA no exime del cumplimiento de normas transversales", "Solo aplica la normativa de residuos si el proyecto luego se reclasifica a una categoría mayor", "Queda exento de cualquier obligación sobre residuos peligrosos, por tratarse de aprobación automática"], "correctIndex": 0, "feedback": "La simplificación de la FITSA no exime del cumplimiento de la normativa general de residuos sólidos, que es transversal a cualquier proyecto."}, {"id": "M7-A08", "mod": 7, "nivel": "Avanzado", "titulo": "MRSP con información inexacta detectado en fiscalización", "enun": "Se detecta, durante fiscalización, un MRSP con información inexacta sobre el volumen transportado.", "options": ["No genera ninguna consecuencia si el residuo finalmente llego a su disposición final correctamente", "Puede derivar en responsabilidad administrativa para el generador y/o la EO-RS, además de las acciones legales que correspondan", "Solo genera observación si la diferencia de volumen supera el 50% de lo declarado"], "correctIndex": 1, "feedback": "La información inexacta en el MRSP puede derivar en responsabilidad administrativa para el generador y/o la EO-RS, dado el carácter de declaración jurada de dicha documentación."}, {"id": "M7-A09", "mod": 7, "nivel": "Avanzado", "titulo": "Disposición en infraestructura no autorizada por cercania", "enun": "Se dispone residuos peligrosos en una infraestructura no autorizada, por motivos de cercania y reducción de costos.", "options": ["Constituye una infracción grave, independientemente de que la infraestructura cumpla informalmente condiciones técnicas adecuadas", "Es aceptable si la infraestructura, aunque no autorizada, cumple condiciones técnicas similares a una autorizada", "Solo es infracción si se demuestra contaminación efectiva del entorno"], "correctIndex": 0, "feedback": "Disponer residuos peligrosos en una infraestructura no autorizada constituye una infracción grave, sin importar que informalmente cumpla condiciones técnicas."}, {"id": "M7-A10", "mod": 7, "nivel": "Avanzado", "titulo": "Actualización del Plan de Manejo por nuevo tipo de residuo", "enun": "El Plan de Manejo de Residuos requiere actualizarse por la incorporación de un nuevo tipo de residuo peligroso no previsto inicialmente.", "options": ["Corresponde evaluar si encaja en los supuestos de comunicación previa o si, por generar residuos no caracterizados, requiere modificación del instrumento", "Siempre se resuelve mediante una simple actualización interna del Plan, sin relación con el instrumento ambiental aprobado", "Nunca requiere modificación del instrumento, basta con informar a la EO-RS contratada"], "correctIndex": 0, "feedback": "Incorporar un nuevo tipo de residuo peligroso requiere evaluar si encaja en comunicación previa o si, por generar residuos no caracterizados, exige modificar el instrumento ambiental."}, {"id": "M8-B01", "mod": 8, "nivel": "Basico", "titulo": "ECA de Ruido", "enun": "Cómo está estructurado el ECA de Ruido aplicable a una obra vial cercana a zonas residenciales?", "options": ["No existe un ECA de Ruido en el Perú, solo LMP sectoriales", "Es un único valor fijo para todo el territorio nacional, sin distinción de zona u horario", "Es un estándar diferenciado según zona (residencial, comercial, industrial, protección especial) y horario, aprobado por el DS N 085-2003-PCM"], "correctIndex": 2, "feedback": "El ECA de Ruido, DS N 085-2003-PCM, diferencia valores según la zona (residencial, comercial, industrial, protección especial) y el horario (diurno/nocturno)."}, {"id": "M8-B02", "mod": 8, "nivel": "Basico", "titulo": "ECA para Aire vigente", "enun": "Qué norma aprueba el ECA para Aire vigente en el Perú?", "options": ["Estándares de la Organización Mundial de la Salud, sin norma nacional propia", "Solo aplica a zonas urbanas, nunca a obras viales rurales", "El DS N 003-2017-MINAM"], "correctIndex": 2, "feedback": "El ECA para Aire vigente fue aprobado mediante el DS N 003-2017-MINAM, estableciendo concentraciones máximas de contaminantes en el aire ambiental."}, {"id": "M8-B03", "mod": 8, "nivel": "Basico", "titulo": "ECA para Suelo vigente", "enun": "Qué norma aprueba el ECA para Suelo vigente en el Perú?", "options": ["No existe un ECA de Suelo en el Perú, solo guias referenciales", "El DS N 002-2014-MINAM, diferenciado según uso del suelo", "Es un único valor aplicable a cualquier tipo de uso del suelo"], "correctIndex": 1, "feedback": "El ECA para Suelo, DS N 002-2014-MINAM, diferencia valores según el uso del suelo (agricola, residencial, comercial/industrial/extractivo)."}, {"id": "M8-B04", "mod": 8, "nivel": "Basico", "titulo": "Acreditación del laboratorio de monitoreo", "enun": "Qué condición debe cumplir el laboratorio que realiza los análisis de monitoreo ambiental?", "options": ["Solo se exige acreditación para análisis de agua, no de aire o suelo", "Debe estar acreditado ante el INACAL para los parámetros y matrices que analiza", "Puede ser cualquier laboratorio universitario, sin necesidad de acreditación"], "correctIndex": 1, "feedback": "El laboratorio que realiza el monitoreo ambiental debe estar acreditado ante el INACAL para los parámetros y matrices que analiza."}, {"id": "M8-B05", "mod": 8, "nivel": "Basico", "titulo": "Puntos de monitoreo aprobados", "enun": "Pueden reubicarse libremente los puntos de monitoreo aprobados en el instrumento ambiental, según conveniencia del contratista?", "options": ["Si, pueden reubicarse libremente según conveniencia operativa", "No, deben mantenerse conforme a lo aprobado, salvo los supuestos de comunicación previa o modificación que correspondan", "Solo son referenciales, no vinculan al titular durante la ejecución"], "correctIndex": 1, "feedback": "Los puntos de monitoreo aprobados deben mantenerse conforme a lo aprobado, salvo que se gestione el cambio mediante comunicación previa o modificación."}, {"id": "M8-B06", "mod": 8, "nivel": "Basico", "titulo": "Exceso de ECA vs exceso de LMP", "enun": "Cuál es la diferencia entre exceder el ECA y exceder el LMP?", "options": ["Exceder el LMP es menos grave que exceder el ECA, en cualquier circunstancia", "Exceder el ECA indica deterioro de la calidad ambiental general; exceder el LMP indica que una fuente puntual emite por encima de lo permitido", "Ambos significan exactamente lo mismo, solo cambia la matriz analizada"], "correctIndex": 1, "feedback": "Exceder el ECA refleja deterioro de la calidad ambiental general; exceder el LMP indica que una fuente puntual emite o vierte por encima de lo permitido."}, {"id": "M8-B07", "mod": 8, "nivel": "Basico", "titulo": "Reporte de resultados de monitoreo", "enun": "Cuándo debe presentarse el reporte de resultados de monitoreo ambiental a la auto
