ridad competente?", "options": ["Solo si los resultados superan los estándares aplicables", "Conforme a la frecuencia y plazos establecidos en el instrumento de gestión ambiental aprobado", "Es voluntario, salvo que la EFA lo solicite expresamente"], "correctIndex": 1, "feedback": "El reporte de resultados de monitoreo debe presentarse conforme a la frecuencia y plazos establecidos en el instrumento ambiental aprobado."}, {"id": "M8-B08", "mod": 8, "nivel": "Basico", "titulo": "Protocolo de monitoreo de aire", "enun": "Qué protocolo debe seguirse para el monitoreo de calidad de aire de un proyecto vial?", "options": ["No existe un protocolo nacional, solo normas internacionales ISO", "Cada consultora puede definir su propio protocolo, sin referencia a un protocolo nacional", "Los lineamientos del Protocolo Nacional de Monitoreo de Calidad Ambiental del Aire vigente"], "correctIndex": 2, "feedback": "El monitoreo de calidad de aire debe seguir los lineamientos del Protocolo Nacional de Monitoreo de Calidad Ambiental del Aire vigente."}, {"id": "M8-B09", "mod": 8, "nivel": "Basico", "titulo": "Falsificación de resultados de monitoreo", "enun": "Qué ocurre si se detecta falsificación o alteración de resultados de monitoreo ambiental?", "options": ["No genera responsabilidad si los valores reales tampoco superaban los estándares aplicables", "Solo es sancionable si afecta directamente la salud de una persona identificada", "Constituye una infracción grave, sin perjuicio de las responsabilidades civiles y penales que correspondan"], "correctIndex": 2, "feedback": "La falsificación o alteración de resultados de monitoreo constituye una infracción grave, sin perjuicio de responsabilidades civiles y penales adicionales."}, {"id": "M8-B10", "mod": 8, "nivel": "Basico", "titulo": "Monitoreo de agua en cuerpo receptor", "enun": "Contra qué estándar debe evaluarse el monitoreo de calidad de agua en un cuerpo receptor cercano a la obra?", "options": ["No es necesario si la obra no genera vertimientos directos", "Únicamente el LMP de vertimiento de la propia obra, sin relación con el cuerpo receptor", "El ECA Agua aplicable según la categoría del cuerpo receptor"], "correctIndex": 2, "feedback": "El monitoreo de calidad de agua en un cuerpo receptor debe evaluarse contra el ECA Agua aplicable, según la categoría de dicho cuerpo."}, {"id": "M8-I01", "mod": 8, "nivel": "Intermedio", "titulo": "Punto de monitoreo de ruido cerca de institución educativa", "enun": "Un punto de monitoreo de ruido se ubica cerca de una institución educativa. Qué consideración especial corresponde?", "options": ["Debe considerar la categorización de 'zona de protección especial', con estándares más exigentes que otras zonas", "Se mide con el mismo estándar que cualquier zona residencial, sin distinción", "No requiere monitoreo de ruido, al no ser una zona industrial"], "correctIndex": 0, "feedback": "Un punto cercano a una institución educativa debe considerar la categoría de 'zona de protección especial', con estándares más exigentes."}, {"id": "M8-I02", "mod": 8, "nivel": "Intermedio", "titulo": "Resultado de monitoreo de aire que supera el ECA", "enun": "Un resultado de monitoreo de aire supera el ECA cerca de una planta de asfalto temporal de la obra.", "options": ["Solo debe reportarse al concluir la obra, en el informe final", "Debe evaluarse reforzar las medidas de mitigación previstas en el instrumento ambiental, además de reportarlo conforme a las obligaciones aplicables", "No genera ninguna obligación si la planta de asfalto es temporal"], "correctIndex": 1, "feedback": "Superar el ECA en un punto cercano a una fuente de la obra obliga a evaluar el refuerzo de medidas de mitigación y a reportar oportunamente, sin esperar al informe final."}, {"id": "M8-I03", "mod": 8, "nivel": "Intermedio", "titulo": "Modificación de la metodología de un monitoreo aprobado", "enun": "Se pretende cambiar la metodología de un monitoreo ya aprobado en el instrumento ambiental.", "options": ["Es una decisión libre del consultor ambiental, sin necesidad de informar a la autoridad", "Siempre requiere una modificación significativa del instrumento, sin excepción", "Debe evaluarse conforme a los supuestos de comunicación previa o modificación, según si afecta el objetivo de vigilancia y control aprobado"], "correctIndex": 2, "feedback": "Un cambio de metodología de monitoreo debe evaluarse conforme a comunicación previa o modificación, según afecte o no el objetivo de vigilancia aprobado."}, {"id": "M8-I04", "mod": 8, "nivel": "Intermedio", "titulo": "Eliminación de punto de monitoreo por no ejecución de actividad", "enun": "Se elimina un punto de monitoreo porque la actividad que controlaba no se ejecuto.", "options": ["Siempre requiere modificación significativa del instrumento", "Puede eliminarse sin ninguna comunicación, al no ejecutarse la actividad asociada", "Es un supuesto de comunicación previa del art. 20-A, salvo que se trate de un componente activo que deba seguir siendo monitoreado"], "correctIndex": 2, "feedback": "La eliminación de un punto de monitoreo por no ejecución de la actividad asociada es comunicación previa, salvo que afecte un componente activo que requiera seguir monitoreado."}, {"id": "M8-I05", "mod": 8, "nivel": "Intermedio", "titulo": "Actualización tecnológica de equipos de vigilancia", "enun": "Se actualiza la tecnología de los equipos de vigilancia y control ambiental, sin cambiar el objetivo de vigilancia aprobado.", "options": ["No requiere ninguna gestión, al ser una mejora tecnológica beneficiosa", "Es supuesto de comunicación previa, siempre que no se altere el objetivo aprobado ni se involucren cambios en el sistema de tratamiento de aguas", "Siempre requiere modificación del instrumento, por tratarse de equipos de monitoreo"], "correctIndex": 1, "feedback": "La actualización tecnológica de equipos de vigilancia, sin alterar el objetivo aprobado, es supuesto de comunicación previa."}, {"id": "M8-I06", "mod": 8, "nivel": "Intermedio", "titulo": "ECA Ruido nocturno vs diurno", "enun": "Cómo se compara el ECA Ruido en horario nocturno frente al diurno en una misma zona?", "options": ["Es el mismo valor en ambos horarios, sin distinción", "El estándar nocturno es menos exigente, al haber menor actividad humana", "El estándar nocturno es más exigente (valor más bajo) que el diurno, por la mayor sensibilidad de la población en ese horario"], "correctIndex": 2, "feedback": "El ECA Ruido nocturno es más exigente que el diurno en una misma zona, dada la mayor sensibilidad de la población durante la noche."}, {"id": "M8-I07", "mod": 8, "nivel": "Intermedio", "titulo": "Uso de datos historicos de otro proyecto para la línea base de aire", "enun": "Puede usarse el monitoreo historico de un proyecto cercano para sustentar la línea base de aire de un nuevo proyecto vial?", "options": ["Puede usarse como referencia complementaria, pero no sustituye el monitoreo específico exigido para el proyecto en evaluación", "Está prohibido usar cualquier dato de fuentes externas al proyecto", "Es plenamente válido y suficiente, sin necesidad de monitoreo propio"], "correctIndex": 0, "feedback": "Los datos historicos de otro proyecto pueden usarse como referencia complementaria, pero no sustituyen el monitoreo específico exigido para el proyecto evaluado."}, {"id": "M8-I08", "mod": 8, "nivel": "Intermedio", "titulo": "Cumplimiento del LMP pero deterioro del ECA del cuerpo receptor", "enun": "El efluente cumple el LMP, pero el cuerpo receptor excede el ECA Agua aplicable.", "options": ["No hay ninguna obligación adicional, el cumplimiento del LMP es suficiente bajo cualquier circunstancia", "A pesar del cumplimiento del LMP, debe evaluarse medidas adicionales, pues el deterioro del cuerpo receptor sigue siendo relevante", "El titular es automáticamente responsable del incumplimiento del ECA, sin necesidad de análisis adicional"], "correctIndex": 1, "feedback": "Aunque se cumpla el LMP, el deterioro del ECA en el cuerpo receptor obliga a evaluar medidas adicionales dentro de la gestión ambiental del proyecto."}, {"id": "M8-I09", "mod": 8, "nivel": "Intermedio", "titulo": "Periodicidad de monitoreo según etapa del proyecto", "enun": "Puede variar la periodicidad de los monitoreos entre la etapa de construcción y la de operación de una vía?", "options": ["Si, puede variar según lo aprobado en el instrumento de gestión ambiental, en función de la intensidad de las actividades de cada etapa", "Solo se exige monitoreo durante la etapa de operación, nunca durante la construcción", "Debe ser identica en ambas etapas, sin posibilidad de diferenciación"], "correctIndex": 0, "feedback": "La periodicidad del monitoreo puede variar según la etapa del proyecto, conforme a lo aprobado en el instrumento, en función de la intensidad de actividades."}, {"id": "M8-I10", "mod": 8, "nivel": "Intermedio", "titulo": "Acreditación del laboratorio vencida durante el muestreo", "enun": "La acreditación del laboratorio que realiza el monitoreo vence durante el período de muestreo.", "options": ["No afecta la validez de los resultados, si el laboratorio renueva su acreditación posteriormente", "Compromete la validez de los resultados obtenidos durante el período sin acreditación vigente", "Solo afecta la validez si el resultado superó algún estándar aplicable"], "correctIndex": 1, "feedback": "Si la acreditación vence durante el muestreo, los resultados obtenidos en ese período sin acreditación vigente ven comprometida su validez."}, {"id": "M8-A01", "mod": 8, "nivel": "Avanzado", "titulo": "Reubicación de punto de monitoreo por eliminación de la fuente", "enun": "Se reubica un punto de monitoreo por eliminación de la fuente que se controlaba, dentro del área de influencia directa.", "options": ["Encaja en el literal f) del art. 20-A del RPAST modificado como supuesto de comunicación previa, salvo que afecte componentes activos que requieran seguir monitoreados", "No requiere ninguna comunicación, al ser una decisión técnica del equipo de monitoreo", "Siempre requiere modificación significativa del instrumento, sin excepción"], "correctIndex": 0, "feedback": "El literal f) del art. 20-A permite gestionar como comunicación previa la reubicación de un punto de monitoreo por eliminación de la fuente controlada."}, {"id": "M8-A02", "mod": 8, "nivel": "Avanzado", "titulo": "Cambios en el sistema de tratamiento de aguas vinculados al monitoreo", "enun": "Se realiza un cambio tecnológico en el monitoreo que involucra modificar el sistema de tratamiento de aguas.", "options": ["Requiere únicamente informar a la ANA, sin relación con el RPAST", "Se incluye siempre dentro del supuesto de comunicación previa de mejoras tecnológicas de monitoreo", "Queda excluido del supuesto de comunicación previa del literal k) del art. 20-A, que exige expresamente que no se involucren cambios en dicho sistema"], "correctIndex": 2, "feedback": "El literal k) del art. 20-A excluye expresamente los cambios que involucren modificar el sistema de tratamiento de aguas del régimen de comunicación previa."}, {"id": "M8-A03", "mod": 8, "nivel": "Avanzado", "titulo": "Aplicabilidad de la metodología de multas de OEFA en sector Transportes", "enun": "Un incumplimiento de monitoreo detectado en un proyecto vial podria sancionarse bajo la nueva metodología de multas de OEFA (marzo 2026)?", "options": ["Se aplica igual, pues toda fiscalización ambiental en el Perú sigue la metodología de OEFA", "La DGAAM-MTC no tiene marco sancionador propio, debe esperar la transferencia de funciones", "No directamente: la DGAAM-MTC aplica su propio marco sancionador sectorial (DS N 015-2022-MTC), mientras no se transfiera la fiscalización"], "correctIndex": 2, "feedback": "Mientras la fiscalización del sector Transportes no se transfiera a OEFA, la DGAAM-MTC aplica su propio marco sancionador (DS N 015-2022-MTC), no la metodología de OEFA."}, {"id": "M8-A04", "mod": 8, "nivel": "Avanzado", "titulo": "Reglamento sancionador del sector Transportes", "enun": "Qué norma aprueba el Reglamento de Sanciones y Régimen de Incentivos en Materia Ambiental para el Sector Transportes?", "options": ["No existe un reglamento sancionador propio para el sector Transportes, se aplica directamente el de OEFA", "Fue derogado íntegramente por el DS 006-2026-MTC, sin reemplazo", "El DS N 015-2022-MTC, que debe ajustarse para tipificar incumplimientos derivados del DS 006-2026-MTC"], "correctIndex": 2, "feedback": "El Reglamento de Sanciones del Sector Transportes fue aprobado mediante el DS N 015-2022-MTC, y requiere actualizarse conforme a las nuevas obligaciones del DS 006-2026-MTC."}, {"id": "M8-A05", "mod": 8, "nivel": "Avanzado", "titulo": "Monitoreo de un proyecto con FITSA de evaluación previa en ANP", "enun": "Un proyecto con FITSA de evaluación previa, ubicado en zona de amortiguamiento de un ANP, qué nivel de monitoreo requiere?", "options": ["Debe sustentar el cumplimiento de los condicionantes ambientales del art. 11-B, aunque sin el nivel de exigencia de un EIA-sd o EIA-d", "No requiere ningún monitoreo, al tratarse de una FITSA", "Requiere el mismo nivel de monitoreo que un EIA-d, sin distinción"], "correctIndex": 0, "feedback": "La FITSA de evaluación previa exige sustentar el cumplimiento de los condicionantes del art. 11-B, sin alcanzar el nivel de exigencia de un EIA-sd o EIA-d."}, {"id": "M8-A06", "mod": 8, "nivel": "Avanzado", "titulo": "Plazo de opinión vinculante de la ANA sobre monitoreo de un EIA-sd", "enun": "Cuál es el plazo para que la ANA emita opinión vinculante sobre el componente de monitoreo de calidad de agua de un EIA-sd?", "options": ["No existe un plazo específico para componentes de monitoreo dentro del EIA-sd", "18 días habiles, igual que para la DIA", "45 días habiles, conforme al plazo aplicable a la opinión vinculante sobre EIA-sd"], "correctIndex": 2, "feedback": "El plazo de 45 días habiles aplica a la opinión vinculante sobre el EIA-sd en su conjunto, incluido su componente de monitoreo de calidad de agua."}, {"id": "M8-A07", "mod": 8, "nivel": "Avanzado", "titulo": "Cambio de punto de monitoreo que afecta componente activo", "enun": "Se pretende reubicar un punto de monitoreo de ruido que si afecta un componente activo que requiere seguir siendo controlado.", "options": ["Requiere directamente una reclasificación del proyecto", "Corresponde siempre la comunicación previa, sin excepción, por tratarse de monitoreo de ruido", "No corresponde aplicar la comunicación previa del literal f) del art. 20-A, que excluye expresamente este supuesto"], "correctIndex": 2, "feedback": "El literal f) excluye expresamente de la comunicación previa la reubicación de puntos de monitoreo que afecten componentes activos que deban seguir controlados."}, {"id": "M8-A08", "mod": 8, "nivel": "Avanzado", "titulo": "Incumplimiento de frecuencia con resultados conformes", "enun": "Se detecta en fiscalización que el monitoreo trimestral se realizo solo semestralmente, aunque los resultados cumplen los estándares aplicables.", "options": ["Constituye un incumplimiento de obligación ambiental fiscalizable, independientemente de que los resultados obtenidos cumplan los estándares", "No genera infracción si los resultados, aunque con menor frecuencia, cumplen los ECA y LMP aplicables", "Solo genera infracción si se demuestra que el incumplimiento causo un daño ambiental medible"], "correctIndex": 0, "feedback": "Incumplir la frecuencia comprometida es una infracción fiscalizable por si misma, sin que el cumplimiento de los estándares en los resultados obtenidos la subsane."}, {"id": "M8-A09", "mod": 8, "nivel": "Avanzado", "titulo": "Valores anomalos por falla del equipo de medición", "enun": "Un monitoreo de aire muestra valores anomalos, posiblemente por una falla del equipo.", "options": ["Debe evaluarse técnicamente la validez del dato y, de ser necesario, repetirse el monitoreo, documentando el incidente para mantener trazabilidad", "Puede descartarse el dato sin documentar nada, si el equipo se revisa después", "Debe reportarse igual como un incumplimiento ambiental, sin posibilidad de cuestionar la validez técnica del dato"], "correctIndex": 0, "feedback": "Ante valores anomalos por posible falla del equipo, corresponde evaluar técnicamente su validez, repetir el monitoreo si es necesario y documentar el incidente."}, {"id": "M8-A10", "mod": 8, "nivel": "Avanzado", "titulo": "Integración del monitoreo de vertimientos en el EIA-sd", "enun": "Cómo se rige el monitoreo de vertimientos integrados en el EIA-sd conforme al DS 006-2026-MTC?", "options": ["Por las condiciones que establezca la autorización integrada, aplicando supletoriamente el reglamento de la Ley N 30327 mientras el MTC no apruebe sus propios lineamientos", "El monitoreo de vertimientos queda completamente fuera de cualquier mecanismo de integración previsto", "La integración de títulos habilitantes elimina la obligación de monitorear los vertimientos integrados"], "correctIndex": 0, "feedback": "El monitoreo asociado a la autorización de vertimientos integrada se rige por sus propias condiciones, aplicando supletoriamente el reglamento de la Ley N 30327."}, {"id": "M9-B01", "mod": 9, "nivel": "Basico", "titulo": "Titulares del derecho a consulta previa", "enun": "Qué pueblos tienen derecho a la consulta previa conforme a la Ley N 29785?", "options": ["Cualquier centro poblado afectado por un proyecto, sin distinción etnica", "Los pueblos indígenas u originarios, reconocido en el Convenio 169 de la OIT", "Solo las comunidades campesinas de la sierra, no las nativas de la Amazonia"], "correctIndex": 1, "feedback": "La Ley N 29785 reconoce el derecho a la consulta previa a los pueblos indígenas u originarios, conforme al Convenio 169 de la OIT."}, {"id": "M9-B02", "mod": 9, "nivel": "Basico", "titulo": "Consulta previa y derecho de veto", "enun": "Otorga la consulta previa derecho de veto a los pueblos indígenas?", "options": ["Solo otorga derecho de veto en proyectos viales, por su alto impacto territorial", "Si, los pueblos indígenas pueden impedir cualquier proyecto mediante la consulta previa", "No; es un proceso de dialogo de buena fe, sin que se reconozca un derecho de veto"], "correctIndex": 2, "feedback": "La consulta previa es un proceso de dialogo de buena fe; ni el Convenio 169 ni la Ley N 29785 reconocen un derecho de veto a los pueblos indígenas."}, {"id": "M9-B03", "mod": 9, "nivel": "Basico", "titulo": "Identificación de pueblos indígenas a consultar", "enun": "Quién identifica a los pueblos indígenas a ser consultados en un proceso de consulta previa?", "options": ["El propio pueblo indígena, mediante autoidentificación sin participación estatal", "El Poder Judicial, mediante resolución previa", "La entidad pública que promueve la medida administrativa o legislativa susceptible de afectarlos"], "correctIndex": 2, "feedback": "La identificación de los pueblos indígenas a consultar corresponde a la entidad pública que promueve la medida susceptible de afectarlos."}, {"id": "M9-B04", "mod": 9, "nivel": "Basico", "titulo": "Rol del Ministerio de Cultura", "enun": "Cuál es el rol del Ministerio de Cultura en los procesos de consulta previa?", "options": ["Coordina, concierta y articula la politica estatal de implementación del derecho a la consulta, brindando asistencia técnica", "No tiene ningún rol, la consulta previa es competencia exclusiva del sector promotor", "Es quien decide finalmente si el proyecto se ejecuta o no"], "correctIndex": 0, "feedback": "El Ministerio de Cultura coordina y articula la politica estatal de implementación de la consulta previa, brindando asistencia técnica a las entidades promotoras."}, {"id": "M9-B05", "mod": 9, "nivel": "Basico", "titulo": "Obligatoriedad de los acuerdos de consulta", "enun": "Los acuerdos alcanzados en un proceso de consulta previa son obligatorios?", "options": ["Son meramente referenciales, sin obligatoriedad para el Estado", "Solo son obligatorios para los pueblos indígenas, no para la entidad promotora", "Si, son de obligatorio cumplimiento para ambas partes"], "correctIndex": 2, "feedback": "Los acuerdos alcanzados en un proceso de consulta previa son de obligatorio cumplimiento tanto para el Estado como para los pueblos indígenas."}, {"id": "M9-B06", "mod": 9, "nivel": "Basico", "titulo": "Decisión sin acuerdo en la consulta", "enun": "Qué ocurre si no se alcanza un acuerdo en el proceso de consulta?", "options": ["El proyecto queda automáticamente cancelado de forma permanente", "Se traslada la decisión al Poder Judicial de forma obligatoria", "La entidad estatal adopta la decisión final, debiendo motivarla y garantizar los derechos colectivos de los pueblos indígenas"], "correctIndex": 2, "feedback": "Sin acuerdo, la entidad estatal adopta la decisión final, motivandola y garantizando los derechos colectivos de los pueblos indígenas consultados."}, {"id": "M9-B07", "mod": 9, "nivel": "Basico", "titulo": "Mecanismos de participación ciudadana según categoría", "enun": "Son iguales los mecanismos de participación ciudadana para cualquier proyecto vial?", "options": ["No, varian según la categoría y características del proyecto, pudiendo incluir audiencias, talleres o buzones", "Si, son siempre los mismos para cualquier proyecto, sin distinción", "Solo se exigen para proyectos EIA-d, nunca para DIA o EIA-sd"], "correctIndex": 0, "feedback": "Los mecanismos de participación ciudadana varian según la categoría y características del proyecto, conforme al RPAST."}, {"id": "M9-B08", "mod": 9, "nivel": "Basico", "titulo": "Convenio internacional de consulta previa", "enun": "Qué convenio internacional reconoce el derecho a la consulta previa?", "options": ["El Convenio de Basilea sobre residuos peligrosos", "El Convenio 169 de la Organización Internacional del Trabajo (OIT)", "La Declaración Universal de los Derechos Humanos"], "correctIndex": 1, "feedback": "El Convenio 169 de la OIT es el instrumento internacional que reconoce el derecho a la consulta previa de los pueblos indígenas."}, {"id": "M9-B09", "mod": 9, "nivel": "Basico", "titulo": "Contenido de los instrumentos del SEIA sobre pueblos indígenas", "enun": "Qué debe incluir un instrumento del SEIA respecto a pueblos indígenas en el área de influencia?", "options": ["No es necesario incluir información específica sobre pueblos indígenas", "Solo se exige si el proyecto se ubica dentro de una reserva indígena formalmente reconocida", "Información sobre la posible afectación de sus derechos colectivos por el desarrollo del proyecto"], "correctIndex": 2, "feedback": "Los instrumentos del SEIA deben incluir información sobre la posible afectación de los derechos colectivos de pueblos indígenas en el área de influencia."}, {"id": "M9-B10", "mod": 9, "nivel": "Basico", "titulo": "Garantías a la propiedad comunal", "enun": "Qué garantías existen sobre la propiedad comunal de los pueblos indígenas frente a proyectos de inversión?", "options": ["El Estado brinda las garantías establecidas por la Constitución y la Ley a la propiedad comunal", "La propiedad comunal queda subordinada automáticamente al interes del proyecto de inversión nacional", "No existe ninguna garantía constitucional sobre la propiedad comunal en el Perú"], "correctIndex": 0, "feedback": "El Estado brinda las garantías constitucionales y legales correspondientes a la propiedad comunal de los pueblos indígenas frente a proyectos de inversión."}, {"id": "M9-I01", "mod": 9, "nivel": "Intermedio", "titulo": "Proyecto que afecta derechos colectivos de comunidad nativa", "enun": "Un proyecto de mejoramiento de carretera nacional afecta directamente derechos colectivos de una comunidad nativa.", "options": ["Requiere proceso de consulta previa, al generar una afectación directa a sus derechos colectivos", "No requiere consulta previa por tratarse de un servicio público de alcance nacional", "Solo requiere consulta previa si la comunidad se opone expresamente al proyecto"], "correctIndex": 0, "feedback": "La afectación directa a derechos colectivos de una comunidad nativa activa la obligación de realizar consulta previa, sin importar el alcance nacional del proyecto."}, {"id": "M9-I02", "mod": 9, "nivel": "Intermedio", "titulo": "Exclusión de servicios públicos de la consulta previa", "enun": "Qué ocurrio con la disposición que excluia a los proyectos de servicios públicos (incluida infraestructura vial) de la consulta previa?", "options": ["Sigue plenamente vigente, los proyectos de servicios públicos están exceptuados de consulta previa", "Fue declarada nula por la Corte Suprema (Sentencia A.P. N 29126-2018-Lima), con efecto retroactivo", "Nunca existio tal exclusión en la normativa peruana"], "correctIndex": 1, "feedback": "La Corte Suprema declaro nula, con efecto retroactivo, la disposición que excluia a los proyectos de servicios públicos de la consulta previa (Sentencia A.P. N 29126-2018-Lima)."}, {"id": "M9-I03", "mod": 9, "nivel": "Intermedio", "titulo": "Vigencia de la RVM 013-2016-VMI-MC", "enun": "Sigue vigente la Resolución Viceministerial N 013-2016-VMI-MC, relacionada con la exclusión de servicios públicos de la consulta previa?", "options": ["No, fue declarada nula con efecto retroactivo por la Sentencia A.P. N 29126-2018-Lima", "Si, continúa vigente y se aplica preferentemente sobre cualquier pronunciamiento judicial posterior", "Nunca regulo materia relacionada con consulta previa"], "correctIndex": 0, "feedback": "La RVM N 013-2016-VMI-MC fue declarada nula con efecto retroactivo por la Sentencia A.P. N 29126-2018-Lima de la Corte Suprema."}, {"id": "M9-I04", "mod": 9, "nivel": "Intermedio", "titulo": "Proyecto en ejecución sin consulta previa realizada", "enun": "Un proyecto vial se ejecuta en territorio de comunidades nativas, sin haberse realizado consulta previa, ya en etapa avanzada.", "options": ["Solo genera responsabilidad si la comunidad presenta una demanda penal directa", "No genera ninguna consecuencia si el proyecto ya está en ejecución y avanzado", "Constituye una grave irregularidad que puede derivar en la suspensión del proyecto y responsabilidad de la entidad promotora"], "correctIndex": 2, "feedback": "La falta de consulta previa exigible constituye una grave irregularidad que puede derivar en suspensión del proyecto y responsabilidad de la entidad promotora."}, {"id": "M9-I05", "mod": 9, "nivel": "Intermedio", "titulo": "Intensidad del mecanismo de participación según categoría", "enun": "Es igual el mecanismo de participación ciudadana en una DIA que en un EIA-d?", "options": ["Es exactamente igual en ambas categorías, sin distinción", "La DIA no requiere ningún mecanismo de participación ciudadana, solo el EIA-d", "No necesariamente, puede ser menos intensivo en la DIA que en el EIA-d, conforme a las características y alcance de cada categoría"], "correctIndex": 2, "feedback": "El mecanismo de participación ciudadana puede ser menos intensivo en la DIA que en el EIA-d, conforme a las características de cada categoría."}, {"id": "M9-I06", "mod": 9, "nivel": "Intermedio", "titulo": "Duda razonable sobre presencia de pueblos indígenas", "enun": "Existe duda razonable sobre la presencia de pueblos indígenas en el área de influencia de un proyecto vial.", "options": ["La entidad promotora debe realizar la identificación con la diligencia debida, pudiendo apoyarse en el Ministerio de Cultura", "Corresponde exclusivamente a la comunidad demostrar su propia existencia ante la entidad promotora", "Se asume automáticamente que no hay pueblos indígenas si no existe un registro previo formal"], "correctIndex": 0, "feedback": "Ante duda razonable, la entidad promotora debe identificar con diligencia debida la presencia de pueblos indígenas, pudiendo apoyarse en el Ministerio de Cultura."}, {"id": "M9-I07", "mod": 9, "nivel": "Intermedio", "titulo": "Estándares de la Corte IDH reconocidos por la Corte Suprema", "enun": "Qué efecto tienen los estándares de la Corte Interamericana de Derechos Humanos sobre consulta previa, reconocidos por la Corte Suprema peruana?", "options": ["Fueron derogados por la Ley N 29785 al momento de su promulgación", "Solo son aplicables en procesos ante tribunales internacionales, sin efecto en el derecho interno peruano", "Forman parte de los criterios que deben observarse en la implementación del derecho a la consulta previa en el Perú"], "correctIndex": 2, "feedback": "Los estándares de la Corte IDH reconocidos por la Corte Suprema forman parte de los criterios aplicables a la consulta previa en el Perú."}, {"id": "M9-I08", "mod": 9, "nivel": "Intermedio", "titulo": "Consulta previa de medidas legislativas", "enun": "Aplica la consulta previa a medidas legislativas relacionadas con infraestructura vial, o solo a medidas administrativas?", "options": ["También comprende las medidas legislativas, no solo las medidas administrativas específicas de un proyecto", "Solo aplica a medidas legislativas si el Congreso lo solicita expresamente", "Nunca aplica a medidas legislativas, solo a medidas administrativas concretas"], "correctIndex": 0, "feedback": "La consulta previa comprende tanto medidas administrativas específicas como medidas legislativas que puedan afectar derechos colectivos."}, {"id": "M9-I09", "mod": 9, "nivel": "Intermedio", "titulo": "Plan de Participación sin diferenciación para población indígena", "enun": "El Plan de Participación Ciudadana de un EIA-sd no contempla mecanismos diferenciados para población indígena en el área de influencia.", "options": ["Constituye una deficiencia que la autoridad evaluadora debe observar, pues dichos mecanismos deben adecuarse a las características particulares de la población", "Es aceptable, el RPAST no exige diferenciación específica para población indígena", "Solo se exige diferenciación si la población indígena lo solicita expresamente durante la evaluación"], "correctIndex": 0, "feedback": "La ausencia de mecanismos diferenciados para población indígena es una deficiencia observable, pues deben adecuarse a sus características particulares."}, {"id": "M9-I10", "mod": 9, "nivel": "Intermedio", "titulo": "Decisión final sin garantizar derechos colectivos", "enun": "La decisión final del Estado tras una consulta sin acuerdo no garantiza adecuadamente los derechos colectivos de los pueblos indígenas.", "options": ["Es siempre válida, pues la entidad estatal tiene la decisión final sin mayor control", "Solo puede cuestionarse si el desacuerdo proviene de la totalidad de los pueblos consultados", "Puede ser cuestionada, pues la entidad estatal está obligada a motivar su decisión garantizando dichos derechos, no solo a decidir libremente"], "correctIndex": 2, "feedback": "Una decisión final que no garantiza adecuadamente los derechos colectivos puede ser cuestionada, dado que la entidad estatal debe motivarla garantizando esos derechos."}, {"id": "M9-A01", "mod": 9, "nivel": "Avanzado", "titulo": "Aplicación retroactiva de la Sentencia A.P. N 29126-2018-Lima", "enun": "Tiene efecto la Sentencia A.P. N 29126-2018-Lima sobre procedimientos de evaluación ambiental de proyectos viales ya en trámite?", "options": ["La sentencia no tiene ningún efecto sobre procedimientos de evaluación ambiental, solo sobre procesos judiciales", "Si, la nulidad con efecto retroactivo debe considerarse en procedimientos afectados por la exclusión declarada nula", "La sentencia solo tiene efectos hacia el futuro, sin afectar disposiciones o procedimientos anteriores"], "correctIndex": 1, "feedback": "La nulidad con efecto retroactivo dispuesta por la Sentencia A.P. N 29126-2018-Lima debe considerarse en procedimientos afectados por la exclusión declarada nula."}, {"id": "M9-A02", "mod": 9, "nivel": "Avanzado", "titulo": "FITSA de aprobación automática en territorio de comunidad nativa", "enun": "Una FITSA de aprobación automática se ubica en territorio de una comunidad nativa. Queda exenta de cualquier proceso de consulta?", "options": ["La FITSA reemplaza automáticamente cualquier obligación de consulta previa", "No, debe evaluarse igualmente la pertinencia de la consulta previa si hay afectación directa a derechos colectivos, sin importar la simplificación administrativa", "Si, queda exenta de cualquier proceso de consulta, por tratarse de aprobación automática"], "correctIndex": 1, "feedback": "La simplificación administrativa de la FITSA no exime de evaluar la pertinencia de la consulta previa si existe afectación directa a derechos colectivos."}, {"id": "M9-A03", "mod": 9, "nivel": "Avanzado", "titulo": "Exclusión de comunidad nativa y PIACI del art. 20-A", "enun": "Está prevista la exclusión de áreas de comunidades nativas y reservas indígenas (PIACI) del supuesto de comunicación previa del art. 20-A?", "options": ["Solo se excluyen las reservas indígenas PIACI, no las áreas de comunidades nativas en general", "No existe ninguna exclusión específica para estas áreas en el art. 20-A", "Si, está expresamente prevista en el numeral 20-A.3, que excluye estas áreas de la simplificación de comunicación previa"], "correctIndex": 2, "feedback": "El numeral 20-A.3 excluye expresamente las áreas de comunidades nativas y reservas indígenas PIACI del régimen de comunicación previa."}, {"id": "M9-A04", "mod": 9, "nivel": "Avanzado", "titulo": "Participación en identificación de pasivos ambientales en territorio indígena", "enun": "Debe garantizarse participación de pueblos indígenas en la identificación de pasivos ambientales dentro de su territorio, vinculados a un proyecto vial antiguo?", "options": ["Solo se requiere su participación si el pasivo afecta directamente un área de cultivo activo", "Si, debe garantizarse su participación informada, en coherencia con los estándares del Convenio 169 de la OIT", "No es necesaria su participación, al tratarse de un tema técnico-ambiental ajeno a sus derechos colectivos"], "correctIndex": 1, "feedback": "Debe garantizarse la participación informada de los pueblos indígenas en la identificación de pasivos en su territorio, conforme a los estándares del Convenio 169."}, {"id": "M9-A05", "mod": 9, "nivel": "Avanzado", "titulo": "Mecanismos adicionales tras modificación significativa", "enun": "Una modificación significativa del instrumento ambiental afecta a una comunidad ya consultada respecto al proyecto original.", "options": ["Puede requerir mecanismos de participación distintos a los del proyecto nuevo, conforme al art. 55.1 del RPAST modificado, según las características de la modificación", "Siempre requiere repetir íntegramente el proceso de consulta previa desde el inicio", "Nunca requiere ningún mecanismo adicional, al haberse consultado el proyecto original"], "correctIndex": 0, "feedback": "El art. 55.1 del RPAST modificado permite definir mecanismos de participación distintos para una modificación significativa, según sus características particulares."}, {"id": "M9-A06", "mod": 9, "nivel": "Avanzado", "titulo": "Proyecto vial que interviene una reserva PIACI", "enun": "Un proyecto vial interviene una reserva indígena para Pueblos Indígenas en Aislamiento y Contacto Inicial (PIACI). Qué nivel de exigencia aplica?", "options": ["Se trata igual que cualquier comunidad nativa con contacto regular, sin diferencias en el nivel de exigencia", "Requiere un tratamiento especialmente riguroso, dada la condición de especial vulnerabilidad reconocida para los PIACI", "No requiere ningún mecanismo especial si el proyecto se mantiene fuera del área nucleo de la reserva"], "correctIndex": 1, "feedback": "Los proyectos que intervienen reservas PIACI requieren un tratamiento especialmente riguroso, por la condición de especial vulnerabilidad reconocida a estos pueblos."}, {"id": "M9-A07", "mod": 9, "nivel": "Avanzado", "titulo": "Decisión de no consultar sin sustento documentado", "enun": "La entidad promotora decide no consultar un proyecto vial por considerar que no hay afectación directa, sin sustento documentado.", "options": ["Es válida si la entidad promotora actúa de buena fe, sin necesidad de mayor sustento documental", "Solo es cuestionable si los pueblos indígenas presentan una denuncia formal antes de iniciar el proyecto", "Es una decisión cuestionable, pues la entidad promotora debe identificar y motivar adecuadamente si existe o no afectación directa"], "correctIndex": 2, "feedback": "Decidir no consultar sin un análisis y sustento documentado de la ausencia de afectación directa es una decisión cuestionable que puede impugnarse."}, {"id": "M9-A08", "mod": 9, "nivel": "Avanzado", "titulo": "Silencio administrativo positivo frente al derecho de consulta", "enun": "Puede el silencio administrativo positivo en la evaluación de un instrumento sustituir la obligación de realizar la consulta previa?", "options": ["Se rigen exactamente por las mismas reglas y plazos", "Si, el silencio administrativo positivo siempre exime de la obligación de realizar la consulta previa", "No, el silencio administrativo no puede sustituir ni omitir la consulta previa cuando esta resulte exigible"], "correctIndex": 2, "feedback": "El silencio administrativo positivo no puede sustituir ni omitir la realización de la consulta previa exigible, al ser un derecho de rango distinto a los plazos del SEIA."}, {"id": "M9-A09", "mod": 9, "nivel": "Avanzado", "titulo": "Acuerdo parcial en el proceso de consulta", "enun": "Los pueblos indígenas alcanzan un acuerdo parcial con el Estado durante el proceso de consulta de un proyecto vial.", "options": ["Un acuerdo parcial invalida todo el proceso de consulta, debiendo reiniciarse íntegramente", "Un acuerdo parcial equivale a un desacuerdo total, sin ninguna obligatoriedad para el Estado", "Los aspectos acordados son de obligatorio cumplimiento; respecto de los no acordados, corresponde a la entidad estatal decidir motivadamente"], "correctIndex": 2, "feedback": "Un acuerdo parcial genera obligatoriedad sobre lo acordado; lo no acordado queda sujeto a la decisión motivada de la entidad estatal."}, {"id": "M9-A10", "mod": 9, "nivel": "Avanzado", "titulo": "Afectación de derechos colectivos en un EIA-d certificado por SENACE", "enun": "Qué verificación debe realizar SENACE respecto a la afectación de derechos colectivos de pueblos indígenas en un EIA-d?", "options": ["La sola aprobación del EIA-d por SENACE sustituye la necesidad de un proceso de consulta previa independiente", "Debe verificar que el estudio incluya información sobre la posible afectación de dichos derechos, sin perjuicio del proceso de consulta previa independiente", "SENACE no tiene ninguna competencia relacionada con la afectación de derechos colectivos de pueblos indígenas"], "correctIndex": 1, "feedback": "SENACE debe verificar que el EIA-d incluya información sobre la posible afectación de derechos colectivos, sin que ello sustituya el proceso de consulta previa que corresponda."}, {"id": "M10-B01", "mod": 10, "nivel": "Basico", "titulo": "Existencia de un Plan de Cierre independiente", "enun": "Exige el RPAST un 'Plan de Cierre' como instrumento independiente, similar al del sector minero?", "options": ["Si, pero solo para proyectos EIA-d, nunca para DIA o EIA-sd", "No; las medidas de cierre y abandono se integran dentro del propio instrumento de gestión ambiental (DIA, EIA-sd o EIA-d)", "Si, todo proyecto vial requiere un Plan de Cierre independiente aprobado por SENACE"], "correctIndex": 1, "feedback": "En el RPAST, las medidas de cierre y abandono se integran dentro del propio instrumento de gestión ambiental, no como un instrumento separado."}, {"id": "M10-B02", "mod": 10, "nivel": "Basico", "titulo": "Etapas a interrelacionar en la evaluación de impactos", "enun": "Qué etapas deben identificarse e interrelacionarse en la evaluación de impactos ambientales y sociales de un proyecto vial?", "options": ["Construcción, operación y cierre, conforme al art. 30 del RPAST", "Solo construcción, por ser la etapa de mayor impacto", "Solo construcción y operación, el cierre se evalúa después de concluida la vida útil"], "correctIndex": 0, "feedback": "El art. 30 del RPAST exige identificar e interrelacionar los impactos de las etapas de construcción, operación y cierre."}, {"id": "M10-B03", "mod": 10, "nivel": "Basico", "titulo": "Aplicabilidad de la Ley de Cierre de Minas", "enun": "Es aplicable la Ley de Cierre de Minas (Ley N 28090) al sector Transportes?", "options": ["Si, es aplicable indistintamente a cualquier proyecto de infraestructura", "No, es aplicable al sector minero, no al sector Transportes", "Fue derogada y reemplazada por el RPAST para todos los sectores"], "correctIndex": 1, "feedback": "La Ley N 28090 (Ley de Cierre de Minas) es aplicable al sector minero, no al sector Transportes, que tiene su propio esquema de cierre integrado al IGA."}, {"id": "M10-B04", "mod": 10, "nivel": "Basico", "titulo": "Cierre de una cantera exclusiva para la obra", "enun": "Cómo se rige el cierre de una cantera utilizada exclusivamente para una obra vial?", "options": ["Se rige por un Plan de Cierre independiente, tramitado ante el Ministerio de Energia y Minas", "No requiere ninguna medida si el material extraido ya fue agotado", "Conforme a las medidas de cierre aprobadas en el instrumento de gestión ambiental del proyecto vial"], "correctIndex": 2, "feedback": "El cierre de una cantera de uso exclusivo en obra debe ejecutarse conforme a lo aprobado en el instrumento de gestión ambiental del proyecto vial."}, {"id": "M10-B05", "mod": 10, "nivel": "Basico", "titulo": "Cierre de un DME al finalizar la obra", "enun": "Qué medidas suele incluir el cierre de un DME al finalizar la obra?", "options": ["Típicamente estabilización de taludes, drenaje y revegetación, conforme a lo aprobado en el instrumento ambiental", "Solo requiere cercar el área, sin intervención física adicional", "No requiere ninguna medida si el DME se ubica fuera del derecho de vía"], "correctIndex": 0, "feedback": "El cierre de un DME incluye típicamente estabilización de taludes, drenaje y revegetación, conforme a lo aprobado en el instrumento ambiental."}, {"id": "M10-B06", "mod": 10, "nivel": "Basico", "titulo": "Desmantelamiento de campamento al concluir el proyecto", "enun": "Qué corresponde respecto al campamento de obra al concluir el proyecto?", "options": ["Forma parte de las obligaciones de cierre previstas en el instrumento ambiental, incluyendo la restitución del área", "Solo se exige si el área pertenece a un tercero distinto al titular", "Es una decisión discrecional del contratista, sin obligación ambiental asociada"], "correctIndex": 0, "feedback": "El desmantelamiento del campamento y la restitución del área forman parte de las obligaciones de cierre previstas en el instrumento ambiental."}, {"id": "M10-B07", "mod": 10, "nivel": "Basico", "titulo": "Plan de Abandono como instrumento sectorial", "enun": "En qué sector es tipico el instrumento llamado 'Plan de Abandono'?", "options": ["Es un instrumento exigido por igual en todos los sectores regulados por el SEIA", "Es el nombre que recibe el Plan de Cierre en el sector Transportes", "Es un instrumento tipico del sector Hidrocarburos, distinto del esquema de cierre integrado al IGA del sector Transportes"], "correctIndex": 2, "feedback": "El 'Plan de Abandono' es tipico del sector Hidrocarburos; el sector Transportes integra sus medidas de cierre dentro del propio IGA."}, {"id": "M10-B08", "mod": 10, "nivel": "Basico", "titulo": "Infraestructura vial abandonada sin cierre", "enun": "Qué riesgo genera una infraestructura vial abandonada sin ejecutar las medidas de cierre aprobadas?", "options": ["No genera ninguna obligación, al tratarse de infraestructura ya entregada o concluida", "Puede constituir un pasivo ambiental y una infracción fiscalizable, independientemente de que el proyecto haya concluido formalmente", "Solo genera responsabilidad si un tercero resulta directamente afectado de forma comprobada"], "correctIndex": 1, "feedback": "Una infraestructura abandonada sin ejecutar el cierre aprobado puede constituir un pasivo ambiental y una infracción fiscalizable."}, {"id": "M10-B09", "mod": 10, "nivel": "Basico", "titulo": "Garantías financieras de cierre en el sector vial", "enun": "Exige el RPAST garantías financieras de cierre equivalentes al régimen minero?", "options": ["Si, son exigidas únicamente para proyectos ejecutados por gobiernos regionales o locales", "Si, son obligatorias para cualquier proyecto vial categorizado como EIA-d", "No, el RPAST no contempla, de forma general, un régimen de garantías financieras de cierre equivalente al del sector minero"], "correctIndex": 2, "feedback": "El RPAST no contempla un esquema general de garantías financieras de cierre equivalente al de la Ley N 28090 del sector minero."}, {"id": "M10-B10", "mod": 10, "nivel": "Basico", "titulo": "Monitoreo posterior al cierre de un componente", "enun": "Puede exigirse monitoreo después del cierre de una cantera o DME?", "options": ["Nunca se exige monitoreo después del cierre de ningún componente", "Si, puede ser exigible conforme a lo establecido en el propio instrumento ambiental, según el riesgo residual identificado", "Se exige siempre por un plazo fijo de 10 años, sin excepción"], "correctIndex": 1, "feedback": "El monitoreo posterior al cierre de canteras o DME puede ser exigible conforme a lo aprobado en el instrumento ambiental, según el riesgo residual."}, {"id": "M10-I01", "mod": 10, "nivel": "Intermedio", "titulo": "Abandono del expediente vs cierre físico", "enun": "Qué es el 'abandono del expediente' en un procedimiento de evaluación ambiental?", "options": ["Es sinonimo del cierre físico y ambiental de la infraestructura construida", "Una figura procedimental distinta del cierre físico de una obra; ocurre cuando el titular no subsana observaciones dentro del plazo, archivandose el expediente", "Solo aplica a procedimientos ante SENACE, nunca ante la DGAAM-MTC"], "correctIndex": 1, "feedback": "El abandono del expediente es una figura procedimental por falta de subsanación de observaciones, distinta del cierre físico y ambiental de una obra."}, {"id": "M10-I02", "mod": 10, "nivel": "Intermedio", "titulo": "Cierre de planta de asfalto temporal", "enun": "Cómo deben ejecutarse las medidas de cierre de una planta de asfalto temporal instalada para la obra?", "options": ["No requieren ninguna medida si la planta opero menos de seis meses", "Conforme a lo aprobado en el instrumento ambiental, incluyendo el desmantelamiento y restitución del área utilizada", "Se rigen por el mismo régimen de cierre de minas, al tratarse de una planta industrial"], "correctIndex": 1, "feedback": "El cierre de una planta de asfalto temporal debe ejecutarse conforme a lo aprobado en el instrumento ambiental, con desmantelamiento y restitución del área."}, {"id": "M10-I03", "mod": 10, "nivel": "Intermedio", "titulo": "Cierre pendiente al terminar una concesión vial", "enun": "Una concesión vial llega a su término sin que el concesionario haya ejecutado el cierre de componentes auxiliares pendientes.", "options": ["Se extingue automáticamente toda obligación de cierre al finalizar el contrato de concesión", "Se traslada automáticamente al nuevo concesionario, sin posibilidad de exigir responsabilidad al anterior", "El incumplimiento es fiscalizable y puede generar responsabilidad para el concesionario, sin perjuicio de lo que establezca el contrato"], "correctIndex": 2, "feedback": "El incumplimiento de obligaciones de cierre al término de una concesión es fiscalizable y puede generar responsabilidad del concesionario, sin perjuicio del contrato."}, {"id": "M10-I04", "mod": 10, "nivel": "Intermedio", "titulo": "Modificación del cronograma de cierre", "enun": "Puede tramitarse como comunicación previa la modificación del cronograma de cierre aprobado en el instrumento ambiental?", "options": ["Si, al ser un cambio meramente administrativo de fechas", "No requiere ninguna gestión, el cronograma de cierre es meramente referencial", "No, conforme al literal g) del art. 20-A, que excluye expresamente los Planes de Cierre de dicho supuesto"], "correctIndex": 2, "feedback": "El literal g) del art. 20-A excluye expresamente el cronograma de cierre del régimen de comunicación previa."}, {"id": "M10-I05", "mod": 10, "nivel": "Intermedio", "titulo": "Cierre de patio de maquinas con almacenamiento de hidrocarburos", "enun": "El cierre de un patio de maquinas que almaceno hidrocarburos durante la obra requiere alguna consideración especial?", "options": ["Si, debe considerar la posible afectación del suelo por dicho almacenamiento, incluyendo medidas de remediación si corresponde", "Se cierra igual que cualquier otro componente, sin consideraciones adicionales", "No requiere ninguna evaluación si el almacenamiento cumplio siempre los LMP aplicables durante la obra"], "correctIndex": 0, "feedback": "El cierre de un patio de maquinas con historial de almacenamiento de hidrocarburos debe evaluar la posible afectación del suelo antes de darse por concluido."}, {"id": "M10-I06", "mod": 10, "nivel": "Intermedio", "titulo": "Cambio de uso de componente tras la operación de la vía", "enun": "Un campamento se reconvierte en almacen municipal tras concluir la operación de la vía.", "options": ["No requiere ninguna gestión ambiental, al tratarse de una decisión municipal posterior", "Siempre debe cerrarse íntegramente antes de cualquier cambio de uso posterior", "Puede gestionarse como cambio de uso bajo comunicación previa si se mantienen las condiciones del art. 20-A, en lugar de ejecutar un cierre integro"], "correctIndex": 2, "feedback": "El cambio de uso de un componente, manteniendo las condiciones del art. 20-A, puede gestionarse como comunicación previa en lugar de exigir un cierre integro."}, {"id": "M10-I07", "mod": 10, "nivel": "Intermedio", "titulo": "Cierre en proyectos con certificación fraccionada por tramos", "enun": "Cómo s /* ---------------- capa de almacenamiento (Claude o localStorage como respaldo) ---------------- */
const HAS_CLAUDE_STORAGE = (typeof window.storage !== 'undefined' && window.storage !== null);
async function storageGet(key, shared){
  if(HAS_CLAUDE_STORAGE) return await window.storage.get(key, shared);
  if(shared) return null; // localStorage no es compartido entre usuarios/dispositivos
  try{
    const raw = localStorage.getItem('lenvir_ls_'+key);
    return raw !== null ? {key:key, value:raw, shared:false} : null;
  }catch(e){ return null; }
}
async function storageSet(key, value, shared){
  if(HAS_CLAUDE_STORAGE) return await window.storage.set(key, value, shared);
  if(shared) return null;
  try{ localStorage.setItem('lenvir_ls_'+key, value); return {key:key, value:value, shared:false}; }
  catch(e){ return null; }
}
async function storageDelete(key, shared){
  if(HAS_CLAUDE_STORAGE) return await window.storage.delete(key, shared);
  if(shared) return null;
  try{ localStorage.removeItem('lenvir_ls_'+key); return {key:key, deleted:true, shared:false}; }
  catch(e){ return null; }
}
async function storageList(prefix, shared){
  if(HAS_CLAUDE_STORAGE) return await window.storage.list(prefix, shared);
  if(shared) return {keys:[]}; // sin backend propio no hay directorio compartido real
  try{
    const keys = [];
    const pfx = 'lenvir_ls_'+(prefix||'');
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(k && k.indexOf(pfx)===0) keys.push(k.slice('lenvir_ls_'.length));
    }
    return {keys:keys};
  }catch(e){ return {keys:[]}; }
}
function clearTimerHandle(){ if(timerHandle){ clearInterval(timerHandle); timerHandle = null; } }
function startTimerTick(){
  clearTimerHandle();
  const tickFn = function(){
    const el = document.getElementById('timer-value');
    const L = state.lesson;
    if(!el || !L || L.answered !== null){ clearTimerHandle(); return; }
    el.textContent = formatTime((Date.now()-L.qStart)/1000);
  };
  tickFn();
  timerHandle = setInterval(tickFn, 500);
}

function defaultProgress(){
  const modules = {};
  for(let m=1;m<=TOTAL_MODULES;m++){
    modules[m] = {
      Basico:{stars:0,completed:false,bestAcc:0,bestScore:0,bestComponents:null},
      Intermedio:{stars:0,completed:false,bestAcc:0,bestScore:0,bestComponents:null},
      Avanzado:{stars:0,completed:false,bestAcc:0,bestScore:0,bestComponents:null}
    };
  }
  return {
    totalXP:0, streak:0, lastCompletionDate:null, modules,
    alias:"", profileVisible:false, flags:{}, reviewQueue:[],
    userId:'u_'+Math.random().toString(36).slice(2,10)+Date.now().toString(36)
  };
}

function ensureShape(){
  if(!progress || typeof progress!=="object") progress = defaultProgress();
  if(!progress.modules) progress.modules = defaultProgress().modules;
  for(let m=1;m<=TOTAL_MODULES;m++){
    if(!progress.modules[m]) progress.modules[m] = defaultProgress().modules[m];
    LEVELS.forEach(lv=>{
      if(!progress.modules[m][lv]) progress.modules[m][lv] = {stars:0,completed:false,bestAcc:0,bestScore:0,bestComponents:null};
      const rec = progress.modules[m][lv];
      if(typeof rec.bestScore !== "number") rec.bestScore = 0;
      if(rec.bestComponents===undefined) rec.bestComponents = null;
    });
  }
  if(typeof progress.totalXP !== "number") progress.totalXP = 0;
  if(typeof progress.streak !== "number") progress.streak = 0;
  if(progress.lastCompletionDate === undefined) progress.lastCompletionDate = null;
  if(typeof progress.alias !== "string") progress.alias = "";
  if(typeof progress.profileVisible !== "boolean") progress.profileVisible = false;
  if(!progress.flags) progress.flags = {};
  if(!Array.isArray(progress.reviewQueue)) progress.reviewQueue = [];
  if(!progress.userId) progress.userId = 'u_'+Math.random().toString(36).slice(2,10)+Date.now().toString(36);
}

async function loadProgress(){
  try{
    const r = await storageGet(STORAGE_KEY, false);
    progress = r ? JSON.parse(r.value) : defaultProgress();
  }catch(e){ progress = defaultProgress(); }
  ensureShape();
  state.screen = "map";
  render();
}
async function saveProgress(){
  try{ await storageSet(STORAGE_KEY, JSON.stringify(progress), false); }
  catch(e){ console.error("No se pudo guardar el progreso", e); }
}
async function syncPublicProfile(){
  const uid = progress.userId;
  try{
    if(progress.profileVisible){
      const rank = getRank(progress);
      const payload = { alias: progress.alias || 'Fiscalizador anónimo', rank: rank.name, score: Math.round(rank.score*10)/10, badges: getEarnedBadgeIds(progress).length, updated: new Date().toISOString() };
      await storageSet('public_profile:'+uid, JSON.stringify(payload), true);
    } else {
      await storageDelete('public_profile:'+uid, true);
    }
  }catch(e){ }
}

function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function shuffleQuestionOptions(caseObj){
  const order = shuffle([0,1,2]);
  const options = order.map(function(i){ return caseObj.options[i]; });
  const correctIndex = order.indexOf(caseObj.correctIndex);
  return Object.assign({}, caseObj, {options:options, correctIndex:correctIndex});
}
function escapeHtml(s){ return (s||"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function isModuleUnlocked(m){ return m===1 || progress.modules[m-1].Basico.completed; }
function isLevelUnlocked(m, level){
  if(!isModuleUnlocked(m)) return false;
  if(level==="Basico") return true;
  if(level==="Intermedio") return progress.modules[m].Basico.completed;
  if(level==="Avanzado") return progress.modules[m].Intermedio.completed;
}
function moduleStatus(m){
  if(!isModuleUnlocked(m)) return "locked";
  const mod = progress.modules[m];
  const allDone = LEVELS.every(lv=>mod[lv].completed);
  if(allDone) return "done";
  return findFirstUnlockedModule()===m ? "current" : "available";
}
function findFirstUnlockedModule(){
  for(let m=1;m<=TOTAL_MODULES;m++){
    const mod = progress.modules[m];
    if(isModuleUnlocked(m) && !LEVELS.every(lv=>mod[lv].completed)) return m;
  }
  return TOTAL_MODULES;
}
function countLevelsCompleted(p, level){ let c=0; for(let m=1;m<=TOTAL_MODULES;m++){ if(p.modules[m][level].completed) c++; } return c; }
function countLevelsWithStars(p, n){ let c=0; for(let m=1;m<=TOTAL_MODULES;m++){ LEVELS.forEach(lv=>{ if(p.modules[m][lv].stars>=n) c++; }); } return c; }
function overallScore(p){
  let totalWeighted=0, totalWeight=0;
  for(let m=1;m<=TOTAL_MODULES;m++){
    LEVELS.forEach(lv=>{
      const rec = p.modules[m][lv];
      if(rec.completed && rec.bestScore){
        const w = COMPLEXITY_WEIGHT[lv];
        totalWeighted += rec.bestScore * w;
        totalWeight += w;
      }
    });
  }
  return totalWeight ? totalWeighted/totalWeight : 0;
}
function gatingMet(rankId, p){
  switch(rankId){
    case 'explorador': return true;
    case 'analista': return countLevelsCompleted(p,'Intermedio')>=1;
    case 'profesional': return countLevelsCompleted(p,'Avanzado')>=1;
    case 'especialista': return countLevelsCompleted(p,'Avanzado')>=3;
    case 'experto': return countLevelsCompleted(p,'Avanzado')>=6;
    case 'mentor': return countLevelsCompleted(p,'Avanzado')>=10;
    case 'lider': return countLevelsCompleted(p,'Avanzado')>=10 && countLevelsWithStars(p,3)>=27;
    default: return false;
  }
}
function getRank(p){
  const score = overallScore(p);
  let chosen = RANKS[0];
  for(const r of RANKS){ if(score>=r.min && gatingMet(r.id,p)) chosen=r; }
  return Object.assign({}, chosen, {score:score});
}
function rankIndexOf(id){ return RANKS.findIndex(r=>r.id===id); }
function getEarnedBadgeIds(p){ return BADGES.filter(b=>b.check(p)).map(b=>b.id); }
function avgComponents(p){
  let sums={calidad:0,tiempo:0,autonomia:0,complejidad:0}, n=0;
  for(let m=1;m<=TOTAL_MODULES;m++){
    LEVELS.forEach(lv=>{
      const rec = p.modules[m][lv];
      if(rec.completed && rec.bestComponents){
        sums.calidad += rec.bestComponents.calidad;
        sums.tiempo += rec.bestComponents.tiempo;
        sums.autonomia += rec.bestComponents.autonomia;
        sums.complejidad += rec.bestComponents.complejidad;
        n++;
      }
    });
  }
  if(n===0) return {calidad:0,tiempo:0,autonomia:0,complejidad:0};
  return {calidad:sums.calidad/n, tiempo:sums.tiempo/n, autonomia:sums.autonomia/n, complejidad:sums.complejidad/n};
}

function formatTime(totalSeconds){
  const s = Math.max(0, Math.floor(totalSeconds));
  const m = Math.floor(s/60);
  const r = s%60;
  return m+':'+String(r).padStart(2,'0');
}

function render(){
  const app = document.getElementById('app');
  if(state.screen==="loading"){ app.innerHTML = "<div style='flex:1;display:flex;align-items:center;justify-content:center;color:#888;font-family:IBM Plex Mono,monospace;'>Cargando expediente...</div>"; return; }
  if(state.screen==="map"){ app.innerHTML = renderHud() + renderMap(); attachMapEvents(); return; }
  if(state.screen==="lesson"){ app.innerHTML = renderLesson(); attachLessonEvents(); return; }
  if(state.screen==="summary"){ app.innerHTML = renderSummary(); attachSummaryEvents(); return; }
  if(state.screen==="profile"){ app.innerHTML = renderTopBar("Perfil de Experticia") + renderProfile(); attachProfileEvents(); return; }
  if(state.screen==="empresa"){ app.innerHTML = renderTopBar("Modo Empresa") + renderEmpresa(); attachEmpresaEvents(); return; }
}

function renderMap(){
  const aligns = ["left","right","center"];
  let nodes = "";
  for(let m=1;m<=TOTAL_MODULES;m++){
    const status = moduleStatus(m);
    const align = aligns[(m-1)%3];
    const mod = progress.modules[m];
    const totalStars = LEVELS.reduce((s,lv)=>s+mod[lv].stars,0);
    let cls = "node-btn ";
    let inner = "";
    if(status==="locked"){ cls += "node-locked"; inner = iconLock(); }
    else {
      cls += status==="done" ? "node-done" : "node-current";
      inner = '<div class="node-id">M'+m+'</div><div class="node-stars">'+[0,1,2].map(i=>iconStarMini(totalStars>=((i+1)*3))).join("")+'</div>';
    }
    nodes += (m>1 ? '<div class="connector"></div>' : '')
      + '<div class="node-row '+align+'"><div class="node-col">'
      + '<button class="'+cls+'" data-mod="'+m+'" '+(status==="locked"?"disabled":"")+'>'+inner+'</button>'
      + '<div class="node-label">M'+m+' \u00b7 '+MODULE_NAMES[m]+'</div></div></div>';
  }
  const reviewCount = (progress.reviewQueue||[]).length;
  const reviewHtml = '<div class="review-banner '+(reviewCount?'':'empty')+'">'
    + '<div><div class="review-title">\ud83d\udccb Bandeja de observaciones</div><div class="review-sub">'+(reviewCount? reviewCount+' caso(s) pendiente(s) de repaso':'Sin observaciones pendientes')+'</div></div>'
    + (reviewCount? '<button class="level-btn review" id="btn-review">Repasar</button>' : '')
    + '</div>';
  return '<div class="map-wrap">'
    + renderMapBgSvg()
    + '<div class="map-intro"><div class="eyebrow">Mapa de fiscalizaci\u00f3n \u00b7 10 m\u00f3dulos</div><h2>Tu ruta de campo</h2></div>'
    + reviewHtml
    + '<div class="path">'+nodes+'</div>'
    + '</div>';
}

  document.getElementById('btn-settings').onclick = function(){ state.settingsOpen = true; render(); };
  document.getElementById('btn-profile').onclick = function(){ state.screen = 'profile'; render(); };

      + '<div class="level-left"><div class="level-name">'+LEVEL_LABEL[lv]+'</div>'

      + (unlocked ? '<button class="level-btn '+(rec.completed?'review':'')+'" data-mod="'+m+'" data-level="'+lv+'">'+btnLabel+'</button>' : '')
      + '</div>';
  });
  return '<div class="overlay" id="level-overlay"><div class="sheet">'
    + '<button class="sheet-close" id="level-close">'+iconClose()+'</button>'

function attachSettingsEvents(){
  const overlay = document.getElementById('settings-overlay');
  if(!overlay) return;
  overlay.addEventListener('click', function(e){ if(e.target===overlay){ state.settingsOpen=false; render(); } });
  document.getElementById('settings-close').onclick = function(){ state.settingsOpen=false; render(); };
  document.getElementById('btn-reset').onclick = function(){
    if(confirm("\u00bfSeguro que deseas reiniciar todo tu progreso en Lenvir?")){
      const oldVisible = progress.profileVisible, oldUid = progress.userId;
      progress = defaultProgress();
      if(oldVisible){ storageDelete('public_profile:'+oldUid, true).catch(function(){}); }
      saveProgress();
      state.settingsOpen = false; state.activeModule = null; render();
    }
  };

function startLesson(m, level){
  const pool = CASES.filter(function(c){ return c.mod===m && c.nivel===level; });
  const queue = shuffle(pool).map(shuffleQuestionOptions);
  state.lesson = { mod:m, level:level, queue:queue, idx:0, lives:5, correctCount:0, xpGained:0, answered:null, failed:false, isReview:false, results:[], timeScores:[], qStart:Date.now() };
  state.activeModule = null;
  state.screen = "lesson";
  render();
}
function startReviewLesson(){
  const items = (progress.reviewQueue||[]).map(function(rq){ return CASES.find(function(c){ return c.id===rq.caseId; }); }).filter(Boolean);
  if(items.length===0) return;
  const queue = shuffle(items).slice(0, Math.min(10, items.length)).map(shuffleQuestionOptions);
  state.lesson = { mod:null, level:'Repaso', queue:queue, idx:0, lives:5, correctCount:0, xpGained:0, answered:null, failed:false, isReview:true, results:[], timeScores:[], qStart:Date.now() };
  state.screen = "lesson";
  render();
}
function renderLesson(){
  const L = state.lesson;
  const q = L.queue[L.idx];
  const pct = Math.round((L.idx/L.queue.length)*100);
  const livesHtml = Array.from({length:5}).map(function(_,i){ return '<div class="life-icon">'+iconHardhat(i<L.lives)+'</div>'; }).join("");
  const optionsHtml = q.options.map(function(opt,i){
    let cls = "option"; let disabledAttr = "";
    if(L.answered!==null){
      disabledAttr = "disabled";
      if(i===q.correctIndex) cls += " correct";
      else if(i===L.answered) cls += " wrong";
      else cls += " dim";
    }
    return '<button class="'+cls+'" data-idx="'+i+'" '+disabledAttr+'><span class="badge">'+"ABC"[i]+'</span><span>'+escapeHtml(opt)+'</span></button>';
  }).join("");
  let feedbackHtml = "";
  if(L.answered!==null){
    const correct = L.answered===q.correctIndex;
    const xpLabel = L.isReview ? '+5 XP' : '+10 XP';
    feedbackHtml = '<div class="feedback-sheet '+(correct?'ok':'bad')+'">'
      + '<div class="fb-row"><div class="stamp">'+(correct?'CONFORME':'OBSERVADO')+'</div>'
      + '<div class="fb-text"><div class="fb-title">'+(correct?('\u00a1Conforme! '+xpLabel):'Observaci\u00f3n de campo')+'</div></div></div>'
      + '<div class="fb-body">'+escapeHtml(q.feedback)+'</div>'
      + '<button class="fb-continue" id="btn-continue">Continuar</button></div>';
  }
  const timerSeconds = L.answered===null ? (Date.now()-L.qStart)/1000 : (L.lastElapsedSeconds||0);
  const timerCls = L.answered===null ? 'timer-badge ticking' : 'timer-badge frozen';
  const timerHtml = '<div class="'+timerCls+'">'+iconClock()+'<span id="timer-value">'+formatTime(timerSeconds)+'</span></div>';
  return '<div class="lesson-top"><button class="exit-btn" id="btn-exit">'+iconClose()+'</button>'
    + '<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div>'
    + '<div class="lives">'+livesHtml+'</div></div>'
    + '<div class="lesson-body">'
    + '<div class="case-tag-row"><div class="case-tag">EXP. '+q.id+(L.isReview?' \u00b7 REPASO':'')+'</div>'+timerHtml+'</div>'
    + '<h3 class="case-title">'+escapeHtml(q.titulo)+'</h3>'
    + '<div class="field-note">'+escapeHtml(q.enun)+'</div>'
    + '<div class="options">'+optionsHtml+'</div></div>'
    + feedbackHtml;
}
function attachLessonEvents(){
  document.getElementById('btn-exit').onclick = function(){
    if(confirm("\u00bfSalir de la lecci\u00f3n? Perder\u00e1s el avance de esta sesi\u00f3n.")){ clearTimerHandle(); state.screen = "map"; state.lesson = null; render(); }
  };
  const L = state.lesson;
  if(L.answered===null){
    document.querySelectorAll('.option').forEach(function(btn){ btn.onclick = function(){ selectOption(parseInt(btn.dataset.idx,10)); }; });
    startTimerTick();
  } else {
    clearTimerHandle();
    const cont = document.getElementById('btn-continue');
    if(cont) cont.onclick = nextQuestion;
  }
}
function selectOption(optIdx){
  const L = state.lesson;
  if(L.answered!==null) return;
  const q = L.queue[L.idx];
  L.answered = optIdx;
  const correct = optIdx===q.correctIndex;

  const elapsed = Math.max(1, (Date.now()-L.qStart)/1000);
  L.lastElapsedSeconds = elapsed;
  const expected = EXPECTED_TIME[L.level] || 35;
  const rawTime = Math.max(40, Math.min(130, Math.round((expected/elapsed)*100)));
  L.timeScores.push(rawTime);
  L.results.push({caseId:q.id, correct:correct});

  if(correct){ L.correctCount++; L.xpGained += L.isReview ? 5 : 10; }
  else {
    L.lives--;
    if(!L.isReview){
      if(!progress.reviewQueue.find(function(rq){ return rq.caseId===q.id; })){
        progress.reviewQueue.push({caseId:q.id, timesCorrect:0});
      }
    }
  }
  clearTimerHandle();
  render();
}
function nextQuestion(){
  const L = state.lesson;
  if(L.lives<=0){ L.failed = true; finishLesson(); return; }
  L.idx++; L.answered = null; L.qStart = Date.now();
  if(L.idx>=L.queue.length){ finishLesson(); return; }
  render();
}
function finishLesson(){
  clearTimerHandle();
  const L = state.lesson;
  const total = L.queue.length;
  const acc = total? L.correctCount/total : 0;

  if(L.isReview){
    L.results.forEach(function(r){
      const idx = progress.reviewQueue.findIndex(function(rq){ return rq.caseId===r.caseId; });
      if(idx>=0){
        if(r.correct){
          progress.reviewQueue[idx].timesCorrect = (progress.reviewQueue[idx].timesCorrect||0)+1;
          if(progress.reviewQueue[idx].timesCorrect>=2) progress.reviewQueue.splice(idx,1);
        } else { progress.reviewQueue[idx].timesCorrect = 0; }
      }
    });
    progress.totalXP += L.xpGained;
    L.acc = acc;
    saveProgress();
    state.screen = "summary"; render(); return;
  }

  const prevBadges = getEarnedBadgeIds(progress);
  const prevRank = getRank(progress);

  const tiempoRaw = L.timeScores.length ? L.timeScores.reduce(function(a,b){return a+b;},0)/L.timeScores.length : 70;
  const tiempoComponent = Math.min(100, tiempoRaw);
  const calidad = acc*100;
  const errors = total - L.correctCount;
  const autonomyLevel = L.failed ? 1 : (errors===0 ? 4 : errors<=1 ? 3 : errors<=3 ? 2 : 1);
  const autonomiaComponent = (autonomyLevel/4)*100;
  const complejidadComponent = (COMPLEXITY_WEIGHT[L.level]/3)*100;
  const finalScore = calidad*0.5 + tiempoComponent*0.2 + autonomiaComponent*0.2 + complejidadComponent*0.1;

  let stars = 0;
  if(!L.failed){
    if(acc>=1) stars=3; else if(acc>=0.8) stars=2; else if(acc>=0.6) stars=1; else stars=0;
    if(acc>=1) L.xpGained += 20;
    const rec = progress.modules[L.mod][L.level];
    rec.completed = true;
    rec.stars = Math.max(rec.stars, stars);
    rec.bestAcc = Math.max(rec.bestAcc, acc);
    if(finalScore > (rec.bestScore||0)){
      rec.bestScore = finalScore;
      rec.bestComponents = {calidad:calidad, tiempo:tiempoComponent, autonomia:autonomiaComponent, complejidad:complejidadComponent};
    }
    progress.totalXP += L.xpGained;
    if(!progress.flags) progress.flags = {};
    if(acc>=1){
      progress.flags.hadPerfectLesson = true;
      progress.flags.bestSpeedScore = Math.max(progress.flags.bestSpeedScore||0, Math.round(tiempoRaw));
      if(tiempoRaw>=100) progress.flags.hadFastPerfect = true;
    }
    updateStreak();
  }

  const newRank = getRank(progress);
  const newBadges = getEarnedBadgeIds(progress).filter(function(id){ return prevBadges.indexOf(id)===-1; });
  L.newBadges = newBadges;
  L.rankUp = (newRank.id!==prevRank.id) ? newRank : null;
  L.stars = stars; L.acc = acc;

  saveProgress();
  syncPublicProfile();
  state.screen = "summary";
  render();
}
function updateStreak(){
  const today = new Date().toISOString().slice(0,10);
  if(progress.lastCompletionDate === today) return;
  if(progress.lastCompletionDate){
    const diffDays = Math.round((new Date(today) - new Date(progress.lastCompletionDate)) / 86400000);
    progress.streak = diffDays===1 ? progress.streak + 1 : 1;
  } else { progress.streak = 1; }
  progress.lastCompletionDate = today;
}

  const total = L.queue.length;

    return '<div class="summary-wrap"><div class="summary-stamp">'+bigIcon(iconCheckHero(),'var(--blueprint)')+'</div>'

    return '<div class="summary-wrap"><div class="summary-stamp fail">'+bigIcon(iconXHero(),'var(--stamp-red)')+'</div>'

      + '<button class="btn-primary" id="btn-retry">Reintentar lecci\u00f3n</button>'
      + '<button class="btn-ghost" id="btn-tomap">Volver al mapa</button></div>';
  }
  const rankUpHtml = L.rankUp ? '<div class="rankup-card"><b>\ud83c\udf96\ufe0f \u00a1Subiste de rango!</b>Ahora eres <b style="display:inline;">'+L.rankUp.name+'</b>.</div>' : "";
  const badgesHtml = (L.newBadges&&L.newBadges.length) ? '<div class="badges-toast"><b>\ud83c\udfc5 Nueva(s) insignia(s)</b>'+L.newBadges.map(function(id){
      const b = BADGES.find(function(x){return x.id===id;});

      return b.name;
    }).join(", ")+'</div>' : "";
  return '<div class="summary-wrap"><div class="summary-stamp">'+bigIcon(iconCheckHero(),'var(--signal-green-dark)')+'</div>'
    + '<h2 class="summary-title">Acta de resultados</h2>'
    + '<div class="summary-sub">M'+L.mod+' \u00b7 '+LEVEL_LABEL[L.level]+' completado</div>'
    + '<div class="summary-stars">'+[0,1,2].map(i=>iconStar(i<L.stars)).join("")+'</div>'
    + rankUpHtml + badgesHtml
    + '<div class="summary-grid"><div class="summary-box"><div class="num">'+Math.round(L.acc*100)+'%</div><div class="lbl">Precisi\u00f3n</div></div>'
    + '<div class="summary-box"><div class="num">+'+L.xpGained+'</div><div class="lbl">XP ganado</div></div>'
    + '<div class="summary-box"><div class="num">'+L.correctCount+'/'+total+'</div><div class="lbl">Correctas</div></div></div>'
    + '<button class="btn-primary" id="btn-tomap">Continuar</button>'
    + '<button class="btn-ghost" id="btn-retry">Repasar de nuevo</button></div>';
}
function bigIcon(pathSvg, color){ return '<svg viewBox="0 0 24 24" fill="none" style="width:50px;height:50px;color:'+color+'">'+pathSvg+'</svg>'; }
function attachSummaryEvents(){
  const L = state.lesson;
  document.getElementById('btn-tomap').onclick = function(){ state.screen="map"; state.lesson=null; render(); };
  const retry = document.getElementById('btn-retry');
  if(retry) retry.onclick = function(){ if(L.isReview) startReviewLesson(); else startLesson(L.mod, L.level); };
}

function renderProfile(){
  const rank = getRank(progress);
  const earned = {};
  getEarnedBadgeIds(progress).forEach(function(id){ earned[id]=true; });
  const comp = avgComponents(progress);
  const badgesHtml = BADGES.map(function(b){
    const has = !!earned[b.id];
    let desc = b.desc;
    if(b.id==='velocista' && has && progress.flags && progress.flags.bestSpeedScore){
      desc = 'Lograste 100% de precisión con '+progress.flags.bestSpeedScore+'% de eficiencia de tiempo (vs. el tiempo esperado por caso).';
    }
    return '<div class="badge-card '+(has?'earned':'locked')+'"><div class="badge-icon">'+(has?iconBadgeOn():iconBadgeOff())+'</div><div class="badge-name">'+b.name+'</div><div class="badge-desc">'+desc+'</div></div>';
  }).join("");
  function bar(label, val, color){ return '<div class="bar-row"><span class="bar-label">'+label+'</span><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(val)+'%;background:'+color+'"></div></div><span class="bar-val">'+Math.round(val)+'</span></div>'; }
  return '<div class="profile-wrap">'
    + '<div class="rank-banner" style="--rank-color:'+rank.color+'"><div class="rank-eyebrow">Rango actual</div><h2>'+rank.name+'</h2>'
    + '<div class="rank-tagline">'+rank.tagline+'</div><div class="rank-score">Score ponderado: '+rank.score.toFixed(1)+' / 100</div></div>'
    + '<label class="alias-field"><span>Alias profesional (visible si activas tu perfil)</span>'
    + '<input id="alias-input" type="text" maxlength="40" placeholder="Ej. J. Quispe, Ing. Ambiental" value="'+escapeHtml(progress.alias)+'"></label>'
    + '<div class="score-breakdown"><h3>Desglose del score (promedio de tus mejores lecciones)</h3>'
    + bar('Calidad', comp.calidad, 'var(--signal-green-dark)')
    + bar('Tiempo', comp.tiempo, 'var(--blueprint)')
    + bar('Autonom\u00eda', comp.autonomia, 'var(--purple)')
    + bar('Complejidad', comp.complejidad, 'var(--hazard-dark)')
    + '</div>'
    + '<div class="badges-grid">'+badgesHtml+'</div>'
    + '<div class="visibility-card"><div><div class="vis-title">Visible para empresas</div>'
    + '<div class="vis-sub">Si lo activas, tu alias, rango y score aparecen en el directorio de Lenvir para empresas. Tu identidad real nunca se comparte automáticamente.</div></div>'
    + '<label class="switch"><input type="checkbox" id="visibility-toggle" '+(progress.profileVisible?'checked':'')+'><span class="slider"></span></label></div>'
    + '<button class="btn-ghost" id="btn-empresa-preview">Ver vista previa de empresa \u2192</button>'
    + '</div>';
}
function attachProfileEvents(){
  document.getElementById('btn-back').onclick = function(){ state.screen='map'; render(); };
  const aliasInput = document.getElementById('alias-input');
  aliasInput.oninput = function(e){ progress.alias = e.target.value.slice(0,40); };
  aliasInput.onblur = function(){ saveProgress(); if(progress.profileVisible) syncPublicProfile(); };
  document.getElementById('visibility-toggle').onchange = async function(e){
    progress.profileVisible = e.target.checked;
    await saveProgress();
    await syncPublicProfile();
    render();
  };
  document.getElementById('btn-empresa-preview').onclick = openEmpresaMode;
}

async function openEmpresaMode(){
  state.screen = 'empresa'; state.empresaLoading = true; state.empresaProfiles = null; render();
  let profiles = [];
  try{
    const listRes = await storageList('public_profile:', true);
    const keys = listRes ? listRes.keys : [];
    for(const k of keys){
      try{ const r = await storageGet(k, true); if(r) profiles.push(JSON.parse(r.value)); }catch(e){}
    }
    profiles.sort(function(a,b){ return b.score-a.score; });
  }catch(e){ profiles = []; }
  state.empresaProfiles = profiles;
  state.empresaLoading = false;
  render();
}
function renderEmpresa(){
  if(state.empresaLoading){
    return '<div class="empresa-wrap"><div class="empty-state">Consultando directorio compartido...</div></div>';
  }
  const profiles = state.empresaProfiles || [];
  const rows = profiles.length ? profiles.map(function(p){
    return '<div class="empresa-row"><div><div class="empresa-alias">'+escapeHtml(p.alias)+'</div><div class="empresa-rank">'+escapeHtml(p.rank)+'</div></div><div class="empresa-score">'+p.score+'</div></div>';
  }).join("") : '<div class="empty-state">A\u00fan no hay perfiles visibles en el directorio.</div>';
  const bannerText = HAS_CLAUDE_STORAGE
    ? 'Vista de demostraci\u00f3n: cualquier persona que abra esta app puede ver este directorio si activ\u00f3 su perfil. En producci\u00f3n, esto requerir\u00eda una cuenta de empresa autenticada y control de acceso propio de Lenvir.'
    : 'Este navegador no est\u00e1 conectado a un almacenamiento compartido (est\u00e1s fuera de Claude), as\u00ed que el directorio solo mostrar\u00e1 perfiles guardados en este mismo navegador. Para un directorio real entre personas distintas se necesita un backend propio de Lenvir.';
  return '<div class="empresa-wrap"><div class="empresa-banner">'+bannerText+'</div>'+rows+'</div>';
}
function attachEmpresaEvents(){
  document.getElementById('btn-back').onclick = function(){ state.screen='profile'; render(); };
}

loadProgress();
</script>
</body>
</html>
